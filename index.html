<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gemini Pulse</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root { 
    --ink: #1a1a18; 
    --paper: #f5f0e8; 
    --accent: #1a5c3a; 
    --rule: #c8c0b0; 
    --muted: #5a554c; 
    --meta-color: #8c867a;
  }
  
  * { box-sizing: border-box; margin: 0; padding: 0; }
  
  body { 
    background: var(--paper); 
    color: var(--ink); 
    font-family: 'IBM Plex Sans', sans-serif; 
    min-height: 100vh; 
    line-height: 1.6; 
  }
  
  /* Top Right Dropdown Container */
  .feed-selector-container {
    position: absolute;
    top: 20px;
    right: 25px;
    z-index: 100;
  }

  select {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    background-color: transparent;
    color: var(--ink);
    border: 1px solid var(--rule);
    padding: 6px 10px;
    border-radius: 4px;
    cursor: pointer;
    outline: none;
    text-transform: uppercase;
    font-weight: 500;
  }

  select:hover {
    border-color: var(--accent);
  }

  .masthead { 
    border-bottom: 3px double var(--ink); 
    padding: 30px 20px; 
    text-align: center; 
    background: var(--paper); 
    position: relative;
  }
  
  .masthead-title { 
    font-family: 'Playfair Display', serif; 
    font-size: clamp(32px, 5vw, 56px); 
    font-weight: 700; 
  }
  
  .tagline { 
    font-family: 'IBM Plex Mono', monospace; 
    font-size: 10px; 
    letter-spacing: 0.2em; 
    text-transform: uppercase; 
    color: var(--meta-color); 
    margin-top: 8px; 
  }
  
  .container { 
    max-width: 800px; 
    margin: 0 auto; 
    padding: 30px 20px 80px; 
  }
  
  .feed-item {
    margin-bottom: 35px;
    border-bottom: 1px solid var(--rule);
    padding-bottom: 25px;
  }

  .feed-item:last-child {
    border-bottom: none;
  }

  .headline {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    color: var(--ink);
    text-decoration: none;
    font-weight: 700;
    display: block; 
    line-height: 1.3;
    margin-bottom: 10px;
  }

  .headline:hover {
    color: var(--accent);
    text-decoration: underline;
  }

  .description {
    font-size: 15px;
    color: var(--muted);
    margin-bottom: 12px;
    line-height: 1.6;
  }

  .meta {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px; 
    color: var(--meta-color);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .system-msg {
    font-family: 'IBM Plex Mono', monospace; 
    font-size: 12px; 
    color: var(--meta-color); 
    text-align: center;
    margin-top: 40px;
  }
</style>
</head>
<body>

<div class="feed-selector-container">
    <select id="feed-dropdown" onchange="loadFeed()">
        <optgroup label="Business News">
            <option value="https://www.thehindubusinessline.com/feeder/default.rss">Business Line</option>
            <option value="https://economictimes.indiatimes.com/rssfeedsdefault.cms">Economic Times</option>
            <option value="https://www.livemint.com/rss/markets">Livemint Markets</option>
            <option value="https://www.moneycontrol.com/rss/MCtopnews.xml">Moneycontrol</option>
            <option value="https://wap.business-standard.com/rss/markets-106.rss">Business Standard</option>
            <option value="https://www.financialexpress.com/feed/">Financial Express</option>
        </optgroup>
        <optgroup label="Daily News">
            <option value="https://theprint.in/feed/">ThePrint</option>
            <option value="https://indianexpress.com/feed/">The Indian Express</option>
            <option value="https://www.livemint.com/rss/news">Livemint News</option>
            <option value="https://timesofindia.indiatimes.com/rssfeedstopstories.cms?x=1">Times of India Top</option>
            <option value="https://m.hindustantimes.com/rss/topnews/rssfeed.xml">Hindustan Times</option>
        </optgroup>
        <optgroup label="Personal Finance">
            <option value="https://www.livemint.com/rss/Mutual%20Funds">Livemint Mutual Fund</option>
            <option value="https://economictimes.indiatimes.com/rssfeeds/837555174.cms">ET Wealth</option>
        </optgroup>
        <optgroup label="Mumbai & Thane">
            <option value="https://timesofindia.indiatimes.com/rssfeeds/3831863.cms">TOI Thane News</option>
            <option value="https://timesofindia.indiatimes.com/rssfeeds/-2128838597.cms">TOI Mumbai News</option>
            <option value="https://www.mid-day.com/Resources/midday/rss/news.xml">Mid-Day Mumbai</option>
        </optgroup>
        <optgroup label="Editorial">
            <option value="https://www.epw.in/taxonomy/term/65/feed">EPW Editorials</option>
            <option value="https://www.livemint.com/rss/opinion">Livemint Opinion</option>
        </optgroup>
    </select>
</div>

<div class="masthead">
    <div class="tagline" id="header-date">Financial Intelligence Terminal</div>
    <div class="masthead-title">Gemini Pulse</div>
    <div class="tagline">Live Feed</div>
</div>

<div class="container">
  <div id="rss-output">
      <div class="system-msg">Initializing secure terminal...</div>
  </div>
</div>

<script>
    window.onload = () => {
        document.getElementById('header-date').textContent = new Date().toLocaleDateString('en-IN', { 
            weekday: 'long', day: 'numeric', month: 'long' 
        });
        loadFeed(); 
    };

    function timeSince(dateString) {
        const date = new Date(dateString);
        const seconds = Math.floor((new Date() - date) / 1000);
        
        let interval = seconds / 86400;
        if (interval > 1) return Math.floor(interval) + " days ago";
        
        interval = seconds / 3600;
        if (interval > 1) return Math.floor(interval) + " hours ago";
        
        interval = seconds / 60;
        if (interval > 1) return Math.floor(interval) + " mins ago";
        
        return "Just now";
    }

    function loadFeed() {
        const outputContainer = document.getElementById("rss-output");
        const dropdown = document.getElementById("feed-dropdown");
        const currentFeedUrl = dropdown.value;
        const selectedFeedName = dropdown.options[dropdown.selectedIndex].text;

        outputContainer.innerHTML = "<div class='system-msg'>📡 Fetching data stream...</div>";

        const apiUrl = 'https://api.rss2json.com/v1/api.json?rss_url=' + encodeURIComponent(currentFeedUrl);

        fetch(apiUrl)
            .then(response => response.json())
            .then(data => {
                if (data.status !== 'ok') {
                    throw new Error("Failed to fetch the feed.");
                }

                let htmlOutput = "";

                data.items.forEach(item => {
                    let cleanDesc = item.description ? item.description.replace(/<[^>]*>?/gm, '').trim() : "";
                    
                    if (cleanDesc.length > 350) {
                        cleanDesc = cleanDesc.substring(0, 350) + "...";
                    }

                    const timeAgo = timeSince(item.pubDate);

                    htmlOutput += `
                        <div class="feed-item">
                            <a href="${item.link}" class="headline" target="_blank" rel="noopener">${item.title}</a>
                            ${cleanDesc ? `<p class="description">${cleanDesc}</p>` : ''}
                            <div class="meta">${timeAgo} &mdash; ${selectedFeedName}</div>
                        </div>
                    `;
                });

                outputContainer.innerHTML = htmlOutput;
            })
            .catch(err => {
                console.error("Terminal Error:", err);
                outputContainer.innerHTML = "<div class='system-msg' style='color:#d93025'>❌ Connection lost or dead feed link.</div>";
            });
    }
</script>
</body>
</html>
