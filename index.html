<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini Pulse</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root { --ink: #1a1a18; --paper: #f5f0e8; --paper2: #ede8de; --accent: #1a5c3a; --rule: #c8c0b0; --muted: #7a7468; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--paper); color: var(--ink); font-family: 'IBM Plex Sans', sans-serif; line-height: 1.6; padding-bottom: 50px; }
        
        .masthead { border-bottom: 3px double var(--ink); padding: 25px; text-align: center; position: sticky; top: 0; background: var(--paper); z-index: 100; }
        .masthead-title { font-family: 'Playfair Display', serif; font-size: 32px; font-weight: 700; }
        .tagline { font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); }

        .controls { display: flex; flex-direction: column; gap: 10px; padding: 20px; background: var(--paper2); border-bottom: 1px solid var(--rule); }
        input, select, button { font-family: 'IBM Plex Mono', monospace; padding: 10px; border: 1px solid var(--rule); font-size: 12px; }
        .btn-main { background: var(--ink); color: white; border: none; cursor: pointer; font-weight: bold; }

        .container { max-width: 800px; margin: 0 auto; padding: 20px; }
        .feed-item { margin-bottom: 30px; border-bottom: 1px solid var(--rule); padding-bottom: 20px; }
        .headline { font-family: 'Playfair Display', serif; font-size: 22px; color: var(--ink); text-decoration: none; font-weight: 700; display: block; margin-bottom: 8px; }
        .description { font-size: 15px; color: #444; margin-bottom: 10px; }
        .meta { font-family: 'IBM Plex Mono', monospace; font-size: 9px; color: var(--muted); text-transform: uppercase; }

        #reader-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--paper); z-index: 200; overflow-y: auto; padding: 20px; }
        .reader-header { display: flex; justify-content: space-between; border-bottom: 2px solid var(--ink); padding-bottom: 10px; margin-bottom: 20px; }
        .ai-chat-box { background: white; border: 2px solid var(--accent); padding: 15px; margin-top: 20px; border-radius: 6px; }
        .chat-history { max-height: 200px; overflow-y: auto; margin-bottom: 10px; font-size: 14px; }
    </style>
</head>
<body>

<div class="masthead">
    <div class="tagline" id="current-date">Financial Intelligence Terminal</div>
    <div class="masthead-title">Gemini Pulse</div>
</div>

<div class="controls">
    <input type="password" id="api-key" placeholder="Enter Gemini API Key">
    <select id="feed-selector" onchange="loadFeed()">
        <optgroup label="Business & Markets">
            <option value="https://www.business-standard.com/rss/latest.rss">Business Standard (Latest)</option>
            <option value="https://www.thehindubusinessline.com/feeder/default.rss">Business Line</option>
            <option value="https://economictimes.indiatimes.com/rssfeedsdefault.cms">Economic Times</option>
            <option value="https://www.livemint.com/rss/markets">Livemint Markets</option>
            <option value="https://www.moneycontrol.com/rss/MCtopnews.xml">Moneycontrol</option>
        </optgroup>
        <optgroup label="Opinion & Editorial">
            <option value="https://www.livemint.com/rss/opinion">Livemint Opinion</option>
            <option value="https://www.thehindu.com/opinion/editorial/feeder/default.rss">The Hindu Editorial</option>
            <option value="https://theprint.in/category/opinion/feed/">ThePrint Opinion</option>
        </optgroup>
        <optgroup label="General News">
            <option value="https://indianexpress.com/feed/">Indian Express</option>
            <option value="https://timesofindia.indiatimes.com/rssfeedstopstories.cms">TOI Top Stories</option>
        </optgroup>
    </select>
</div>

<div class="container" id="rss-output"></div>

<div id="reader-overlay">
    <div class="reader-header">
        <button onclick="closeReader()">🔙 BACK</button>
        <span class="tagline">Analysis Terminal</span>
    </div>
    <div id="reader-content"></div>
    <div class="ai-chat-box">
        <div class="tagline" style="color:var(--accent)">Pulse AI Analyst</div>
        <div id="chat-history" class="chat-history"></div>
        <div style="display:flex; gap:5px;">
            <input type="text" id="chat-input" style="flex:1" placeholder="Ask follow-up...">
            <button class="btn-main" onclick="askAI()">ASK</button>
        </div>
    </div>
</div>

<script>
    const MODEL = "gemini-3.1-flash-lite-preview";
    let activeArticleText = "";

    window.onload = () => {
        document.getElementById('current-date').innerText = new Date().toDateString();
        const savedKey = localStorage.getItem('pulse_key');
        if(savedKey) document.getElementById('api-key').value = savedKey;
        loadFeed();
    };

    function loadFeed() {
        const url = document.getElementById('feed-selector').value;
        const out = document.getElementById('rss-output');
        out.innerHTML = "📡 Syncing...";

        fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(url)}`)
            .then(res => res.json())
            .then(data => {
                let html = "";
                data.items.forEach((item) => {
                    const timeAgo = item.pubDate; // Could refine to "X hrs ago" logic
                    html += `
                        <div class="feed-item">
                            <a class="headline" href="#" onclick="openDeepDive('${encodeURIComponent(item.link)}', '${encodeURIComponent(item.title)}')">${item.title}</a>
                            <p class="description">${item.description.replace(/<[^>]*>?/gm, '').substring(0, 200)}...</p>
                            <div class="meta">${timeAgo} — ${data.feed.title} | <button onclick="openDeepDive('${encodeURIComponent(item.link)}', '${encodeURIComponent(item.title)}')">DEEP DIVE ✨</button></div>
                        </div>`;
                });
                out.innerHTML = html;
            });
    }

    async function openDeepDive(url, title) {
        url = decodeURIComponent(url);
        title = decodeURIComponent(title);
        const overlay = document.getElementById('reader-overlay');
        const content = document.getElementById('reader-content');
        const apiKey = document.getElementById('api-key').value;
        localStorage.setItem('pulse_key', apiKey);

        overlay.style.display = 'block';
        content.innerHTML = `<h1>${title}</h1><p>Extracting intelligence data...</p>`;

        try {
            const res = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(url)}`);
            const data = await res.json();
            const parser = new DOMParser();
            const doc = parser.parseFromString(data.contents, "text/html");
            const paragraphs = Array.from(doc.querySelectorAll('p')).map(p => p.innerText).join("\n\n");
            activeArticleText = paragraphs || "Automated extraction blocked. AI will use available context.";
            content.innerHTML = `<h1>${title}</h1><div style="white-space:pre-wrap">${activeArticleText.substring(0, 2000)}...</div>`;
        } catch (e) {
            content.innerHTML = `<h1>${title}</h1><p>Extraction restricted by source security.</p>`;
        }
    }

    function closeReader() { document.getElementById('reader-overlay').style.display = 'none'; }

    async function askAI() {
        const input = document.getElementById('chat-input');
        const history = document.getElementById('chat-history');
        const apiKey = document.getElementById('api-key').value;
        const question = input.value;
        if(!question || !apiKey) return;

        history.innerHTML += `<div><b>You:</b> ${question}</div>`;
        input.value = "Processing...";

        const prompt = `Analyze this article: ${activeArticleText.substring(0, 5000)}\nQuestion: ${question}\nLimit answer to the article facts.`;
        
        try {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${MODEL}:generateContent?key=${apiKey}`, {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
            });
            const data = await res.json();
            const answer = data.candidates[0].content.parts[0].text;
            history.innerHTML += `<div style="color:var(--accent)"><b>AI:</b> ${answer}</div>`;
        } catch (e) { history.innerHTML += `<div style="color:red">AI Communication Error</div>`; }
        input.value = "";
    }
</script>
</body>
</html>
