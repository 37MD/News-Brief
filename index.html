<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>RSS Feed Reader</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 20px auto;
            color: #333;
        }
        .feed-item {
            margin-bottom: 16px;
            line-height: 1.4;
        }
        .headline {
            font-size: 16px;
            color: #0044cc;
            text-decoration: none;
            font-weight: bold;
        }
        .headline:hover {
            text-decoration: underline;
        }
        .source {
            font-size: 10px; /* Very small font for the source */
            color: #777;
            display: block;
            margin-top: 2px;
        }
    </style>
</head>
<body>

    <h2>BusinessLine Feed</h2>
    <div id="rss-output">Fetching feeds...</div>

    <script>
        // The specific URL you requested
        const targetUrl = 'https://www.thehindubusinessline.com/feeder/default.rss';
        
        // A CORS proxy is required because browsers block direct cross-origin XML requests
        const proxyUrl = 'https://api.allorigins.win/raw?url=' + encodeURIComponent(targetUrl);

        fetch(proxyUrl)
            .then(response => response.text())
            .then(str => new window.DOMParser().parseFromString(str, "text/xml"))
            .then(data => {
                const items = data.querySelectorAll("item");
                let htmlOutput = "";

                items.forEach(item => {
                    const title = item.querySelector("title").textContent;
                    const link = item.querySelector("link").textContent;
                    
                    htmlOutput += `
                        <div class="feed-item">
                            <a href="${link}" class="headline" target="_blank">${title}</a>
                            <span class="source">Source: The Hindu BusinessLine</span>
                        </div>
                    `;
                });

                document.getElementById("rss-output").innerHTML = htmlOutput;
            })
            .catch(err => {
                console.error("Error loading feed:", err);
                document.getElementById("rss-output").innerHTML = "Error loading the RSS feed.";
            });
    </script>

</body>
</html>
