<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width">
  <title>Pulse 14A — Pure Local Intelligence</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&family=Noto+Sans:wght@400;500&family=Noto+Sans+Devanagari:wght@400;500&display=swap" rel="stylesheet">
  <style>
    /* ═══ BASE ═══ */
    :root {
      --ink:            #000000;
      --paper:          #f5f0e8;
      --accent:         #1a5c3a;
      --rule:           #c8c0b0;
      --error:          #8b0000;
      --reader-font-sz: 17px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--paper); font-family: 'IBM Plex Sans', 'Noto Sans', 'Noto Sans Devanagari', sans-serif; min-height: 100vh; line-height: 1.5; color: var(--ink); }

    /* ═══ CONTROLS BAR ═══ */
    .controls-bar {
      position: relative; padding: 5px 20px 0;
      display: flex; justify-content: center; gap: 8px; flex-wrap: wrap;
      border-bottom: 1px solid var(--rule); background: #e4eaf2;
    }
    .controls-row1 {
      width: 100%; display: flex; justify-content: center; align-items: center;
      gap: 8px; flex-wrap: wrap; padding-bottom: 5px;
    }
    .controls-row2 {
      width: 100%; text-align: center;
      font-family: 'IBM Plex Mono', monospace; font-size: 9px;
      letter-spacing: 0.04em; padding: 5px 0 7px;
      border-top: 1px solid var(--rule);
      display: none;
    }
    .controls-row2.visible { display: block; }
    .btn-outline {
      font-family: 'IBM Plex Mono', monospace; font-size: 11px;
      background: transparent; border: 1px solid var(--accent);
      padding: 6px 12px; border-radius: 4px; cursor: pointer;
      text-transform: uppercase; font-weight: 700; transition: background 0.2s; white-space: nowrap;
      color: #000000;
    }
    .btn-outline:hover    { background: #d0d7e0; }
    .btn-outline:disabled { opacity: 0.4; cursor: not-allowed; }
    #key-mgr-btn          { border-color: #009e70; }
    #key-mgr-btn:hover    { background: #d0ede3; }

    /* ═══ KEY MANAGER PANEL ═══ */
    #key-manager-box {
      display: none; position: absolute; top: 100%; left: 50%; transform: translateX(-50%);
      width: 340px; max-width: calc(100vw - 20px);
      background: #f5f0e8; border: 2px solid #009e70; border-radius: 8px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.18); z-index: 2000;
      padding: 14px 16px 12px; font-family: 'IBM Plex Mono', monospace;
      color: #000000;
    }
    #key-manager-box.open { display: block; }
    .km-title  { font-size: 10px; font-weight: 700; color: #009e70; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 10px; }
    .km-label  { font-size: 9px; font-weight: 600; color: #000000; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 3px; }
    .km-row    { display: flex; gap: 6px; align-items: center; margin-bottom: 9px; }
    .km-input  {
      flex: 1; font-size: 11px; padding: 6px 9px; border-radius: 5px;
      border: 1.5px solid #000000; background: #e4eaf2;
      outline: none; font-family: monospace; min-width: 0; color: #000000;
    }
    .km-input:focus { border-color: #009e70; }
    .km-save {
      background: #e4eaf2; border: 1.5px solid #000000; border-radius: 5px;
      padding: 6px 10px; font-size: 9px; cursor: pointer; white-space: nowrap;
      font-family: 'IBM Plex Mono', monospace; font-weight: 600; min-width: 72px; transition: all 0.2s; color: #000000;
    }
    .km-save.active { background: #009e70 !important; color: #000000 !important; border-color: #009e70 !important; }
    .km-status { font-size: 8.5px; color: #000000; line-height: 1.6; margin-bottom: 6px; }
    .km-footer { font-size: 7.5px; color: #000000; margin-top: 4px; }
    .km-footer span { color: #009e70; font-weight: 600; }
    .km-bottom { display: flex; justify-content: space-between; align-items: center; gap: 8px; margin-top: 8px; }
    .km-bottom > div { flex: 1; min-width: 0; }
    .km-model-select {
      font-family: 'IBM Plex Mono', monospace; font-size: 10px;
      border: 1px solid #000000; border-radius: 4px; padding: 4px 6px;
      background: #e4eaf2; cursor: pointer; outline: none; color: #000000;
      width: 100%; text-overflow: ellipsis; white-space: nowrap; overflow: hidden;
    }
    .km-close {
      background: #e4eaf2; border: 1.5px solid #000000; border-radius: 5px;
      padding: 4px 12px; font-size: 9px; cursor: pointer; font-family: 'IBM Plex Mono', monospace; color: #000000;
    }
    .km-close:hover { background: #c8c0b0; }

    /* ═══ MASTHEAD ═══ */
    .masthead { border-bottom: 2px solid var(--ink); padding: 7px 20px 6px; text-align: center; background: var(--paper); }
    .masthead-title { font-family: 'Playfair Display', serif; font-size: 26px; font-weight: 700; line-height: 1.1; }
    .tagline { font-family: 'IBM Plex Mono', monospace; font-size: 9px; letter-spacing: 0.15em; text-transform: uppercase; margin-top: 2px; }

    /* ═══ KEY STATUS BADGE ═══ */
    #key-status-badge {
      font-family: 'IBM Plex Mono', monospace; font-size: 9px; text-align: center;
      padding: 2px 0 1px; letter-spacing: 0.05em; color: #000000;
    }

    .feed-status-bar {
      max-width: 800px; margin: 4px auto 0; padding: 0 15px;
      font-family: 'IBM Plex Mono', monospace; font-size: 10px;
      text-transform: uppercase; letter-spacing: 0.05em; text-align: center;
    }

    .container { max-width: 800px; margin: 0 auto; padding: 8px 15px 40px; }

    /* ═══ FEED ITEMS ═══ */
    .feed-item { margin-bottom: 14px; border-bottom: 1px solid var(--rule); padding-bottom: 20px; animation: fadeIn 0.3s ease forwards; }
    .feed-item:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

    .headline { font-family: 'Playfair Display', serif; font-size: 22px; text-decoration: none; font-weight: 700; display: block; line-height: 1.25; margin: 0 auto 10px auto; max-width: 65ch; word-break: break-word; overflow-wrap: anywhere; cursor: pointer; text-align: center; color: #000000; }
    .headline:hover { text-decoration: underline; }
    .description { font-size: var(--reader-font-sz); margin: 0 auto 12px auto; line-height: 1.75; color: #000000; font-weight: 400; text-align: justify; hyphens: auto; -webkit-hyphens: auto; max-width: 65ch; word-break: break-word; overflow-wrap: anywhere; cursor: pointer; }
    .description.reader-trigger:hover { text-decoration: underline; }
    .description.translation { border-left: 3px solid var(--accent); background: rgba(26,92,58,0.05); padding: 6px 10px; border-radius: 0 4px 4px 0; font-weight: 400; }
    .meta { font-family: 'IBM Plex Mono', monospace; font-size: 10px; text-transform: uppercase; letter-spacing: 0.05em; margin: 12px auto 0 auto; color: #000000; max-width: 65ch; display: flex; justify-content: space-between; align-items: center; }
    .system-msg { font-family: 'IBM Plex Mono', monospace; font-size: 12px; text-align: center; margin-top: 30px; line-height: 1.5; color: #000000; }
    
    .feed-item-error .headline { color: #000000; font-style: italic; font-size: 18px; }
    .feed-item-error .error-msg { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: #000000; margin: 4px auto 8px auto; word-break: break-word; overflow-wrap: anywhere; max-width: 65ch; text-align: center; }
    
    .view-original-btn { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: #000000; text-decoration: underline; cursor: pointer; background: none; border: none; padding: 0; letter-spacing: 0.03em; font-weight: 700; }
    .view-original-btn:hover { color: #1a5c3a; }

    /* ═══ READER PANEL ═══ */
    #summary-backdrop {
      display: none; position: fixed; inset: 0;
      background: rgba(245,240,232,0.85); z-index: 998; backdrop-filter: blur(2px);
    }
    #summary-backdrop.open { display: block; }

    #reader-panel {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      width: 100%; height: 100%;
      background: var(--paper); z-index: 999;
      display: flex; flex-direction: column;
      opacity: 0; pointer-events: none;
      transition: opacity 0.2s ease;
    }
    #reader-panel.open { opacity: 1; pointer-events: all; }

    #reader-progress { position: absolute; top: 0; left: 0; height: 3px; width: 0%; background: var(--ink); transition: width 0.2s; z-index: 5; }

    .reader-topbar { display: flex; align-items: center; gap: 10px; padding: 10px 15px; border-bottom: 1px solid var(--rule); background: #e4eaf2; flex-shrink: 0; position: relative; z-index: 20; color: #000000; }
    .reader-back-btn { font-family: 'IBM Plex Mono', monospace; font-size: 11px; font-weight: 700; text-transform: uppercase; background: transparent; border: 1px solid var(--ink); padding: 5px 14px; border-radius: 4px; cursor: pointer; white-space: nowrap; transition: background 0.2s; letter-spacing: 0.04em; color: #000000; }
    .reader-back-btn:hover { background: #c8c0b0; }
    .reader-source-url { font-family: 'IBM Plex Mono', monospace; font-size: 10px; flex: 1; color: #000000; }
    .reader-font-ctrl { display: flex; gap: 4px; }
    .reader-font-ctrl button { font-family: 'IBM Plex Mono', monospace; font-size: 12px; font-weight: 700; background: transparent; border: 1px solid var(--ink); width: 26px; height: 26px; border-radius: 4px; cursor: pointer; transition: background 0.2s; color: #000000; }
    .reader-font-ctrl button:hover { background: #c8c0b0; }
    .reader-open-btn { font-family: 'IBM Plex Mono', monospace; font-size: 10px; font-weight: 700; text-transform: uppercase; background: #e4eaf2; border: 1px solid var(--ink); padding: 4px 8px; border-radius: 4px; cursor: pointer; white-space: nowrap; color: #000000; }

    .reader-scroll { overflow-y: auto; flex: 1; padding: 28px 20px 60px; position: relative; z-index: 10; }
    .reader-scroll-inner { max-width: 720px; margin: 0 auto; }
    .reader-article-title { font-family: 'Playfair Display', serif; font-size: clamp(20px,3vw,28px); font-weight: 700; line-height: 1.2; margin-bottom: 10px; text-align: center; color: #000000; }
    .reader-article-meta { font-family: 'IBM Plex Mono', monospace; font-size: 10px; text-transform: uppercase; margin-bottom: 20px; padding-bottom: 10px; border-bottom: 1px solid var(--rule); color: #000000; }
    .reader-body { font-size: var(--reader-font-sz); line-height: 1.7; padding-bottom: 20px; color: #000000; font-weight: 400; }
    .reader-body h1,.reader-body h2,.reader-body h3,.reader-body h4 { font-family: 'Playfair Display', serif; margin: 1.2em 0 0.5em; line-height: 1.2; color: #000000; font-weight: 700; text-align: center; }
    .reader-body p { margin-bottom: 1em; font-weight: 400; color: #000000; text-align: justify; hyphens: auto; -webkit-hyphens: auto; }
    .translation-header { font-family: 'Playfair Display', serif; font-size: 1.2em; font-weight: 700; margin: 30px 0 15px; padding-top: 20px; border-top: 2px dashed var(--rule); text-align: center; color: #000000; }

    /* ═══ SUMMARY MODAL ═══ */
    #summary-modal {
      display: flex; visibility: hidden;
      position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
      width: 90%; max-width: 800px; max-height: 85vh;
      background: var(--paper); z-index: 1000; border-radius: 8px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.3); flex-direction: column; border: 2px solid var(--ink);
    }
    #summary-modal.open { visibility: visible; }
    .summary-header { display: flex; justify-content: space-between; padding: 12px 16px; border-bottom: 2px solid var(--ink); align-items: center; background: #e4eaf2; border-radius: 6px 6px 0 0; color: #000000; }
    .summary-title { font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 700; text-align: center; }
    .summary-content-area { padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; background: #f5f0e8; }
    .summary-box { border: 1px solid var(--ink); border-radius: 6px; background: #f5f0e8; overflow: hidden; }
    .summary-box-title { background: #e4eaf2; padding: 8px 12px; font-family: 'IBM Plex Mono', monospace; font-size: 11px; font-weight: 700; text-transform: uppercase; border-bottom: 1px solid var(--ink); text-align: center; color: #000000; }
    .summary-box-content { 
      padding: 15px 20px; 
      font-size: var(--reader-font-sz); 
      line-height: 1.75; 
      background: #f5f0e8; 
      color: #000000; 
      font-weight: 400; 
      text-align: justify; 
      hyphens: auto; 
      -webkit-hyphens: auto; 
      max-width: 65ch; 
      margin: 0 auto; 
    }

    /* ═══ AI CHAT PANEL ═══ */
    #ai-panel {
      position: absolute; top: 50px; right: 15px; width: 340px; max-width: calc(100vw - 30px);
      background: #f5f0e8; border: 2px solid var(--ink); border-radius: 8px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.15); display: flex; flex-direction: column;
      opacity: 0; pointer-events: none; transform: translateY(-10px);
      transition: all 0.2s ease; max-height: 65vh; z-index: 1005;
    }
    #ai-panel.open { opacity: 1; pointer-events: auto; transform: translateY(0); }
    .ai-header { display: flex; justify-content: space-between; align-items: center; padding: 10px 12px; background: #e4eaf2; border-bottom: 1px solid var(--ink); border-radius: 6px 6px 0 0; font-family: 'IBM Plex Mono', monospace; font-size: 11px; font-weight: 700; text-transform: uppercase; color: #000000; }
    #ai-quota-status { font-size: 8px; font-family: 'IBM Plex Mono', monospace; font-weight: 400; text-transform: none; letter-spacing: 0; color: #000000; flex: 1; text-align: right; padding-right: 6px; }
    .ai-close-btn { background: transparent; border: none; font-size: 18px; cursor: pointer; font-weight: 700; color: #000000; }
    .ai-chat-area { padding: 12px; overflow-y: auto; flex: 1; font-size: 13px; line-height: 1.5; background: #f5f0e8; }
    .ai-message { margin-bottom: 12px; padding: 10px 12px; border-radius: 6px; background: #e4eaf2; border: 1px solid #c8c0b0; color: #000000; line-height: 1.7; }
    .ai-message.user   { background: #d0d7e0; border-left: 3px solid var(--ink); }
    .ai-message.system { font-style: italic; background: transparent; padding: 0; border: none; }
    .ai-message.status { font-size: 11px; color: #000000; background: #d0d7e0; border-left: 3px solid #000000; padding: 6px 10px; font-style: italic; }
    .ai-quick-prompts { display: flex; gap: 6px; padding: 0 12px 10px; overflow-x: auto; background: #f5f0e8; }
    .ai-quick-prompts button { background: #e4eaf2; border: 1px solid var(--ink); padding: 4px 10px; border-radius: 15px; font-size: 11px; font-weight: 700; cursor: pointer; color: #000000; }
    .ai-input-area { display: flex; padding: 10px 12px; border-top: 1px solid var(--ink); background: #e4eaf2; border-radius: 0 0 6px 6px; }
    .ai-input-area input { flex: 1; border: 1px solid var(--ink); border-radius: 4px; padding: 8px 10px; font-size: 13px; outline: none; color: #000000; background: #f5f0e8; }
    .ai-input-area button { background: #d0d7e0; border: 1px solid var(--ink); border-radius: 4px; padding: 0 12px; margin-left: 6px; cursor: pointer; font-weight: 700; color: #000000; }

    /* ═══ PROCESSING OVERLAY ═══ */
    #processing-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(245,240,232,0.96); z-index: 3000;
      flex-direction: column; align-items: center; justify-content: center;
      font-family: 'IBM Plex Mono', monospace; gap: 18px;
    }
    #processing-overlay.active { display: flex; }
    .proc-spinner { width: 44px; height: 44px; border: 3px solid #c8c0b0; border-top-color: #000000; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .proc-title { font-size: 13px; font-weight: 700; text-transform: uppercase; color: #000000; }
    .proc-bar-wrap { width: 240px; height: 4px; background: #c8c0b0; border-radius: 2px; overflow: hidden; }
    .proc-bar { height: 100%; width: 0%; background: #000000; transition: width 0.4s ease; }

    .reader-extract { max-width: 65ch; margin-left: auto; margin-right: auto; }
    .reader-text-para { margin-bottom: 1em; line-height: 1.75; text-align: justify; font-size: var(--reader-font-sz); color: #000000; }
    .reader-extract-heading { font-family: 'Playfair Display', serif; font-size: 1.1em; font-weight: 700; color: #000000; margin: 1.4em 0 0.5em; text-align: center; }

    @media (max-width: 600px) {
      .masthead-title { font-size: 22px; }
      #ai-panel { top: auto; bottom: 10px; right: 6px; left: 6px; width: auto; max-height: 50vh; }
      .reader-body { font-size: 15px; }
      #key-manager-box { width: calc(100vw - 16px); left: 8px; transform: none; }
    }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script>
    if (window.pdfjsLib) {
      pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    }
  </script>
</head>

<body>
  <div class="controls-bar">
    <div class="controls-row1">
      <button class="btn-outline" id="overall-summary-btn" style="display:none;">📊 PDF Summary</button>
      <button class="btn-outline" id="upload-pdf-btn"><span class="upload-ring"></span>📄 Upload PDF</button>
      <input type="file" id="pdf-file-input" accept=".pdf,application/pdf" style="display:none;">
      <button class="btn-outline" id="key-mgr-btn" title="Manage Gemini API Keys" style="padding:6px 10px;font-size:15px;line-height:1;">🔑</button>
    </div>
    <div class="controls-row2" id="key-status-badge"></div>

    <div id="key-manager-box">
      <div class="km-title">🔑 Gemini API Key Manager — Pulse 14A</div>
      <div class="km-label">Primary Key (K1)</div>
      <div class="km-row">
        <input id="km-k1-input" class="km-input" type="password" placeholder="AIza… (paste Key 1 here)" autocomplete="off">
        <button id="km-k1-save" class="km-save">💾 Save K1</button>
      </div>
      <div class="km-label">Backup Key (K2)</div>
      <div class="km-row">
        <input id="km-k2-input" class="km-input" type="password" placeholder="AIza… (paste Key 2 here)" autocomplete="off">
        <button id="km-k2-save" class="km-save">💾 Save K2</button>
      </div>
      <div id="km-status" class="km-status"></div>
      <div class="km-bottom">
        <div>
          <div class="km-label">Gemini Model</div>
          <select id="km-model-select" class="km-model-select">
            <option value="gemini-3.1-flash-lite">Gemini 3.1 Flash-Lite (Default)</option>
            <option value="gemini-3-flash">Gemini 3 Flash</option>
            <option value="gemini-3.1-pro">Gemini 3.1 Pro</option>
          </select>
        </div>
        <button id="km-close-btn" class="km-close">✕ Close</button>
      </div>
    </div>
  </div>

  <div class="masthead">
    <div class="masthead-title">Pulse<span style="font-size:10px;font-weight:400;font-family:'IBM Plex Mono',monospace;vertical-align:super;margin-left:4px;opacity:0.6;">14A</span></div>
    <div class="tagline">Pure Local Intelligence</div>
  </div>
  <div class="feed-status-bar"><span id="item-count"></span></div>

  <div class="container">
    <div id="rss-output" aria-live="polite">
      <div class="system-msg" id="welcome-msg"></div>
    </div>
  </div>

  <div id="processing-overlay">
    <div class="proc-spinner"></div>
    <div class="proc-title" id="proc-title">Processing PDF</div>
    <div class="proc-step" id="proc-step">Starting…</div>
    <div class="proc-bar-wrap"><div class="proc-bar" id="proc-bar"></div></div>
    <div class="proc-note" id="proc-note"></div>
  </div>

  <div id="reader-panel" role="dialog" aria-modal="true">
    <div id="reader-progress"></div>
    <div class="reader-topbar">
      <button class="reader-back-btn" id="reader-back">← Back</button>
      <span class="reader-source-url" id="reader-url-label"></span>
      <div class="reader-font-ctrl">
        <button id="font-down">A−</button>
        <button id="font-up">A+</button>
      </div>
      <button class="reader-open-btn" id="reader-ai-toggle" style="display:none;">✨ Ask AI</button>
    </div>
    <div class="reader-scroll" id="reader-scroll">
      <div class="reader-scroll-inner">
        <div id="reader-content"></div>
      </div>
    </div>
    <div id="ai-panel">
      <div class="ai-header">
        <span>✨ Gemini Assistant</span>
        <span id="ai-quota-status"></span>
        <button class="ai-close-btn" id="ai-close-btn">×</button>
      </div>
      <div class="ai-chat-area" id="ai-chat-area"></div>
      <div class="ai-input-area">
        <input type="text" id="ai-input" placeholder="Ask Gemini..." autocomplete="off">
        <button id="ai-submit">Ask</button>
      </div>
    </div>
  </div>

  <div id="summary-backdrop" aria-hidden="true"></div>
  <div id="summary-modal" role="dialog" aria-modal="true">
    <div class="summary-header">
      <div class="summary-title">Overall PDF Intelligence</div>
      <button class="ai-close-btn" id="summary-close-btn">×</button>
    </div>
    <div class="summary-content-area">
      <div class="summary-box">
        <div class="summary-box-title">Summary</div>
        <div class="summary-box-content" id="modal-summary-content"></div>
      </div>
    </div>
  </div>

  <script>
  'use strict';
  const CONFIG = Object.freeze({
    MAX_DESC_CHARS:  500,
    READER_FONT_DEF: 17,
    GEMINI_MODELS:   ['gemini-3.1-flash-lite', 'gemini-3-flash', 'gemini-3.1-pro']
  });

  const DOM = {
    output: document.getElementById('rss-output'),
    welcomeMsg: document.getElementById('welcome-msg'),
    itemCount: document.getElementById('item-count'),
    keyStatusBadge: document.getElementById('key-status-badge'),
    overallSummaryBtn: document.getElementById('overall-summary-btn'),
    summaryModal: document.getElementById('summary-modal'),
    summaryBackdrop: document.getElementById('summary-backdrop'),
    modalSummary: document.getElementById('modal-summary-content'),
    uploadPdfBtn: document.getElementById('upload-pdf-btn'),
    pdfFileInput: document.getElementById('pdf-file-input'),
    keyMgrBtn: document.getElementById('key-mgr-btn'),
    keyManagerBox: document.getElementById('key-manager-box'),
    kmK1Input: document.getElementById('km-k1-input'),
    kmK2Input: document.getElementById('km-k2-input'),
    kmK1Save: document.getElementById('km-k1-save'),
    kmK2Save: document.getElementById('km-k2-save'),
    kmStatus: document.getElementById('km-status'),
    kmModelSelect: document.getElementById('km-model-select'),
    procOverlay: document.getElementById('processing-overlay'),
    procBar: document.getElementById('proc-bar'),
    readerPanel: document.getElementById('reader-panel'),
    readerContent: document.getElementById('reader-content'),
    aiToggle: document.getElementById('reader-ai-toggle'),
    aiPanel: document.getElementById('ai-panel'),
    aiChatArea: document.getElementById('ai-chat-area'),
    aiInput: document.getElementById('ai-input'),
    aiSubmit: document.getElementById('ai-submit'),
    aiQuotaStatus: document.getElementById('ai-quota-status'),
  };

  let feedCache = {};
  let currentArticleText = '';
  let _activeKeySlot = 1;
  let _activeCascadeModel = null;

  function _getRawKey(slot) {
    return localStorage.getItem(slot === 2 ? 'pulse_k2' : 'pulse_k1');
  }

  function getGeminiKey() {
    return _getRawKey(_activeKeySlot) || _getRawKey(1);
  }

  function getGeminiModel() {
    return localStorage.getItem('pulse_model') || CONFIG.GEMINI_MODELS[0];
  }

  function _updateKeyStatusBadge() {
    const k1 = _getRawKey(1), k2 = _getRawKey(2);
    const mod = getGeminiModel();
    DOM.keyStatusBadge.innerHTML = `Gemini 3 Active · Model: ${mod} · Keys: ${k1?'K1 ':''}${k2?'K2':''}`;
    if (DOM.welcomeMsg) DOM.welcomeMsg.innerHTML = k1 ? "Ready for PDF Upload." : "Tap 🔑 to add your Gemini API key.";
  }

  async function callGemini(promptText, statusEl) {
    const k1 = _getRawKey(1), k2 = _getRawKey(2);
    const selectedModel = getGeminiModel();
    const modelQueue = CONFIG.GEMINI_MODELS.slice(CONFIG.GEMINI_MODELS.indexOf(selectedModel));

    for (const model of modelQueue) {
      for (const slot of [1, 2]) {
        const k = slot === 1 ? k1 : k2;
        if (!k) continue;
        const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${k}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ contents: [{ parts: [{ text: promptText }] }] })
        });
        if (res.status === 429) continue;
        _activeKeySlot = slot;
        _activeCascadeModel = model;
        return res;
      }
    }
    throw new Error('Quota hit on all keys/models.');
  }

  async function processPdf(file) {
    DOM.procOverlay.classList.add('active');
    const arrayBuffer = await file.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
    const items = [];
    
    for (let i = 1; i <= pdf.numPages; i++) {
      const page = await pdf.getPage(i);
      const content = await page.getTextContent();
      const text = content.items.map(it => it.str).join(' ');
      items.push({ title: `Page ${i}`, description: text.substring(0, 200) + '...', full_text: text });
      DOM.procBar.style.width = (i / pdf.numPages * 100) + '%';
    }

    feedCache['pdf'] = { items };
    renderFeed(items, file.name);
    DOM.procOverlay.classList.remove('active');
    DOM.overallSummaryBtn.style.display = 'inline-flex';
  }

  function renderFeed(items, name) {
    DOM.output.innerHTML = items.map((item, idx) => `
      <div class="feed-item">
        <span class="headline" onclick="openReader(${idx})">${item.title}</span>
        <p class="description">${item.description}</p>
        <div class="meta">Page ${idx+1} · ${name}</div>
      </div>
    `).join('');
    DOM.itemCount.textContent = `${items.length} sections extracted`;
  }

  window.openReader = (idx) => {
    const item = feedCache['pdf'].items[idx];
    currentArticleText = item.full_text;
    DOM.readerContent.innerHTML = `<h1 class="reader-article-title">${item.title}</h1><div class="reader-body">${item.full_text}</div>`;
    DOM.readerPanel.classList.add('open');
    DOM.aiToggle.style.display = 'inline-block';
  };

  DOM.keyMgrBtn.onclick = () => DOM.keyManagerBox.classList.toggle('open');
  DOM.kmK1Save.onclick = () => { localStorage.setItem('pulse_k1', DOM.kmK1Input.value); _updateKeyStatusBadge(); };
  DOM.kmK2Save.onclick = () => { localStorage.setItem('pulse_k2', DOM.kmK2Input.value); _updateKeyStatusBadge(); };
  DOM.kmModelSelect.onchange = (e) => { localStorage.setItem('pulse_model', e.target.value); _updateKeyStatusBadge(); };
  DOM.uploadPdfBtn.onclick = () => DOM.pdfFileInput.click();
  DOM.pdfFileInput.onchange = (e) => e.target.files[0] && processPdf(e.target.files[0]);
  document.getElementById('reader-back').onclick = () => DOM.readerPanel.classList.remove('open');
  DOM.aiToggle.onclick = () => DOM.aiPanel.classList.toggle('open');
  document.getElementById('ai-close-btn').onclick = () => DOM.aiPanel.classList.remove('open');

  DOM.aiSubmit.onclick = async () => {
    const q = DOM.aiInput.value;
    if (!q) return;
    DOM.aiChatArea.innerHTML += `<div class="ai-message user"><strong>You:</strong> ${q}</div>`;
    DOM.aiInput.value = '';
    const res = await callGemini(`Context: ${currentArticleText.substring(0, 10000)}\nQuestion: ${q}`);
    const data = await res.json();
    const ans = data.candidates?.[0]?.content?.parts?.[0]?.text || "Error.";
    DOM.aiChatArea.innerHTML += `<div class="ai-message"><strong>Pulse:</strong> ${ans}</div>`;
    DOM.aiChatArea.scrollTop = DOM.aiChatArea.scrollHeight;
    DOM.aiQuotaStatus.textContent = _activeCascadeModel.replace('gemini-3.1-flash-lite','Lite').replace('gemini-3-flash','Flash').replace('gemini-3.1-pro','Pro');
  };

  DOM.overallSummaryBtn.onclick = () => {
    DOM.summaryBackdrop.classList.add('open');
    DOM.summaryModal.classList.add('open');
    DOM.modalSummary.textContent = "Summarizing entire PDF...";
    const allText = feedCache['pdf'].items.map(i => i.full_text).join(' ').substring(0, 15000);
    callGemini(`Summarize: ${allText}`).then(r => r.json()).then(d => {
      DOM.modalSummary.textContent = d.candidates?.[0]?.content?.parts?.[0]?.text;
    });
  };

  document.getElementById('summary-close-btn').onclick = () => {
    DOM.summaryBackdrop.classList.remove('open');
    DOM.summaryModal.classList.remove('open');
  };

  _updateKeyStatusBadge();
  </script>
</body>
</html>
