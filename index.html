<html lang="en">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root { --ink: #1a1a18; --paper: #f5f0e8; --paper2: #ede8de; --accent: #1a5c3a; --rule: #c8c0b0; --muted: #7a7468; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--paper); color: var(--ink); font-family: 'IBM Plex Sans', sans-serif; min-height: 100vh; line-height: 1.6; }
  .masthead { border-bottom: 3px double var(--ink); padding: 30px 20px; text-align: center; background: var(--paper); }
  .masthead-title { font-family: 'Playfair Display', serif; font-size: clamp(32px, 5vw, 56px); font-weight: 700; }
  .tagline { font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); margin-top: 8px; }
  .container { max-width: 800px; margin: 0 auto; padding: 20px 20px 80px; }
  .setup-box { background: var(--paper2); padding: 20px; border: 1px solid var(--rule); margin-bottom: 30px; border-radius: 4px; }
  input, button { font-family: 'IBM Plex Mono', monospace; padding: 12px; border: 1px solid var(--rule); font-size: 13px; }
  .btn-main { background: var(--ink); color: white; cursor: pointer; width: 100%; font-weight: bold; text-transform: uppercase; border: none; letter-spacing: 1px; transition: 0.2s; }
  #status { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--muted); text-align: center; margin: 20px 0; padding: 10px; border: 1px dashed var(--rule); background: #fff; }
  .section { margin-bottom: 40px; border-bottom: 1px solid var(--rule); padding-bottom: 25px; animation: fadeIn 0.4s ease; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .section h2 { font-family: 'Playfair Display', serif; color: var(--accent); font-size: 24px; margin-bottom: 12px; }
  .btn-row { display: flex; gap: 10px; margin-top: 15px; }
  .action-btn { font-size: 10px; background: white; border: 1px solid var(--accent); color: var(--accent); cursor: pointer; padding: 6px 14px; border-radius: 4px; font-weight: bold; }
  .detail-box { background: white; padding: 20px; border-left: 5px solid var(--accent); margin-top: 15px; display: none; font-size: 14px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
  .detail-box h3 { margin-bottom: 10px; color: var(--accent); border-bottom: 1px solid #eee; padding-bottom: 5px; font-family: 'Playfair Display', serif; }
</style>
</head>
<body>

<div class="masthead">
    <div class="tagline" id="header-date">Financial Intelligence Terminal</div>
    <div class="masthead-title">Gemini Pulse</div>
    <div class="tagline" id="last-update">System Initializing</div>
</div>

<div class="container">
  <div id="setup" class="setup-box">
    <input type="password" id="api-key" placeholder="AI Studio API Key" style="width: 70%">
    <button onclick="saveKey()">Save Key</button>
  </div>

  <button class="btn-main" onclick="runBriefing()">Pull Market Intelligence</button>
  <div id="status">System Ready</div>

  <div id="briefing-output"></div>
</div>

<script>
const MODEL_ID = "gemini-3.1-flash-lite-preview"; 
const FEED_URLS = [
  'https://pulse.zerodha.com/feed.php',
  'https://economictimes.indiatimes.com/rssfeedsdefault.cms',
  'https://www.livemint.com/rss/markets',
  'https://www.moneycontrol.com/rss/MCtopnews.xml'
];

function saveKey() {
  const key = document.getElementById('api-key').value.trim();
  if(!key) return alert("Enter key");
  localStorage.setItem('gemini_key', key);
  document.getElementById('setup').style.display = 'none';
}

window.onload = () => {
  if(localStorage.getItem('gemini_key')) document.getElementById('setup').style.display = 'none';
  document.getElementById('header-date').textContent = new Date().toLocaleDateString('en-IN', { weekday: 'long', day: 'numeric', month: 'long' });
};

async function runBriefing(forceAll = false) {
  const apiKey = localStorage.getItem('gemini_key');
  if(!apiKey) return alert("Save API Key first");

  const status = document.getElementById('status');
  const lastTimestamp = forceAll ? (Date.now() - 24*60*60*1000) : parseInt(localStorage.getItem('last_timestamp') || "0");
  
  status.innerHTML = "🔍 Fetching RSS Feeds...";
  let allArticles = [];
  const seen = new Set();

  for (const url of FEED_URLS) {
    try {
      const res = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(url)}&t=${Date.now()}`);
      const data = await res.json();
      if(data.status === 'ok' && data.items) {
        data.items.forEach(item => {
          const pubTime = new Date(item.pubDate).getTime();
          const titleKey = item.title.toLowerCase().trim().slice(0, 50);
          if (pubTime > lastTimestamp && !seen.has(titleKey)) {
            seen.add(titleKey);
            allArticles.push({ title: item.title, desc: item.description.replace(/<[^>]+>/g, '').slice(0, 250), link: item.link, time: pubTime });
          }
        });
      }
    } catch (e) { console.error(e); }
  }

  if (allArticles.length === 0) {
    status.innerHTML = "No new updates. <button onclick='runBriefing(true)' style='font-size:10px; cursor:pointer;'>Force Scan (24h)</button>";
    return;
  }

  status.textContent = `🤖 Gemini is analyzing ${allArticles.length} events...`;
  try {
    const prompt = `Return ONLY JSON format: {"themes": [{"title": "Theme", "summary": "3-sentence text"}]}. NEWS: ${JSON.stringify(allArticles)}`;
    const rawResponse = await callGemini(prompt, apiKey);
    const briefingData = JSON.parse(rawResponse.replace(/```json|```/g, "").trim());
    
    renderBriefing(briefingData, allArticles);
    localStorage.setItem('last_timestamp', Math.max(...allArticles.map(a => a.time)).toString());
    status.textContent = "✅ Briefing Complete.";
  } catch (err) { status.innerHTML = "❌ AI Error: " + err.message; }
}

async function callGemini(promptText, key) {
  const url = `https://generativelanguage.googleapis.com/v1beta/models/${MODEL_ID}:generateContent?key=${key}`;
  const response = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ contents: [{ parts: [{ text: promptText }] }], generationConfig: { responseMimeType: "application/json" } })
  });
  const resData = await response.json();
  if (resData.error) throw new Error(resData.error.message);
  return resData.candidates[0].content.parts[0].text;
}

function renderBriefing(data, articles) {
  const container = document.getElementById('briefing-output');
  container.innerHTML = "";
  if (!data.themes) return;

  data.themes.forEach((theme, index) => {
    const primaryArticle = articles.find(a => theme.summary.includes(a.title.slice(0, 5))) || articles[0];
    const div = document.createElement('div');
    div.className = 'section';
    div.innerHTML = `
      <h2>${theme.title}</h2>
      <p id="sum-${index}">${theme.summary}</p>
      <div class="btn-row">
        <button class="action-btn" onclick="explainAsStory(${index})">✨ Story Mode</button>
        <button class="action-btn" onclick="fetchDetails('${primaryArticle.link}', ${index})">📈 Deep Dive Details</button>
      </div>
      <div id="detail-${index}" class="detail-box"></div>
    `;
    container.appendChild(div);
  });
}

// RESILIENT SCRAPER WITH FALLBACK PROXY
async function fetchDetails(link, index) {
  const box = document.getElementById(`detail-${index}`);
  box.style.display = 'block';
  box.innerHTML = "<i>Attempting to bypass CORS and scrape content...</i>";

  const proxies = [
    `https://api.allorigins.win/get?url=${encodeURIComponent(link)}`,
    `https://corsproxy.io/?${encodeURIComponent(link)}`
  ];

  for (let proxyUrl of proxies) {
    try {
      const res = await fetch(proxyUrl);
      let html = "";
      
      if (proxyUrl.includes("allorigins")) {
        const data = await res.json();
        html = data.contents;
      } else {
        html = await res.text();
      }

      const doc = new DOMParser().parseFromString(html, 'text/html');
      // Clean up scripts and styles to get pure content
      doc.querySelectorAll('script, style, nav, footer, header').forEach(el => el.remove());
      const bodyText = doc.body.innerText.replace(/\s\s+/g, ' ').slice(0, 5000);

      if (bodyText.length < 200) throw new Error("Content too short");

      const prompt = `Act as a senior Research Analyst. Analyze this article: "${bodyText}". 
      Write a Deep Dive report with: 1. CORE, 2. BACKGROUND, 3. SEQUENCE, 4. INVESTOR VIEW. 
      Use bullet points and professional tone.`;

      const detailText = await callGemini(prompt, localStorage.getItem('gemini_key'));
      box.innerHTML = `<h3>Deep Dive Report</h3>` + detailText.replace(/\n/g, '<br>');
      return; // Exit loop on success
    } catch (e) {
      console.warn(`Proxy ${proxyUrl} failed, trying next...`);
    }
  }
  box.innerHTML = "❌ <b>Scraper Error:</b> All proxies failed. Target site may be blocking automated access.";
}

async function explainAsStory(index) {
  const text = document.getElementById(`sum-${index}`).textContent;
  const box = document.getElementById(`detail-${index}`);
  box.style.display = 'block';
  box.innerHTML = "<i>Writing story...</i>";
  try {
    const result = await callGemini(`Explain as a simple story: "${text}"`, localStorage.getItem('gemini_key'));
    box.innerHTML = `<h3>The Story</h3>` + result.replace(/\n/g, '<br>');
  } catch(e) { box.innerHTML = "Error writing story."; }
}
</script>
</body>
