<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self';
                 script-src  'unsafe-inline' https://api.rss2json.com https://cdnjs.cloudflare.com;
                 style-src   'unsafe-inline' https://fonts.googleapis.com;
                 font-src    https://fonts.gstatic.com;
                 img-src     * data:;
                 connect-src *;">
  <title>Gemini Pulse v6.5</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

  <style>
    :root {
      --ink: #1a1a18; --paper: #f5f0e8; --accent: #1a5c3a;
      --rule: #c8c0b0; --muted: #5a554c; --meta-color: #8c867a;
      --error: #c0392b; --reader-font-sz: 17px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--paper); color: var(--ink); font-family: 'IBM Plex Sans', sans-serif; min-height: 100vh; line-height: 1.6; }

    .controls-bar { position: absolute; top: 16px; right: 20px; z-index: 100; display: flex; align-items: center; gap: 10px; }
    select { font-family: 'IBM Plex Mono', monospace; font-size: 11px; background: transparent; color: var(--ink); border: 1px solid var(--rule); padding: 6px 10px; border-radius: 4px; cursor: pointer; text-transform: uppercase; }
    
    .btn-outline { font-family: 'IBM Plex Mono', monospace; font-size: 11px; background: transparent; color: var(--accent); border: 1px solid var(--accent); padding: 6px 10px; border-radius: 4px; cursor: pointer; text-transform: uppercase; font-weight: 500; transition: 0.2s; white-space: nowrap; }
    .btn-outline:hover { background: var(--accent); color: var(--paper); }
    #upload-btn { background: rgba(26, 92, 58, 0.1); }

    .masthead { border-bottom: 3px double var(--ink); padding: 30px 20px; text-align: center; position: relative; }
    .masthead-title { font-family: 'Playfair Display', serif; font-size: clamp(32px, 5vw, 56px); font-weight: 700; }
    .tagline { font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--meta-color); margin-top: 8px; }

    .feed-status-bar { max-width: 800px; margin: 16px auto 0; padding: 0 20px; display: flex; justify-content: space-between; font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--meta-color); text-transform: uppercase; }

    .container { max-width: 800px; margin: 0 auto; padding: 20px 20px 80px; }
    .feed-item { margin-bottom: 35px; border-bottom: 1px solid var(--rule); padding-bottom: 25px; animation: fadeIn 0.3s ease forwards; opacity: 0; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

    .headline { font-family: 'Playfair Display', serif; font-size: 22px; color: var(--ink); text-decoration: none; font-weight: 700; display: block; line-height: 1.3; margin-bottom: 10px; cursor: pointer; }
    .headline:hover { color: var(--accent); text-decoration: underline; }
    .description { font-size: 15px; color: var(--muted); margin-bottom: 12px; }
    .meta { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--meta-color); text-transform: uppercase; }

    #reader-backdrop { display: none; position: fixed; inset: 0; background: rgba(26,26,24,0.45); z-index: 998; backdrop-filter: blur(2px); }
    #reader-backdrop.open { display: block; }
    #reader-panel { position: fixed; top: 0; right: 0; bottom: 0; width: 100%; max-width: 780px; background: var(--paper); z-index: 999; display: flex; flex-direction: column; transform: translateX(100%); transition: transform 0.35s cubic-bezier(.4,0,.2,1); box-shadow: -4px 0 40px rgba(0,0,0,0.18); }
    #reader-panel.open { transform: translateX(0); }

    .reader-topbar { display: flex; align-items: center; gap: 10px; padding: 14px 20px; border-bottom: 1px solid var(--rule); flex-shrink: 0; }
    .reader-scroll { overflow-y: auto; flex: 1; padding: 36px 40px 60px; }
    .reader-body { font-size: var(--reader-font-sz); line-height: 1.85; color: var(--ink); }

    #ai-panel { position: absolute; top: 65px; right: 20px; width: 360px; background: #fff; border: 1px solid var(--rule); border-radius: 12px; box-shadow: 0 8px 30px rgba(0,0,0,0.15); display: flex; flex-direction: column; opacity: 0; pointer-events: none; transition: 0.3s; z-index: 1005; max-height: 65vh; }
    #ai-panel.open { opacity: 1; pointer-events: auto; transform: translateY(0); }
    .ai-chat-area { padding: 16px; overflow-y: auto; flex: 1; font-size: 14px; }
    .ai-message { margin-bottom: 16px; padding: 12px 16px; border-radius: 8px; background: var(--paper); }
    .ai-input-area { display: flex; padding: 12px 16px; border-top: 1px solid var(--rule); }
    .ai-input-area input { flex: 1; padding: 10px; border: 1px solid var(--rule); border-radius: 4px; }
    
    .system-msg { font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--meta-color); text-align: center; margin-top: 60px; }
    .spinning { animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>

<body>

  <div class="controls-bar">
    <input type="file" id="pdf-upload" accept="application/pdf" style="display: none;">
    <button class="btn-outline" id="upload-btn">📄 Upload PDF</button>
    
    <select id="feed-dropdown">
      <optgroup label="── Digital & National ──">
        <option value="https://feeds.feedburner.com/NDTV-LatestNews">NDTV · Latest</option>
        <option value="https://indianexpress.com/feed/">IE · Top News</option>
      </optgroup>
      <optgroup label="── Business ──">
        <option value="https://economictimes.indiatimes.com/rssfeedsdefault.cms">ET · Top News</option>
        <option value="https://www.livemint.com/rss/news">Mint · Top News</option>
      </optgroup>
    </select>
    <button class="btn-outline" id="refresh-btn">⟳ Refresh</button>
    <button class="btn-outline" id="clear-key-btn">🔑 Reset Key</button>
  </div>

  <div class="masthead">
    <div class="tagline" id="header-date">Terminal</div>
    <div class="masthead-title">Gemini Pulse</div>
    <div class="tagline">News & PDF Intelligence</div>
  </div>

  <div class="feed-status-bar">
    <span id="item-count"></span>
    <span id="next-refresh"></span>
  </div>

  <div class="container">
    <div id="rss-output">
      <div class="system-msg">Initialising Terminal...</div>
    </div>
  </div>

  <div id="reader-backdrop"></div>
  <div id="reader-panel">
    <div id="reader-progress" style="position:absolute; top:0; height:3px; background:var(--accent); width:0%;"></div>
    <div class="reader-topbar">
      <button class="btn-outline" id="reader-back">← Back</button>
      <span id="reader-url-label" style="flex:1; font-family:'IBM Plex Mono'; font-size:10px; color:var(--meta-color);"></span>
      <button class="btn-outline" id="reader-ai-toggle" style="display:none;">✨ Ask AI</button>
    </div>
    <div class="reader-scroll">
      <div id="reader-content"></div>
    </div>

    <div id="ai-panel">
      <div style="padding:12px; background:var(--paper); border-bottom:1px solid var(--rule); display:flex; justify-content:space-between; font-size:11px; font-weight:bold;">
        <span>GEMINI ASSISTANT</span>
        <button id="ai-close" style="background:none; border:none; cursor:pointer;">×</button>
      </div>
      <div class="ai-chat-area" id="ai-chat-area"></div>
      <div class="ai-input-area">
        <input type="text" id="ai-input" placeholder="Ask about this article...">
        <button class="btn-outline" id="ai-submit" style="margin-left:8px;">Ask</button>
      </div>
    </div>
  </div>

  <script>
    'use strict';

    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    const CONFIG = Object.freeze({
      CACHE_TTL: 5 * 60 * 1000,
      AUTO_REFRESH_S: 600,
      GEMINI_MODEL: 'gemini-1.5-flash'
    });

    const DOM = {
      output: document.getElementById('rss-output'),
      dropdown: document.getElementById('feed-dropdown'),
      refreshBtn: document.getElementById('refresh-btn'),
      itemCount: document.getElementById('item-count'),
      nextRefresh: document.getElementById('next-refresh'),
      pdfUpload: document.getElementById('pdf-upload'),
      uploadBtn: document.getElementById('upload-btn'),
      readerPanel: document.getElementById('reader-panel'),
      readerBackdrop: document.getElementById('reader-backdrop'),
      readerContent: document.getElementById('reader-content'),
      aiToggle: document.getElementById('reader-ai-toggle'),
      aiChatArea: document.getElementById('ai-chat-area'),
      aiInput: document.getElementById('ai-input')
    };

    let currentArticleText = "";
    let countdownTimer = null;

    /* --- Core Helpers --- */
    function getGeminiKey() {
      let key = localStorage.getItem('gemini_api_key');
      if (!key) {
        key = prompt("Enter Gemini API Key (aistudio.google.com):");
        if (key) localStorage.setItem('gemini_api_key', key);
      }
      return key;
    }

    function setFeedStatus(msg) { DOM.output.innerHTML = `<div class="system-msg">${msg}</div>`; }

    async function fetchWithRetry(url, options) {
      const res = await fetch(url, options);
      if (res.status === 429) {
        setFeedStatus("Rate limited. Waiting 5s...");
        await new Promise(r => setTimeout(r, 5000));
        return fetchWithRetry(url, options);
      }
      return res;
    }

    function cleanAiResponse(text) {
      return text.replace(/```json|```/g, "").trim();
    }

    /* --- PDF Logic --- */
    DOM.uploadBtn.addEventListener('click', () => DOM.pdfUpload.click());

    DOM.pdfUpload.addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if (!file) return;

      setFeedStatus("📑 Extracting text from PDF...");
      try {
        const arrayBuffer = await file.arrayBuffer();
        const pdf = await pdfjsLib.getDocument(arrayBuffer).promise;
        let fullText = "";
        for (let i = 1; i <= pdf.numPages; i++) {
          const page = await pdf.getPage(i);
          const content = await page.getTextContent();
          fullText += content.items.map(item => item.str).join(" ") + "\n\n";
        }
        analyzeEditorials(fullText);
      } catch (err) {
        setFeedStatus("❌ Error reading PDF: " + err.message);
      }
    });

    async function analyzeEditorials(text) {
      const apiKey = getGeminiKey();
      if (!apiKey) return;
      setFeedStatus("✨ Gemini is analyzing editorials...");

      const prompt = `Analyze this text from newspaper editorials. Return a JSON array of objects with "title", "description" (3-4 sentences), and "pubDate". 
      Text: ${text.substring(0, 25000)}`;

      try {
        const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${CONFIG.GEMINI_MODEL}:generateContent?key=${apiKey}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
        });
        const data = await res.json();
        const items = JSON.parse(cleanAiResponse(data.candidates[0].content.parts[0].text));
        renderFeed(items, "PDF ANALYSIS");
      } catch (err) {
        setFeedStatus("❌ AI Analysis failed: " + err.message);
      }
    }

    /* --- RSS Logic --- */
    async function loadFeed() {
      setFeedStatus("📡 Fetching Feed...");
      const url = DOM.dropdown.value;
      try {
        const res = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(url)}`);
        const data = await res.json();
        renderFeed(data.items, DOM.dropdown.options[DOM.dropdown.selectedIndex].text);
      } catch (err) {
        setFeedStatus("❌ Failed to load RSS.");
      }
    }

    function renderFeed(items, source) {
      DOM.output.innerHTML = items.map(item => `
        <div class="feed-item">
          <span class="headline" onclick="openReader('${encodeURIComponent(item.title)}', '${encodeURIComponent(item.description)}')">${item.title}</span>
          <p class="description">${item.description.replace(/<[^>]*>?/gm, '').substring(0, 200)}...</p>
          <div class="meta">${source}</div>
        </div>
      `).join('');
      DOM.itemCount.textContent = `${items.length} Articles`;
    }

    /* --- Reader Logic --- */
    window.openReader = (title, desc) => {
      const t = decodeURIComponent(title);
      const d = decodeURIComponent(desc);
      currentArticleText = d.replace(/<[^>]*>?/gm, '');
      DOM.readerContent.innerHTML = `<h1 class="headline">${t}</h1><div class="reader-body">${d}</div>`;
      DOM.readerPanel.classList.add('open');
      DOM.readerBackdrop.classList.add('open');
      DOM.aiToggle.style.display = "block";
    };

    document.getElementById('reader-back').onclick = () => {
      DOM.readerPanel.classList.remove('open');
      DOM.readerBackdrop.classList.remove('open');
    };

    /* --- AI Chat --- */
    DOM.aiToggle.onclick = () => document.getElementById('ai-panel').classList.toggle('open');
    document.getElementById('ai-close').onclick = () => document.getElementById('ai-panel').classList.remove('open');

    document.getElementById('ai-submit').onclick = async () => {
      const query = DOM.aiInput.value;
      if (!query) return;
      
      const msgWrap = document.createElement('div');
      msgWrap.className = "ai-message";
      msgWrap.innerHTML = `<strong>You:</strong> ${query}`;
      DOM.aiChatArea.appendChild(msgWrap);
      DOM.aiInput.value = "";

      const apiKey = getGeminiKey();
      try {
        const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${CONFIG.GEMINI_MODEL}:generateContent?key=${apiKey}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ contents: [{ parts: [{ text: `Context: ${currentArticleText}\n\nQuestion: ${query}` }] }] })
        });
        const data = await res.json();
        const reply = data.candidates[0].content.parts[0].text;
        
        const aiWrap = document.createElement('div');
        aiWrap.className = "ai-message";
        aiWrap.style.background = "#fff";
        aiWrap.innerHTML = `<strong>Gemini:</strong> ${reply}`;
        DOM.aiChatArea.appendChild(aiWrap);
        DOM.aiChatArea.scrollTop = DOM.aiChatArea.scrollHeight;
      } catch (err) {
        console.error(err);
      }
    };

    /* --- Init --- */
    window.onload = () => {
      document.getElementById('header-date').textContent = new Date().toDateString();
      DOM.dropdown.onchange = loadFeed;
      DOM.refreshBtn.onclick = loadFeed;
      document.getElementById('clear-key-btn').onclick = () => { localStorage.removeItem('gemini_api_key'); alert("Key Reset"); };
      loadFeed();
    };

  </script>
</body>
</html>
