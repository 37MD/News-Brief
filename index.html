<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gemini Pulse</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root { 
    --ink: #1a1a18; 
    --paper: #f5f0e8; 
    --paper2: #ede8de; 
    --accent: #1a5c3a; 
    --rule: #c8c0b0; 
    --muted: #7a7468; 
  }
  
  * { box-sizing: border-box; margin: 0; padding: 0; }
  
  body { 
    background: var(--paper); 
    color: var(--ink); 
    font-family: 'IBM Plex Sans', sans-serif; 
    min-height: 100vh; 
    line-height: 1.6; 
  }
  
  .masthead { 
    border-bottom: 3px double var(--ink); 
    padding: 30px 20px; 
    text-align: center; 
    background: var(--paper); 
  }
  
  .masthead-title { 
    font-family: 'Playfair Display', serif; 
    font-size: clamp(32px, 5vw, 56px); 
    font-weight: 700; 
  }
  
  .tagline { 
    font-family: 'IBM Plex Mono', monospace; 
    font-size: 10px; 
    letter-spacing: 0.2em; 
    text-transform: uppercase; 
    color: var(--muted); 
    margin-top: 8px; 
  }
  
  .container { 
    max-width: 800px; 
    margin: 0 auto; 
    padding: 20px 20px 80px; 
  }
  
  .setup-box { 
    background: var(--paper2); 
    padding: 20px; 
    border: 1px solid var(--rule); 
    margin-bottom: 20px; 
    border-radius: 4px;
    display: flex;
    gap: 10px;
  }
  
  input { 
    font-family: 'IBM Plex Mono', monospace; 
    padding: 12px; 
    border: 1px solid var(--rule); 
    font-size: 13px; 
    flex: 1;
    background: white;
  }

  input:focus {
    outline: none;
    border-color: var(--accent);
  }
  
  .btn-main { 
    background: var(--ink); 
    color: white; 
    cursor: pointer; 
    font-weight: bold; 
    text-transform: uppercase; 
    border: none; 
    letter-spacing: 1px; 
    padding: 12px 20px; 
    font-family: 'IBM Plex Mono', monospace;
  }

  .btn-main:hover {
    background: var(--accent);
  }
  
  #status { 
    font-family: 'IBM Plex Mono', monospace; 
    font-size: 11px; 
    color: var(--muted); 
    text-align: center; 
    margin: 20px 0; 
    padding: 10px; 
    border: 1px dashed var(--rule); 
    background: #fff; 
  }

  .feed-item {
    margin-bottom: 25px;
    border-bottom: 1px solid var(--rule);
    padding-bottom: 15px;
  }

  .feed-item:last-child {
    border-bottom: none;
  }

  .headline {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    color: var(--accent);
    text-decoration: none;
    font-weight: 700;
    display: block;
    margin-bottom: 6px;
    line-height: 1.3;
  }

  .headline:hover {
    text-decoration: underline;
  }

  .source {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px; 
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    display: block;
  }

  .error-text {
    color: #d93025;
    font-weight: bold;
  }
</style>
</head>
<body>

<div class="masthead">
    <div class="tagline" id="header-date">Financial Intelligence Terminal</div>
    <div class="masthead-title">Gemini Pulse</div>
    <div class="tagline" id="last-update">System Online</div>
</div>

<div class="container">
  <div class="setup-box">
    <input type="text" id="feed-url" placeholder="Paste RSS URL here..." value="https://www.thehindubusinessline.com/feeder/default.rss" />
    <button class="btn-main" onclick="loadFeed()">Load Feed</button>
  </div>

  <div id="status">System Ready</div>
  <div id="rss-output"></div>
</div>

<script>
    window.onload = () => {
        document.getElementById('header-date').textContent = new Date().toLocaleDateString('en-IN', { 
            weekday: 'long', day: 'numeric', month: 'long' 
        });
        loadFeed(); 
    };

    function loadFeed() {
        const outputContainer = document.getElementById("rss-output");
        const statusBox = document.getElementById("status");
        const targetUrl = document.getElementById("feed-url").value.trim();

        if (!targetUrl) {
            statusBox.innerHTML = "<span class='error-text'>Please enter a valid RSS URL.</span>";
            return;
        }

        statusBox.innerHTML = "📡 Fetching terminal data...";
        outputContainer.innerHTML = "";

        const apiUrl = 'https://api.rss2json.com/v1/api.json?rss_url=' + encodeURIComponent(targetUrl);

        fetch(apiUrl)
            .then(response => response.json())
            .then(data => {
                if (data.status !== 'ok') {
                    throw new Error("Failed to fetch the feed.");
                }

                const feedTitle = data.feed.title || "External Source";
                let htmlOutput = "";

                data.items.forEach(item => {
                    htmlOutput += `
                        <div class="feed-item">
                            <a href="${item.link}" class="headline" target="_blank" rel="noopener">${item.title}</a>
                            <span class="source">Source: ${feedTitle}</span>
                        </div>
                    `;
                });

                outputContainer.innerHTML = htmlOutput;
                statusBox.innerHTML = `✅ Displaying feed: ${feedTitle}`;
            })
            .catch(err => {
                console.error("Error loading feed:", err);
                statusBox.innerHTML = "<span class='error-text'>❌ Error loading feed. Check URL or network.</span>";
            });
    }
</script>
</body>
</html>
