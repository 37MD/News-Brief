<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>RSS Feed Reader</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 20px auto;
            color: #333;
        }
        .feed-item {
            margin-bottom: 16px;
            line-height: 1.4;
        }
        .headline {
            font-size: 16px;
            color: #0044cc;
            text-decoration: none;
            font-weight: bold;
        }
        .headline:hover {
            text-decoration: underline;
        }
        .source {
            font-size: 10px; /* Very small font */
            color: #777;
            display: block;
            margin-top: 2px;
        }
    </style>
</head>
<body>

    <h2>BusinessLine Feed</h2>
    <div id="rss-output">Fetching feeds...</div>

    <script>
        // Target RSS URL
        const targetUrl = 'https://www.thehindubusinessline.com/feeder/default.rss';
        
        // Using rss2json API which is much more reliable for blocked news sites
        const apiUrl = 'https://api.rss2json.com/v1/api.json?rss_url=' + encodeURIComponent(targetUrl);

        fetch(apiUrl)
            .then(response => response.json())
            .then(data => {
                // Check if the API successfully grabbed the feed
                if (data.status !== 'ok') {
                    throw new Error("API failed to fetch the feed.");
                }

                let htmlOutput = "";

                // The API conveniently converts the XML to a JavaScript array called 'items'
                data.items.forEach(item => {
                    htmlOutput += `
                        <div class="feed-item">
                            <a href="${item.link}" class="headline" target="_blank">${item.title}</a>
                            <span class="source">Source: The Hindu BusinessLine</span>
                        </div>
                    `;
                });

                document.getElementById("rss-output").innerHTML = htmlOutput;
            })
            .catch(err => {
                console.error("Error loading feed:", err);
                document.getElementById("rss-output").innerHTML = "Error loading the RSS feed. Please check your internet connection or try again later.";
            });
    </script>

</body>
</html>
