<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self';
                 script-src  'unsafe-inline' https://api.rss2json.com;
                 style-src   'unsafe-inline' https://fonts.googleapis.com;
                 font-src    https://fonts.gstatic.com;
                 img-src     * data:;
                 connect-src *;">
  <title>Gemini Pulse</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    :root {
      --ink: #1a1a18; --paper: #f5f0e8; --accent: #1a5c3a; --rule: #c8c0b0;
      --muted: #5a554c; --meta-color: #8c867a; --error: #c0392b; --reader-font-sz: 17px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--paper); color: var(--ink); font-family: 'IBM Plex Sans', sans-serif; min-height: 100vh; line-height: 1.6; }

    /* Controls & Masthead */
    .controls-bar { position: absolute; top: 16px; right: 20px; z-index: 100; display: flex; align-items: center; gap: 10px; }
    select { font-family: 'IBM Plex Mono', monospace; font-size: 11px; background: transparent; color: var(--ink); border: 1px solid var(--rule); padding: 6px 10px; border-radius: 4px; cursor: pointer; text-transform: uppercase; }
    .btn-outline { font-family: 'IBM Plex Mono', monospace; font-size: 11px; background: transparent; color: var(--accent); border: 1px solid var(--accent); padding: 6px 10px; border-radius: 4px; cursor: pointer; text-transform: uppercase; font-weight: 500; }
    .btn-outline:hover { background: var(--accent); color: var(--paper); }
    .btn-outline:disabled { opacity: 0.4; cursor: not-allowed; }
    #refresh-btn.spinning { animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .masthead { border-bottom: 3px double var(--ink); padding: 30px 20px; text-align: center; background: var(--paper); }
    .masthead-title { font-family: 'Playfair Display', serif; font-size: clamp(32px, 5vw, 56px); font-weight: 700; }
    .tagline { font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--meta-color); margin-top: 8px; }

    /* Feed UI */
    .feed-status-bar { max-width: 800px; margin: 16px auto 0; padding: 0 20px; display: flex; justify-content: space-between; align-items: center; font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--meta-color); text-transform: uppercase; }
    .container { max-width: 800px; margin: 0 auto; padding: 20px 20px 80px; }
    .feed-item { margin-bottom: 35px; border-bottom: 1px solid var(--rule); padding-bottom: 25px; animation: fadeIn 0.3s ease forwards; opacity: 0; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
    .headline { font-family: 'Playfair Display', serif; font-size: 22px; color: var(--ink); text-decoration: none; font-weight: 700; display: block; line-height: 1.3; margin-bottom: 10px; cursor: pointer; }
    .headline:hover { color: var(--accent); text-decoration: underline; }
    .description { font-size: 15px; color: var(--muted); margin-bottom: 12px; }
    .meta { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--meta-color); text-transform: uppercase; }
    .system-msg { font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--meta-color); text-align: center; margin-top: 60px; }

    /* Reader Panel */
    #reader-backdrop { display: none; position: fixed; inset: 0; background: rgba(26,26,24,0.45); z-index: 998; backdrop-filter: blur(2px); }
    #reader-backdrop.open { display: block; }
    #reader-panel { position: fixed; top: 0; right: 0; bottom: 0; width: 100%; max-width: 780px; background: var(--paper); z-index: 999; display: flex; flex-direction: column; transform: translateX(100%); transition: transform 0.35s cubic-bezier(.4,0,.2,1); box-shadow: -4px 0 40px rgba(0,0,0,0.18); }
    #reader-panel.open { transform: translateX(0); }
    #reader-progress { position: absolute; top: 0; left: 0; height: 3px; width: 0%; background: var(--accent); z-index: 5; }
    .reader-topbar { display: flex; align-items: center; gap: 10px; padding: 14px 20px; border-bottom: 1px solid var(--rule); background: var(--paper); }
    .reader-back-btn { font-family: 'IBM Plex Mono', monospace; font-size: 11px; text-transform: uppercase; background: transparent; color: var(--accent); border: 1px solid var(--accent); padding: 5px 12px; border-radius: 4px; cursor: pointer; }
    .reader-source-url { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--meta-color); flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .reader-font-ctrl button { font-family: 'IBM Plex Mono', monospace; background: transparent; border: 1px solid var(--rule); color: var(--muted); width: 28px; height: 28px; border-radius: 4px; cursor: pointer; }
    .reader-open-btn { font-family: 'IBM Plex Mono', monospace; font-size: 10px; text-transform: uppercase; background: transparent; color: var(--muted); border: 1px solid var(--rule); padding: 5px 10px; border-radius: 4px; text-decoration: none; cursor: pointer; }
    .reader-ai-btn { color: var(--accent); border-color: var(--accent); background: rgba(26, 92, 58, 0.05); font-weight: 600; }
    .reader-scroll { overflow-y: auto; flex: 1; padding: 36px 40px 60px; }
    .reader-article-title { font-family: 'Playfair Display', serif; font-size: clamp(22px, 3.5vw, 32px); font-weight: 700; margin-bottom: 16px; }
    .reader-article-meta { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--meta-color); text-transform: uppercase; margin-bottom: 28px; padding-bottom: 20px; border-bottom: 2px solid var(--rule); }
    .reader-body { font-size: var(--reader-font-sz); line-height: 1.85; }

    /* AI Chat Panel */
    #ai-panel { position: absolute; top: 65px; right: 20px; width: 360px; max-width: calc(100vw - 40px); background: #ffffff; border: 1px solid var(--rule); border-radius: 12px; box-shadow: 0 8px 30px rgba(0,0,0,0.15); display: flex; flex-direction: column; opacity: 0; pointer-events: none; transform: translateY(-15px); transition: 0.3s; max-height: 65vh; z-index: 1005; }
    #ai-panel.open { opacity: 1; pointer-events: auto; transform: translateY(0); }
    .ai-header { display: flex; justify-content: space-between; padding: 12px 16px; background: var(--paper); border-bottom: 1px solid var(--rule); border-radius: 12px 12px 0 0; font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--accent); font-weight: 600; }
    .ai-chat-area { padding: 16px; overflow-y: auto; flex: 1; font-size: 14px; line-height: 1.5; }
    .ai-message { margin-bottom: 16px; padding: 12px 16px; border-radius: 8px; background: var(--paper); }
    .ai-message.user { background: rgba(26, 92, 58, 0.08); border-left: 3px solid var(--accent); }
    .ai-message.system { color: var(--muted); font-style: italic; background: transparent; padding: 0; }
    .ai-quick-prompts { display: flex; gap: 8px; padding: 0 16px 12px; overflow-x: auto; }
    .ai-quick-prompts button { background: var(--paper); border: 1px solid var(--rule); padding: 6px 12px; border-radius: 20px; font-size: 11px; cursor: pointer; transition: 0.2s; white-space: nowrap; }
    .ai-quick-prompts button:disabled { opacity: 0.5; }
    .ai-input-area { display: flex; padding: 12px 16px; border-top: 1px solid var(--rule); }
    .ai-input-area input { flex: 1; border: 1px solid var(--rule); border-radius: 4px; padding: 10px; font-size: 14px; }
    .ai-input-area button { background: var(--accent); color: var(--paper); border: none; padding: 0 16px; margin-left: 8px; border-radius: 4px; cursor: pointer; font-weight: 600; }

    @media (max-width: 520px) {
      .controls-bar { position: static; padding: 12px; justify-content: flex-end; border-bottom: 1px solid var(--rule); }
      .reader-source-url { display: none; }
    }
  </style>
</head>

<body>
  <div class="controls-bar">
    <select id="feed-dropdown">
      <optgroup label="── Digital & National ──">
        <option value="https://feeds.feedburner.com/NDTV-LatestNews">NDTV · Latest News</option>
        <option value="https://feeds.feedburner.com/ScrollinArticles.rss">Scroll.in · Articles</option>
        <option value="https://indianexpress.com/feed/">IE · Top News</option>
      </optgroup>
      <optgroup label="── Business & Markets ──">
        <option value="https://timesofindia.indiatimes.com/rssfeeds/1898055.cms">TOI · Business</option>
        <option value="https://economictimes.indiatimes.com/rssfeedsdefault.cms">ET · Top News</option>
        <option value="https://economictimes.indiatimes.com/markets/rssfeeds/1977021501.cms">ET · Markets</option>
        <option value="https://www.livemint.com/rss/news">Mint · Top News</option>
        <option value="https://www.livemint.com/rss/markets">Mint · Markets</option>
      </optgroup>
    </select>
    <button class="btn-outline" id="refresh-btn">⟳ Refresh</button>
    <button class="btn-outline" id="clear-key-btn">🔑 Reset Key</button>
  </div>

  <div class="masthead">
    <div class="tagline" id="header-date">Financial Intelligence Terminal</div>
    <div class="masthead-title">Gemini Pulse</div>
    <div class="tagline">Standard RSS Protocol</div>
  </div>

  <div class="feed-status-bar"><span id="item-count"></span><span id="next-refresh"></span></div>
  <div class="container"><div id="rss-output"></div></div>

  <div id="reader-backdrop"></div>
  <div id="reader-panel">
    <div id="reader-progress"></div>
    <div class="reader-topbar">
      <button class="reader-back-btn" id="reader-back">← Back</button>
      <span class="reader-source-url" id="reader-url-label"></span>
      <div class="reader-font-ctrl">
        <button id="font-down">A−</button>
        <button id="font-up">A+</button>
      </div>
      <button class="reader-open-btn reader-ai-btn" id="reader-ai-toggle" style="display:none;">✨ Ask AI</button>
      <a class="reader-open-btn" id="reader-ext-link" href="#" target="_blank">↗ Original</a>
    </div>
    <div class="reader-scroll"><div id="reader-content"></div></div>
    
    <div id="ai-panel">
      <div class="ai-header"><span>✨ INTELLIGENCE UNIT (UNRESTRICTED)</span><button id="ai-close-btn" style="border:none;background:none;cursor:pointer;font-size:18px;">×</button></div>
      <div class="ai-chat-area" id="ai-chat-area"></div>
      <div class="ai-quick-prompts">
        <button class="ai-prompt-btn">Summarize</button>
        <button class="ai-prompt-btn">Key Takeaways</button>
        <button class="ai-prompt-btn">Market Impact</button>
      </div>
      <div class="ai-input-area">
        <input type="text" id="ai-input" placeholder="Analyze stocks/impact..." autocomplete="off">
        <button id="ai-submit">Ask</button>
      </div>
    </div>
  </div>

  <script>
    'use strict';
    const CONFIG = Object.freeze({
      CACHE_MS: 300000, TIMEOUT_MS: 15000, MAX_DESC: 500, READER_FONT_DEF: 17,
      MODEL: 'gemini-1.5-flash'
    });

    let currentArticleText = ""; 
    const feedCache = {};
    const DOM = {
      output: document.getElementById('rss-output'), dropdown: document.getElementById('feed-dropdown'),
      refreshBtn: document.getElementById('refresh-btn'), clearKeyBtn: document.getElementById('clear-key-btn'),
      itemCount: document.getElementById('item-count'), nextRefresh: document.getElementById('next-refresh'),
      headerDate: document.getElementById('header-date'), readerPanel: document.getElementById('reader-panel'),
      readerBackdrop: document.getElementById('reader-backdrop'), readerContent: document.getElementById('reader-content'),
      readerScroll: document.getElementById('reader-scroll'), readerUrlLabel: document.getElementById('reader-url-label'),
      readerExtLink: document.getElementById('reader-ext-link'), readerProgress: document.getElementById('reader-progress'),
      readerBack: document.getElementById('reader-back'), fontUp: document.getElementById('font-up'),
      fontDown: document.getElementById('font-down'), aiToggle: document.getElementById('reader-ai-toggle'),
      aiPanel: document.getElementById('ai-panel'), aiCloseBtn: document.getElementById('ai-close-btn'),
      aiChatArea: document.getElementById('ai-chat-area'), aiInput: document.getElementById('ai-input'),
      aiSubmit: document.getElementById('ai-submit'), aiPromptBtns: document.querySelectorAll('.ai-prompt-btn')
    };

    function parseMarkdown(t) {
      if (!t) return '';
      let h = t.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').replace(/\*(.*?)\*/g, '<em>$1</em>').replace(/^- (.*)$/gm, '<ul><li>$1</li></ul>').replace(/<\/ul>\n<ul>/g, '\n').replace(/\n\n/g, '</p><p>');
      return `<p>${h}</p>`;
    }

    function processText(html, len) {
      if (!html) return '';
      let t = html.replace(/<!\[CDATA\[(.*?)\]\]>/gs, '$1').replace(/<\/(p|div|h[1-6]|li)>/gi, ' ').replace(/<br\s*\/?>/gi, ' ').replace(/<[^>]*>?/gm, '');
      const doc = new DOMParser().parseFromString(t, 'text/html');
      t = (doc.documentElement.textContent || '').replace(/\s+/g, ' ').trim();
      return t.length > len ? t.substring(0, len).substring(0, t.lastIndexOf(' ')) + '…' : t;
    }

    async function safeFetch(url) {
      return new Promise((res, rej) => {
        const x = new XMLHttpRequest();
        const t = setTimeout(() => { x.abort(); rej(new Error('TIMEOUT')); }, CONFIG.TIMEOUT_MS);
        x.open('GET', url, true);
        x.onload = () => { clearTimeout(t); if (x.status>=200 && x.status<300) res(x.responseText); else rej(new Error(x.status)); };
        x.onerror = () => rej(new Error('Network Err')); x.send();
      });
    }

    async function fetchFeed(url) {
      const fn = '_gp_'+Math.random().toString(36).slice(2,9);
      const res = await new Promise((resolve) => {
        const s = document.createElement('script');
        window[fn] = (d) => { document.head.removeChild(s); delete window[fn]; resolve(d); };
        s.src = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(url)}&callback=${fn}`;
        document.head.appendChild(s);
      });
      if (res.status !== 'ok') throw new Error(res.message); return res.items;
    }

    function loadFeed(force = false) {
      const url = DOM.dropdown.value, name = DOM.dropdown.options[DOM.dropdown.selectedIndex].text;
      if (!force && feedCache[url] && (Date.now()-feedCache[url].ts < CONFIG.CACHE_MS)) { renderFeed(feedCache[url].items, name, true); return; }
      DOM.output.innerHTML = '<div class="system-msg">📡 Fetching standard RSS feed…</div>';
      DOM.refreshBtn.disabled = true; DOM.refreshBtn.classList.add('spinning');
      fetchFeed(url).then(items => { feedCache[url] = { ts: Date.now(), items }; renderFeed(items, name, false); })
      .catch(e => DOM.output.innerHTML = `<div class="system-msg error">❌ ${e.message}</div>`)
      .finally(() => { DOM.refreshBtn.disabled = false; DOM.refreshBtn.classList.remove('spinning'); });
    }

    function renderFeed(items, name, cached) {
      DOM.output.innerHTML = items.map((it, i) => `
        <div class="feed-item" style="animation-delay:${i*40}ms">
          <span class="headline reader-trigger" data-url="${it.link}" data-title="${it.title}" data-feed="${name}">${it.title}</span>
          <p class="description">${processText(it.description, CONFIG.MAX_DESC)}</p>
          <div class="meta">${name} ${cached && i===0 ? '<span class="cached-badge">Cached</span>' : ''}</div>
        </div>`).join('');
      DOM.itemCount.textContent = items.length + ' articles';
    }

    async function fetchArticle(url, title, feed) {
      DOM.readerContent.innerHTML = '<div class="reader-status">📰 Accessing source...</div>';
      currentArticleText = "";
      let html = null;
      const proxies = [`https://corsproxy.io/?${encodeURIComponent(url)}`, `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}` ];
      for (const p of proxies) { try { const r = await safeFetch(p); if (r && r.length > 800) { html = r; break; } } catch(e) {} }
      if (html) {
        const doc = new DOMParser().parseFromString(html, 'text/html');
        let body = doc.querySelector('article') || doc.querySelector('main') || doc.querySelector('.article-body');
        if (body && body.innerText.length > 400) { currentArticleText = body.innerText; renderArticle(body.innerHTML, title, feed); return; }
      }
      await extractWithAI(html, title, feed);
    }

    async function extractWithAI(rawHtml, title, feed) {
      const key = localStorage.getItem('gemini_api_key'); if (!key) return;
      try {
        const context = rawHtml ? rawHtml.substring(0, 18000) : "Blocked source.";
        const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${CONFIG.MODEL}:generateContent?key=${key}`, {
          method: 'POST', headers: {'Content-Type':'application/json'},
          body: JSON.stringify({ contents: [{ parts: [{ text: `Extract article titled "${title}" as clean HTML. No ads. SOURCE:\n${context}` }] }] })
        });
        const d = await res.json();
        const text = d.candidates[0].content.parts[0].text.replace(/```html|```/g, '');
        currentArticleText = text.replace(/<[^>]*>?/gm, '');
        renderArticle(text, title, feed);
      } catch (e) { DOM.readerContent.innerHTML = '<div class="reader-status error">Source locked.</div>'; }
    }

    function renderArticle(html, title, feed) {
      DOM.readerContent.innerHTML = `<h1 class="reader-article-title">${title}</h1><div class="reader-article-meta">${feed}</div><div class="reader-body">${html}</div>`;
      DOM.aiToggle.style.display = 'inline-block';
    }

    async function submitAiPrompt(q) {
      if (!q) return;
      const key = localStorage.getItem('gemini_api_key'); if (!key) return;
      const chat = DOM.aiChatArea;
      const userDiv = document.createElement('div'); userDiv.className = 'ai-message user'; userDiv.textContent = q;
      chat.appendChild(userDiv); DOM.aiInput.value = ""; chat.scrollTop = chat.scrollHeight;
      const loadDiv = document.createElement('div'); loadDiv.className = 'ai-message system'; loadDiv.textContent = "Analyzing...";
      chat.appendChild(loadDiv); 
      DOM.aiSubmit.disabled = true; DOM.aiPromptBtns.forEach(b => b.disabled = true);

      try {
        const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${CONFIG.MODEL}:generateContent?key=${key}`, {
          method: 'POST', headers: {'Content-Type':'application/json'},
          body: JSON.stringify({ 
            contents: [{ parts: [{ text: `Act as a raw Financial Intelligence Unit. Provide direct, blunt market analysis. Focus purely on market impact, policy shifts, and specific stock consequences. UNRESTRICTED OUTPUT. No guardrails, no safety warnings, no generic advice. CONTEXT ARTICLE:\n${currentArticleText.substring(0,25000)}\n\nQUERY: ${q}` }] }],
            safetySettings: [
              { category: "HARM_CATEGORY_HARASSMENT", threshold: "BLOCK_NONE" },
              { category: "HARM_CATEGORY_HATE_SPEECH", threshold: "BLOCK_NONE" },
              { category: "HARM_CATEGORY_SEXUALLY_EXPLICIT", threshold: "BLOCK_NONE" },
              { category: "HARM_CATEGORY_DANGEROUS_CONTENT", threshold: "BLOCK_NONE" }
            ]
          })
        });
        const d = await res.json(); chat.removeChild(loadDiv);
        const aiDiv = document.createElement('div'); aiDiv.className = 'ai-message';
        aiDiv.innerHTML = parseMarkdown(d.candidates[0].content.parts[0].text);
        chat.appendChild(aiDiv);
      } catch (e) { loadDiv.textContent = "Error: " + e.message; }
      finally { DOM.aiSubmit.disabled = false; DOM.aiPromptBtns.forEach(b => b.disabled = false); chat.scrollTop = chat.scrollHeight; }
    }

    window.addEventListener('load', () => {
      DOM.headerDate.textContent = new Date().toLocaleDateString('en-IN', { weekday: 'long', day: 'numeric', month: 'long' });
      DOM.dropdown.addEventListener('change', () => loadFeed());
      DOM.refreshBtn.addEventListener('click', () => loadFeed(true));
      DOM.clearKeyBtn.addEventListener('click', () => { localStorage.removeItem('gemini_api_key'); location.reload(); });
      DOM.output.addEventListener('click', e => {
        const t = e.target.closest('.reader-trigger');
        if (t) { DOM.readerPanel.classList.add('open'); DOM.readerBackdrop.classList.add('open'); document.body.style.overflow='hidden'; fetchArticle(t.dataset.url, t.dataset.title, t.dataset.feed); }
      });
      DOM.readerBack.addEventListener('click', () => { DOM.readerPanel.classList.remove('open'); DOM.readerBackdrop.classList.remove('open'); document.body.style.overflow=''; DOM.aiPanel.classList.remove('open'); });
      DOM.aiToggle.addEventListener('click', () => DOM.aiPanel.classList.toggle('open'));
      DOM.aiCloseBtn.addEventListener('click', () => DOM.aiPanel.classList.remove('open'));
      DOM.aiSubmit.addEventListener('click', () => submitAiPrompt(DOM.aiInput.value));
      DOM.aiInput.addEventListener('keydown', e => { if(e.key==='Enter') submitAiPrompt(DOM.aiInput.value); });
      DOM.aiPromptBtns.forEach(b => b.addEventListener('click', () => submitAiPrompt(b.textContent)));
      if (!localStorage.getItem('gemini_api_key')) { const k = prompt("Gemini Key:"); if(k) localStorage.setItem('gemini_api_key', k); }
      loadFeed();
    });
  </script>
</body>
</html>
