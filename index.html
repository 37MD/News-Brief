<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gemini Pulse</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root { 
    --ink: #1a1a18; 
    --paper: #f5f0e8; 
    --accent: #1a5c3a; 
    --rule: #c8c0b0; 
    --muted: #5a554c; 
    --meta-color: #8c867a;
    --error: #c0392b;
  }
  
  * { box-sizing: border-box; margin: 0; padding: 0; }
  
  body { 
    background: var(--paper); 
    color: var(--ink); 
    font-family: 'IBM Plex Sans', sans-serif; 
    min-height: 100vh; 
    line-height: 1.6; 
  }
  
  /* ── Top Controls Bar ── */
  .controls-bar {
    position: absolute;
    top: 16px;
    right: 20px;
    z-index: 100;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  select {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    background-color: transparent;
    color: var(--ink);
    border: 1px solid var(--rule);
    padding: 6px 10px;
    border-radius: 4px;
    cursor: pointer;
    outline: none;
    text-transform: uppercase;
    font-weight: 500;
    max-width: 200px;
  }

  select:hover { border-color: var(--accent); }

  /* Refresh button */
  #refresh-btn {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    background: transparent;
    color: var(--accent);
    border: 1px solid var(--accent);
    padding: 6px 10px;
    border-radius: 4px;
    cursor: pointer;
    text-transform: uppercase;
    font-weight: 500;
    transition: background 0.2s, color 0.2s;
    white-space: nowrap;
  }
  #refresh-btn:hover { background: var(--accent); color: var(--paper); }
  #refresh-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  #refresh-btn.spinning { animation: spin 1s linear infinite; }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Masthead ── */
  .masthead { 
    border-bottom: 3px double var(--ink); 
    padding: 30px 20px; 
    text-align: center; 
    background: var(--paper); 
    position: relative;
  }
  
  .masthead-title { 
    font-family: 'Playfair Display', serif; 
    font-size: clamp(32px, 5vw, 56px); 
    font-weight: 700; 
  }
  
  .tagline { 
    font-family: 'IBM Plex Mono', monospace; 
    font-size: 10px; 
    letter-spacing: 0.2em; 
    text-transform: uppercase; 
    color: var(--meta-color); 
    margin-top: 8px; 
  }

  /* ── Feed status bar ── */
  .feed-status-bar {
    max-width: 800px;
    margin: 16px auto 0;
    padding: 0 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--meta-color);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  /* ── Container ── */
  .container { 
    max-width: 800px; 
    margin: 0 auto; 
    padding: 20px 20px 80px; 
  }
  
  /* ── Feed Items ── */
  .feed-item {
    margin-bottom: 35px;
    border-bottom: 1px solid var(--rule);
    padding-bottom: 25px;
    animation: fadeIn 0.3s ease forwards;
    opacity: 0;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .feed-item:last-child { border-bottom: none; }

  .headline {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    color: var(--ink);
    text-decoration: none;
    font-weight: 700;
    display: block; 
    line-height: 1.3;
    margin-bottom: 10px;
    word-break: break-word;
  }

  .headline:hover { color: var(--accent); text-decoration: underline; }

  .description {
    font-size: 15px;
    color: var(--muted);
    margin-bottom: 12px;
    line-height: 1.6;
  }

  .meta {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px; 
    color: var(--meta-color);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  /* ── System Messages ── */
  .system-msg {
    font-family: 'IBM Plex Mono', monospace; 
    font-size: 12px; 
    color: var(--meta-color); 
    text-align: center;
    margin-top: 60px;
    line-height: 2;
  }

  .system-msg.error { color: var(--error); }

  /* ── Auto-refresh countdown ── */
  #next-refresh {
    color: var(--meta-color);
    font-size: 10px;
    font-family: 'IBM Plex Mono', monospace;
  }

  /* ── Cache badge ── */
  .cached-badge {
    display: inline-block;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    background: var(--rule);
    color: var(--muted);
    padding: 1px 5px;
    border-radius: 2px;
    text-transform: uppercase;
    margin-left: 6px;
    vertical-align: middle;
  }

  /* ── Responsive ── */
  @media (max-width: 520px) {
    .controls-bar { 
      position: static; 
      padding: 12px 16px; 
      justify-content: flex-end;
      border-bottom: 1px solid var(--rule);
    }
    select { max-width: 160px; font-size: 10px; }
    .masthead { padding: 20px 16px; }
  }
</style>
</head>
<body>

<!-- ── Controls Bar ── -->
<div class="controls-bar">
  <select id="feed-dropdown" aria-label="Select news feed">
    <optgroup label="Business News">
      <option value="https://www.thehindubusinessline.com/feeder/default.rss">Business Line</option>
      <option value="https://economictimes.indiatimes.com/rssfeedsdefault.cms">Economic Times</option>
      <option value="https://www.livemint.com/rss/markets">Livemint Markets</option>
      <option value="https://www.moneycontrol.com/rss/MCtopnews.xml">Moneycontrol</option>
      <option value="https://wap.business-standard.com/rss/markets-106.rss">Business Standard</option>
      <option value="https://www.financialexpress.com/feed/">Financial Express</option>
    </optgroup>
    <optgroup label="Daily News">
      <option value="https://theprint.in/feed/">ThePrint</option>
      <option value="https://indianexpress.com/feed/">The Indian Express</option>
      <option value="https://www.livemint.com/rss/news">Livemint News</option>
      <option value="https://timesofindia.indiatimes.com/rssfeedstopstories.cms?x=1">Times of India Top</option>
      <option value="https://m.hindustantimes.com/rss/topnews/rssfeed.xml">Hindustan Times</option>
    </optgroup>
    <optgroup label="Personal Finance">
      <option value="https://www.livemint.com/rss/Mutual%20Funds">Livemint Mutual Fund</option>
      <option value="https://economictimes.indiatimes.com/rssfeeds/837555174.cms">ET Wealth</option>
    </optgroup>
    <optgroup label="Mumbai & Thane">
      <option value="https://timesofindia.indiatimes.com/rssfeeds/3831863.cms">TOI Thane News</option>
      <option value="https://timesofindia.indiatimes.com/rssfeeds/-2128838597.cms">TOI Mumbai News</option>
      <option value="https://www.mid-day.com/Resources/midday/rss/news.xml">Mid-Day Mumbai</option>
    </optgroup>
    <optgroup label="Editorial">
      <option value="https://www.epw.in/taxonomy/term/65/feed">EPW Editorials</option>
      <option value="https://www.livemint.com/rss/opinion">Livemint Opinion</option>
    </optgroup>
  </select>
  <button id="refresh-btn" title="Refresh feed" aria-label="Refresh feed">⟳ Refresh</button>
</div>

<!-- ── Masthead ── -->
<div class="masthead">
  <div class="tagline" id="header-date">Financial Intelligence Terminal</div>
  <div class="masthead-title">Gemini Pulse</div>
  <div class="tagline">Live Feed</div>
</div>

<!-- ── Status Bar ── -->
<div class="feed-status-bar">
  <span id="item-count"></span>
  <span id="next-refresh"></span>
</div>

<!-- ── Feed Output ── -->
<div class="container">
  <div id="rss-output">
    <div class="system-msg">Initializing secure terminal...</div>
  </div>
</div>

<script>
  // ── Constants ──
  const CACHE_TTL_MS   = 5 * 60 * 1000;  // 5-minute cache
  const FETCH_TIMEOUT  = 12000;           // 12-second timeout
  const AUTO_REFRESH_S = 600;             // 10-min auto-refresh
  const MAX_DESC_CHARS = 350;
  const RSS_API        = 'https://api.rss2json.com/v1/api.json?rss_url=';

  // ── State ──
  const cache       = {};          // { url: { timestamp, items, feedName } }
  let   currentCtrl = null;        // AbortController for in-flight request
  let   debounceTimer = null;
  let   refreshTimer  = null;
  let   countdownInterval = null;
  let   secondsLeft = AUTO_REFRESH_S;

  // ── DOM refs ──
  const output      = document.getElementById('rss-output');
  const dropdown    = document.getElementById('feed-dropdown');
  const refreshBtn  = document.getElementById('refresh-btn');
  const itemCount   = document.getElementById('item-count');
  const nextRefresh = document.getElementById('next-refresh');

  // ── Helpers ──

  /**
   * Safe text escape to prevent XSS when inserting into HTML.
   */
  function escapeHtml(str) {
    if (!str) return '';
    return str
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#039;');
  }

  /**
   * Validate that a URL is safe (http/https only).
   * Prevents javascript: or data: URL injection from malicious feeds.
   */
  function safeUrl(url) {
    try {
      const parsed = new URL(url);
      return (parsed.protocol === 'http:' || parsed.protocol === 'https:') ? url : '#';
    } catch {
      return '#';
    }
  }

  /**
   * Human-readable relative time. Handles null / invalid dates gracefully.
   */
  function timeSince(dateString) {
    if (!dateString) return 'Unknown time';
    const date = new Date(dateString);
    if (isNaN(date.getTime())) return 'Unknown time';

    const seconds = Math.floor((Date.now() - date) / 1000);
    if (seconds < 0)   return 'Just now';
    if (seconds < 60)  return 'Just now';

    const mins  = Math.floor(seconds / 60);
    const hours = Math.floor(seconds / 3600);
    const days  = Math.floor(seconds / 86400);

    if (days  > 1) return `${days} days ago`;
    if (days === 1) return '1 day ago';
    if (hours > 1) return `${hours} hours ago`;
    if (hours === 1) return '1 hour ago';
    if (mins  > 1) return `${mins} mins ago`;
    return '1 min ago';
  }

  /**
   * Strip HTML tags from description text.
   */
  function stripHtml(html) {
    if (!html) return '';
    return html.replace(/<[^>]*>?/gm, '').trim();
  }

  // ── Countdown display ──
  function startCountdown() {
    clearInterval(countdownInterval);
    secondsLeft = AUTO_REFRESH_S;
    countdownInterval = setInterval(() => {
      secondsLeft--;
      const m = Math.floor(secondsLeft / 60);
      const s = secondsLeft % 60;
      nextRefresh.textContent = `Auto-refresh in ${m}:${String(s).padStart(2,'0')}`;
      if (secondsLeft <= 0) {
        clearInterval(countdownInterval);
        loadFeed(true);  // force-refresh, bypass cache
      }
    }, 1000);
  }

  // ── Core feed loader ──
  function loadFeed(forceRefresh = false) {
    clearTimeout(debounceTimer);

    debounceTimer = setTimeout(async () => {
      const feedUrl      = dropdown.value;
      const feedName     = dropdown.options[dropdown.selectedIndex].text;
      const cacheEntry   = cache[feedUrl];
      const cacheValid   = cacheEntry && (Date.now() - cacheEntry.timestamp < CACHE_TTL_MS);

      // Cancel any previous in-flight request
      if (currentCtrl) {
        currentCtrl.abort();
        currentCtrl = null;
      }

      // Serve from cache if fresh (and not a forced refresh)
      if (!forceRefresh && cacheValid) {
        renderItems(cacheEntry.items, cacheEntry.feedName, true);
        startCountdown();
        return;
      }

      // Show loading state
      output.innerHTML = "<div class='system-msg'>📡 Fetching data stream…</div>";
      itemCount.textContent = '';
      refreshBtn.disabled   = true;

      currentCtrl = new AbortController();
      const timeoutId = setTimeout(() => currentCtrl.abort(), FETCH_TIMEOUT);

      try {
        const resp = await fetch(RSS_API + encodeURIComponent(feedUrl), {
          signal: currentCtrl.signal
        });
        clearTimeout(timeoutId);

        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        const data = await resp.json();

        if (data.status !== 'ok') {
          throw new Error(data.message || 'Feed returned an error status.');
        }

        if (!Array.isArray(data.items) || data.items.length === 0) {
          output.innerHTML = "<div class='system-msg'>📭 No articles found in this feed.</div>";
          itemCount.textContent = '0 articles';
          return;
        }

        // Store in cache
        cache[feedUrl] = { timestamp: Date.now(), items: data.items, feedName };
        renderItems(data.items, feedName, false);
        startCountdown();

      } catch (err) {
        if (err.name === 'AbortError') {
          output.innerHTML = "<div class='system-msg error'>⏱ Request timed out. The feed may be slow or unavailable.</div>";
        } else {
          console.error('Feed error:', err.message);
          output.innerHTML = `<div class='system-msg error'>❌ Could not load feed.<br><small style="font-size:10px;opacity:.7">${escapeHtml(err.message)}</small></div>`;
        }
        itemCount.textContent = '';
      } finally {
        refreshBtn.disabled = false;
        currentCtrl = null;
      }

    }, 200); // 200ms debounce
  }

  // ── Render items into DOM ──
  function renderItems(items, feedName, fromCache) {
    const cacheBadge = fromCache
      ? `<span class="cached-badge" title="Served from local cache">Cached</span>`
      : '';

    const fragments = items.map((item, i) => {
      let desc = stripHtml(item.description);
      if (desc.length > MAX_DESC_CHARS) desc = desc.substring(0, MAX_DESC_CHARS) + '…';

      const timeAgo  = timeSince(item.pubDate);
      const safeLink = safeUrl(item.link);
      const safeTitle = escapeHtml(item.title || 'Untitled');
      const safeDesc  = escapeHtml(desc);

      // Stagger fade-in animation for each card
      return `
        <div class="feed-item" style="animation-delay:${i * 40}ms">
          <a href="${safeLink}" class="headline" target="_blank" rel="noopener noreferrer">${safeTitle}</a>
          ${safeDesc ? `<p class="description">${safeDesc}</p>` : ''}
          <div class="meta">${timeAgo} &mdash; ${escapeHtml(feedName)}${i === 0 ? cacheBadge : ''}</div>
        </div>
      `;
    });

    output.innerHTML = fragments.join('');
    itemCount.textContent = `${items.length} articles`;
  }

  // ── Init ──
  window.addEventListener('load', () => {
    // Set date in header
    document.getElementById('header-date').textContent = new Date().toLocaleDateString('en-IN', { 
      weekday: 'long', day: 'numeric', month: 'long' 
    });

    // Wire up dropdown (debounce is inside loadFeed)
    dropdown.addEventListener('change', () => loadFeed(false));

    // Manual refresh clears cache for current feed and reloads
    refreshBtn.addEventListener('click', () => {
      const feedUrl = dropdown.value;
      delete cache[feedUrl];   // invalidate cache for this feed
      loadFeed(true);
    });

    // Initial load
    loadFeed();
  });
</script>
</body>
</html>
