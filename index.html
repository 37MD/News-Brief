<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gemini Pulse Terminal</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root { 
    --ink: #1a1a18; 
    --paper: #f5f0e8; 
    --paper2: #ede8de;
    --accent: #1a5c3a; 
    --rule: #c8c0b0; 
    --muted: #5a554c; 
    --meta-color: #8c867a;
    --chat-bg: #ffffff;
    --user-msg: #f0f4f8;
    --ai-msg: #f2f7f4;
  }
  
  * { box-sizing: border-box; margin: 0; padding: 0; }
  
  body { 
    background: var(--paper); 
    color: var(--ink); 
    font-family: 'IBM Plex Sans', sans-serif; 
    min-height: 100vh; 
    line-height: 1.6; 
  }
  
  .masthead { 
    border-bottom: 3px double var(--ink); 
    padding: 30px 20px; 
    text-align: center; 
    background: var(--paper); 
    position: relative;
  }
  
  .masthead-title { 
    font-family: 'Playfair Display', serif; 
    font-size: clamp(32px, 5vw, 56px); 
    font-weight: 700; 
  }
  
  .tagline { 
    font-family: 'IBM Plex Mono', monospace; 
    font-size: 10px; 
    letter-spacing: 0.2em; 
    text-transform: uppercase; 
    color: var(--meta-color); 
    margin-top: 8px; 
  }

  .setup-box { 
    background: var(--paper2); 
    padding: 15px; 
    border-bottom: 1px solid var(--rule); 
    display: flex;
    justify-content: center;
    gap: 10px;
  }
  
  .setup-box input {
    font-family: 'IBM Plex Mono', monospace; 
    padding: 10px; 
    border: 1px solid var(--rule); 
    font-size: 12px; 
    width: 300px;
  }

  .setup-box button {
    background: var(--ink); 
    color: white; 
    border: none; 
    padding: 10px 15px; 
    font-family: 'IBM Plex Mono', monospace;
    font-weight: bold;
    cursor: pointer;
  }

  .feed-selector-container {
    position: absolute;
    top: 20px;
    right: 25px;
    z-index: 100;
  }

  select {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    background-color: transparent;
    color: var(--ink);
    border: 1px solid var(--rule);
    padding: 6px 10px;
    border-radius: 4px;
    cursor: pointer;
    outline: none;
    text-transform: uppercase;
    font-weight: 500;
  }

  .container { 
    max-width: 800px; 
    margin: 0 auto; 
    padding: 30px 20px 80px; 
  }
  
  .feed-item {
    margin-bottom: 35px;
    border-bottom: 1px solid var(--rule);
    padding-bottom: 25px;
  }

  .headline {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    color: var(--ink);
    text-decoration: none;
    font-weight: 700;
    display: block; 
    line-height: 1.3;
    margin-bottom: 10px;
  }

  .headline:hover { color: var(--accent); text-decoration: underline; }
  .description { font-size: 15px; color: var(--muted); margin-bottom: 12px; }
  .meta { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--meta-color); text-transform: uppercase; }

  .action-btn { 
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px; 
    background: transparent; 
    border: 1px solid var(--accent); 
    color: var(--accent); 
    cursor: pointer; 
    padding: 6px 12px; 
    margin-top: 10px;
    font-weight: bold; 
    text-transform: uppercase; 
    transition: all 0.2s;
  }
  
  .action-btn:hover { background: var(--accent); color: white; }

  /* AI Panel */
  .ai-panel {
    background: var(--chat-bg);
    border-left: 4px solid var(--accent);
    padding: 20px;
    margin-top: 15px;
    display: none;
    font-size: 14px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
  }

  .ai-panel h4 {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 10px;
    border-bottom: 1px dashed #eee;
    padding-bottom: 5px;
  }

  /* Chat UI */
  .chat-history {
    max-height: 250px;
    overflow-y: auto;
    margin: 15px 0;
    padding-right: 5px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .chat-bubble { padding: 10px 14px; border-radius: 6px; line-height: 1.5; width: fit-content; max-width: 90%; }
  .user-bubble { background: var(--user-msg); align-self: flex-end; border-bottom-right-radius: 0; color: var(--ink); }
  .ai-bubble { background: var(--ai-msg); align-self: flex-start; border-bottom-left-radius: 0; color: var(--accent); }

  .chat-input-row { display: flex; gap: 8px; margin-top: 10px; }
  .chat-input { flex: 1; padding: 10px; border: 1px solid var(--rule); font-family: 'IBM Plex Sans', sans-serif; font-size: 14px; }
  .chat-send { background: var(--ink); color: white; border: none; padding: 0 15px; cursor: pointer; font-family: 'IBM Plex Mono', monospace; font-weight: bold; text-transform: uppercase; font-size: 11px; }
  
  .loading-text { font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--meta-color); font-style: italic; }
</style>
</head>
<body>

<div id="setup" class="setup-box">
  <input type="password" id="api-key" placeholder="Enter Gemini API Key to enable Deep Dive">
  <button onclick="saveKey()">Save Key</button>
</div>

<div class="masthead">
    <div class="feed-selector-container">
        <select id="feed-dropdown" onchange="loadFeed()">
            <optgroup label="Business News">
                <option value="https://www.thehindubusinessline.com/feeder/default.rss">Business Line</option>
                <option value="https://economictimes.indiatimes.com/rssfeedsdefault.cms">Economic Times</option>
                <option value="https://www.livemint.com/rss/markets">Livemint Markets</option>
                <option value="https://www.moneycontrol.com/rss/MCtopnews.xml">Moneycontrol</option>
                <option value="https://wap.business-standard.com/rss/markets-106.rss">Business Standard</option>
            </optgroup>
            <optgroup label="Daily News">
                <option value="https://theprint.in/feed/">ThePrint</option>
                <option value="https://indianexpress.com/feed/">The Indian Express</option>
                <option value="https://www.livemint.com/rss/news">Livemint News</option>
            </optgroup>
        </select>
    </div>
    <div class="tagline" id="header-date">Financial Intelligence Terminal</div>
    <div class="masthead-title">Gemini Pulse</div>
    <div class="tagline">Live Feed</div>
</div>

<div class="container">
  <div id="rss-output"></div>
</div>

<script>
    // Restored your working model ID
    const GEMINI_MODEL = "gemini-3.1-flash-lite-preview"; 
    let articleContexts = {}; 

    window.onload = () => {
        if(localStorage.getItem('gemini_key')) {
            document.getElementById('setup').style.display = 'none';
        }
        document.getElementById('header-date').textContent = new Date().toLocaleDateString('en-IN', { 
            weekday: 'long', day: 'numeric', month: 'long' 
        });
        loadFeed(); 
    };

    function saveKey() { 
        localStorage.setItem('gemini_key', document.getElementById('api-key').value.trim()); 
        document.getElementById('setup').style.display = 'none'; 
    }

    function timeSince(dateString) {
        const date = new Date(dateString);
        const seconds = Math.floor((new Date() - date) / 1000);
        let interval = seconds / 86400; if (interval > 1) return Math.floor(interval) + "d ago";
        interval = seconds / 3600; if (interval > 1) return Math.floor(interval) + "h ago";
        interval = seconds / 60; if (interval > 1) return Math.floor(interval) + "m ago";
        return "Now";
    }

    function loadFeed() {
        const outputContainer = document.getElementById("rss-output");
        const dropdown = document.getElementById("feed-dropdown");
        const currentFeedUrl = dropdown.value;
        const selectedFeedName = dropdown.options[dropdown.selectedIndex].text;

        outputContainer.innerHTML = "<div class='loading-text' style='text-align:center; margin-top:40px;'>📡 Fetching terminal data...</div>";

        fetch('https://api.rss2json.com/v1/api.json?rss_url=' + encodeURIComponent(currentFeedUrl))
            .then(response => response.json())
            .then(data => {
                if (data.status !== 'ok') throw new Error("Feed failed.");
                let htmlOutput = "";

                data.items.forEach((item, index) => {
                    let cleanDesc = item.description ? item.description.replace(/<[^>]*>?/gm, '').trim() : "";
                    if (cleanDesc.length > 300) cleanDesc = cleanDesc.substring(0, 300) + "...";

                    articleContexts[index] = { text: cleanDesc, title: item.title, link: item.link };

                    htmlOutput += `
                        <div class="feed-item">
                            <a href="${item.link}" class="headline" target="_blank">${item.title}</a>
                            ${cleanDesc ? `<p class="description">${cleanDesc}</p>` : ''}
                            <div class="meta">${timeSince(item.pubDate)} &mdash; ${selectedFeedName}</div>
                            <button class="action-btn" onclick="startAI(${index}, '${item.link}')">✨ AI Deep Dive & Chat</button>
                            
                            <div id="ai-panel-${index}" class="ai-panel">
                                <h4>Intelligence Briefing</h4>
                                <div id="ai-output-${index}" class="loading-text"></div>
                                
                                <div id="chat-ui-${index}" style="display:none; margin-top: 20px; border-top: 1px solid #eee; padding-top: 15px;">
                                    <h4>Ask Follow-up</h4>
                                    <div id="chat-history-${index}" class="chat-history"></div>
                                    <div class="chat-input-row">
                                        <input type="text" id="chat-input-${index}" class="chat-input" placeholder="Ask a question about this article...">
                                        <button class="chat-send" onclick="askQuestion(${index})">Ask</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                });
                outputContainer.innerHTML = htmlOutput;
            })
            .catch(err => {
                outputContainer.innerHTML = "<div style='color:#d93025; text-align:center;'>❌ Connection lost.</div>";
            });
    }

    // -- AI FUNCTIONS --

    async function fetchArticleText(url) {
        try {
            const res = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(url)}`);
            const data = await res.json();
            const parser = new DOMParser();
            const doc = parser.parseFromString(data.contents, "text/html");
            const paragraphs = Array.from(doc.querySelectorAll('p')).map(p => p.innerText.trim());
            let fullText = paragraphs.join('\n\n').trim();
            return fullText.length > 200 ? fullText.substring(0, 15000) : null; 
        } catch (e) {
            return null;
        }
    }

    async function callGemini(promptText, apiKey) {
        const url = `https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent?key=${apiKey}`;
        const response = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ 
                contents: [{ parts: [{ text: promptText }] }] 
            })
        });
        const resData = await response.json();
        if (resData.error) throw new Error(resData.error.message);
        return resData.candidates[0].content.parts[0].text;
    }

    async function startAI(index, url) {
        const apiKey = localStorage.getItem('gemini_key');
        if (!apiKey) return alert("Please enter your Gemini API Key at the top of the page.");

        const panel = document.getElementById(`ai-panel-${index}`);
        const output = document.getElementById(`ai-output-${index}`);
        const chatUi = document.getElementById(`chat-ui-${index}`);
        
        panel.style.display = 'block';
        chatUi.style.display = 'none';
        output.innerHTML = "🔄 Fetching article text from source...";

        let scrapedText = await fetchArticleText(url);
        
        if (!scrapedText) {
            scrapedText = articleContexts[index].text; 
            output.innerHTML = "⚠️ <i>Source blocked direct extraction. Analyzing RSS summary instead...</i><br><br>";
        } else {
            output.innerHTML = "🧠 <i>Reading full text...</i><br><br>";
        }

        articleContexts[index].scrapedContent = scrapedText;

        const prompt = `Act as a financial analyst. Read this text and provide a concise, 3-bullet point executive summary. Do not use markdown headers, just bullet points. \n\nTEXT:\n${scrapedText}`;

        try {
            const aiResponse = await callGemini(prompt, apiKey);
            output.innerHTML = aiResponse.replace(/\n/g, '<br>');
            chatUi.style.display = 'block'; 
        } catch (e) {
            output.innerHTML = `<span style="color:red">❌ AI Error: ${e.message}</span>`;
        }
    }

    async function askQuestion(index) {
        const apiKey = localStorage.getItem('gemini_key');
        const inputField = document.getElementById(`chat-input-${index}`);
        const historyBox = document.getElementById(`chat-history-${index}`);
        const question = inputField.value.trim();
        const contextText = articleContexts[index].scrapedContent;

        if (!question) return;

        historyBox.innerHTML += `<div class="chat-bubble user-bubble">${question}</div>`;
        inputField.value = "";
        historyBox.scrollTop = historyBox.scrollHeight;

        const prompt = `
        You are an assistant answering questions based strictly on the provided ARTICLE TEXT. 
        If the answer is not contained in the text, or if the user asks an unrelated general knowledge question, you MUST reply with: "I can only answer questions related to the information provided in the article." Do not attempt to use outside knowledge.
        
        ARTICLE TEXT:
        "${contextText}"

        USER QUESTION:
        "${question}"
        `;

        try {
            const aiResponse = await callGemini(prompt, apiKey);
            historyBox.innerHTML += `<div class="chat-bubble ai-bubble">${aiResponse}</div>`;
            historyBox.scrollTop = historyBox.scrollHeight;
        } catch (e) {
            historyBox.innerHTML += `<div class="chat-bubble ai-bubble" style="color:red;">Error getting response.</div>`;
        }
    }
</script>
</body>
</html>
