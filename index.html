<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gemini Pulse</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root { 
    --ink: #1a1a18; 
    --paper: #f5f0e8; 
    --accent: #1a5c3a; 
    --rule: #c8c0b0; 
    --muted: #5a554c; 
    --meta-color: #8c867a;
  }
  
  * { box-sizing: border-box; margin: 0; padding: 0; }
  
  body { 
    background: var(--paper); 
    color: var(--ink); 
    font-family: 'IBM Plex Sans', sans-serif; 
    min-height: 100vh; 
    line-height: 1.6; 
  }
  
  /* Top Right Settings Wheel */
  .settings-wheel {
    position: absolute;
    top: 20px;
    right: 25px;
    font-size: 18px;
    cursor: pointer;
    color: var(--meta-color);
    transition: transform 0.4s ease, color 0.2s ease;
    z-index: 100;
  }

  .settings-wheel:hover {
    transform: rotate(90deg);
    color: var(--ink);
  }

  .masthead { 
    border-bottom: 3px double var(--ink); 
    padding: 30px 20px; 
    text-align: center; 
    background: var(--paper); 
    position: relative;
  }
  
  .masthead-title { 
    font-family: 'Playfair Display', serif; 
    font-size: clamp(32px, 5vw, 56px); 
    font-weight: 700; 
  }
  
  .tagline { 
    font-family: 'IBM Plex Mono', monospace; 
    font-size: 10px; 
    letter-spacing: 0.2em; 
    text-transform: uppercase; 
    color: var(--meta-color); 
    margin-top: 8px; 
  }
  
  .container { 
    max-width: 800px; 
    margin: 0 auto; 
    padding: 30px 20px 80px; 
  }
  
  .feed-item {
    margin-bottom: 35px;
    border-bottom: 1px solid var(--rule);
    padding-bottom: 25px;
  }

  .feed-item:last-child {
    border-bottom: none;
  }

  .headline {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    color: var(--ink);
    text-decoration: none;
    font-weight: 700;
    display: block; 
    line-height: 1.3;
    margin-bottom: 10px;
  }

  .headline:hover {
    color: var(--accent);
    text-decoration: underline;
  }

  .description {
    font-size: 15px;
    color: var(--muted);
    margin-bottom: 12px;
    line-height: 1.6;
  }

  .meta {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px; /* Smallest font requested */
    color: var(--meta-color);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .system-msg {
    font-family: 'IBM Plex Mono', monospace; 
    font-size: 12px; 
    color: var(--meta-color); 
    text-align: center;
    margin-top: 40px;
  }
</style>
</head>
<body>

<div class="settings-wheel" onclick="changeFeed()" title="Change RSS Feed">⚙️</div>

<div class="masthead">
    <div class="tagline" id="header-date">Financial Intelligence Terminal</div>
    <div class="masthead-title">Gemini Pulse</div>
    <div class="tagline">Live Feed</div>
</div>

<div class="container">
  <div id="rss-output">
      <div class="system-msg">Initializing secure terminal...</div>
  </div>
</div>

<script>
    let currentFeedUrl = "https://www.thehindubusinessline.com/feeder/default.rss";

    window.onload = () => {
        document.getElementById('header-date').textContent = new Date().toLocaleDateString('en-IN', { 
            weekday: 'long', day: 'numeric', month: 'long' 
        });
        loadFeed(); 
    };

    function changeFeed() {
        const newUrl = prompt("Enter new RSS Feed URL:", currentFeedUrl);
        if (newUrl && newUrl.trim() !== "") {
            currentFeedUrl = newUrl.trim();
            loadFeed();
        }
    }

    // Function to calculate "X hours ago"
    function timeSince(dateString) {
        const date = new Date(dateString);
        const seconds = Math.floor((new Date() - date) / 1000);
        
        let interval = seconds / 86400;
        if (interval > 1) return Math.floor(interval) + " days ago";
        
        interval = seconds / 3600;
        if (interval > 1) return Math.floor(interval) + " hours ago";
        
        interval = seconds / 60;
        if (interval > 1) return Math.floor(interval) + " mins ago";
        
        return "Just now";
    }

    function loadFeed() {
        const outputContainer = document.getElementById("rss-output");
        outputContainer.innerHTML = "<div class='system-msg'>📡 Fetching data stream...</div>";

        const apiUrl = 'https://api.rss2json.com/v1/api.json?rss_url=' + encodeURIComponent(currentFeedUrl);

        fetch(apiUrl)
            .then(response => response.json())
            .then(data => {
                if (data.status !== 'ok') {
                    throw new Error("Failed to fetch the feed.");
                }

                const feedTitle = data.feed.title || "External Link";
                let htmlOutput = "";

                data.items.forEach(item => {
                    // Strip HTML tags from the summary/description
                    let cleanDesc = item.description ? item.description.replace(/<[^>]*>?/gm, '').trim() : "";
                    
                    // Optional: Truncate if it's too long
                    if (cleanDesc.length > 350) {
                        cleanDesc = cleanDesc.substring(0, 350) + "...";
                    }

                    const timeAgo = timeSince(item.pubDate);

                    htmlOutput += `
                        <div class="feed-item">
                            <a href="${item.link}" class="headline" target="_blank" rel="noopener">${item.title}</a>
                            ${cleanDesc ? `<p class="description">${cleanDesc}</p>` : ''}
                            <div class="meta">${timeAgo} &mdash; ${feedTitle}</div>
                        </div>
                    `;
                });

                outputContainer.innerHTML = htmlOutput;
            })
            .catch(err => {
                console.error("Terminal Error:", err);
                outputContainer.innerHTML = "<div class='system-msg' style='color:#d93025'>❌ Connection lost or invalid feed.</div>";
            });
    }
</script>
</body>
</html>
