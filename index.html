<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="manifest" href="data:application/json;base64,ewogICJuYW1lIjogIkdlbWluaSBGaW5hbmNlIFB1bHNlIiwKICAic2hvcnRfbmFtZSI6ICJHZW1pbmkgTmV3cyIsCiAgInN0YXJ0X3VybCI6ICIuIiwKICAiZGlzcGxheSI6ICJzdGFuZGFsb25lIiwKICAiYmFja2dyb3VuZF9jb2xvciI6ICIjZjVmMGV4IiwKICAidGhlbWVfY29sb3IiOiAiIzFhNWMzYSIsCiAgImljb25zIjogW3sgInNyYyI6ICJodHRwczovL2Nkbi1pY29ucy1wbmcuZmxhdGljb24uY29tLzUxMi8yNzg5LzI3ODkyNTkucG5nIiwgInNpemVzIjogIjUxMng1MTIiLCAidHlwZSI6ICJpbWFnZS9wbmciIH1dCn0=">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root { --ink: #1a1a18; --paper: #f5f0e8; --paper2: #ede8de; --accent: #1a5c3a; --rule: #c8c0b0; --muted: #7a7468; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--paper); color: var(--ink); font-family: 'IBM Plex Sans', sans-serif; min-height: 100vh; line-height: 1.6; }
  
  /* Masthead */
  .masthead { border-bottom: 3px double var(--ink); padding: 30px 20px; text-align: center; background: var(--paper); }
  .masthead-title { font-family: 'Playfair Display', serif; font-size: clamp(32px, 5vw, 56px); font-weight: 700; }
  .tagline { font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); margin-top: 8px; }

  .container { max-width: 800px; margin: 0 auto; padding: 20px 20px 80px; }
  
  /* UI Components */
  .setup-box { background: var(--paper2); padding: 20px; border: 1px solid var(--rule); margin-bottom: 30px; border-radius: 4px; }
  input, button { font-family: 'IBM Plex Mono', monospace; padding: 12px; border: 1px solid var(--rule); font-size: 13px; }
  .btn-main { background: var(--ink); color: white; cursor: pointer; width: 100%; font-weight: bold; text-transform: uppercase; border: none; letter-spacing: 1px; transition: 0.2s; }
  .btn-main:hover { background: #333; }
  
  #status { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--muted); text-align: center; margin: 20px 0; padding: 10px; border: 1px dashed var(--rule); background: #fff; }

  /* Sections */
  .section { margin-bottom: 40px; border-bottom: 1px solid var(--rule); padding-bottom: 25px; animation: fadeIn 0.4s ease; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .section h2 { font-family: 'Playfair Display', serif; color: var(--accent); font-size: 24px; margin-bottom: 12px; }
  
  .btn-row { display: flex; gap: 10px; margin-top: 15px; }
  .action-btn { font-size: 10px; background: white; border: 1px solid var(--accent); color: var(--accent); cursor: pointer; padding: 6px 14px; border-radius: 4px; font-weight: bold; transition: 0.2s; }
  .action-btn:hover { background: var(--accent); color: white; }

  .detail-box { background: white; padding: 20px; border-left: 5px solid var(--accent); margin-top: 15px; display: none; font-size: 14px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
  .detail-box h3 { margin-bottom: 10px; color: var(--accent); border-bottom: 1px solid #eee; padding-bottom: 5px; font-family: 'Playfair Display', serif; }
  
  .hidden { display: none; }
</style>
</head>
<body>

<div class="masthead">
    <div class="tagline" id="header-date">Financial Research Terminal</div>
    <div class="masthead-title">Gemini Pulse</div>
    <div class="tagline" id="last-update">Initializing Engine...</div>
</div>

<div class="container">
  <div id="setup" class="setup-box">
    <p class="tagline" style="margin-bottom: 10px; color: var(--ink)">Enter AI Studio API Key</p>
    <div style="display:flex; gap: 10px;">
        <input type="password" id="api-key" placeholder="AIza..." style="flex:1">
        <button onclick="saveKey()">Save Key</button>
    </div>
  </div>

  <button class="btn-main" onclick="runBriefing()">Pull New Intelligence</button>
  <div id="status">System Ready</div>

  <div id="briefing-output"></div>
</div>

<script>
// 2026 Production Configuration
const MODEL_ID = "gemini-3.1-flash-lite-preview"; 
const FEED_URLS = [
  'https://pulse.zerodha.com/feed.php',
  'https://economictimes.indiatimes.com/rssfeedsdefault.cms',
  'https://www.livemint.com/rss/markets',
  'https://www.moneycontrol.com/rss/MCtopnews.xml'
];

function saveKey() {
  const key = document.getElementById('api-key').value.trim();
  if(!key) return alert("Please enter a valid key.");
  localStorage.setItem('gemini_key', key);
  document.getElementById('setup').classList.add('hidden');
}

window.onload = () => {
  if(localStorage.getItem('gemini_key')) {
    document.getElementById('setup').classList.add('hidden');
  }
  const last = localStorage.getItem('last_timestamp');
  if(last) document.getElementById('last-update').textContent = "Last Run: " + new Date(parseInt(last)).toLocaleString();
  document.getElementById('header-date').textContent = new Date().toLocaleDateString('en-IN', { weekday: 'long', day: 'numeric', month: 'long' });
};

async function runBriefing(forceAll = false) {
  const apiKey = localStorage.getItem('gemini_key');
  if(!apiKey) return alert("Please save your API key first.");

  const status = document.getElementById('status');
  const output = document.getElementById('briefing-output');
  const lastTimestamp = forceAll ? (Date.now() - 24*60*60*1000) : parseInt(localStorage.getItem('last_timestamp') || "0");
  
  status.innerHTML = "🔍 Scanning Indian Market Feeds...";
  let allArticles = [];
  const seen = new Set();

  for (const url of FEED_URLS) {
    try {
      const res = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(url)}&t=${Date.now()}`);
      const data = await res.json();
      
      if(data.status === 'ok' && data.items && Array.isArray(data.items)) {
        data.items.forEach(item => {
          const pubTime = new Date(item.pubDate).getTime();
          const titleKey = item.title.toLowerCase().trim().slice(0, 50);

          if (pubTime > lastTimestamp && !seen.has(titleKey)) {
            seen.add(titleKey);
            allArticles.push({ 
                title: item.title, 
                desc: item.description.replace(/<[^>]+>/g, '').slice(0, 250), 
                link: item.link, 
                time: pubTime 
            });
          }
        });
      }
    } catch (e) { console.error("Feed error", e); }
  }

  if (allArticles.length === 0) {
    status.innerHTML = "☕ No new developments since last pull. <br><button onclick='runBriefing(true)' style='font-size:10px; border:none; background:none; text-decoration:underline; cursor:pointer; color:var(--accent)'>Force Scan (24h)</button>";
    return;
  }

  status.textContent = `🤖 Gemini is analyzing ${allArticles.length} stories...`;
  
  try {
    const prompt = `Group these headlines into 3-4 major market themes. Output ONLY raw JSON. Format: {"themes": [{"title": "Theme Name", "summary": "3-sentence text"}]}. NEWS: ${JSON.stringify(allArticles)}`;
    const rawResponse = await callGemini(prompt, apiKey);
    
    const cleaned = rawResponse.replace(/```json|```/g, "").trim();
    const briefingData = JSON.parse(cleaned);
    
    if (briefingData && briefingData.themes && Array.isArray(briefingData.themes)) {
        renderBriefing(briefingData, allArticles);
        localStorage.setItem('last_timestamp', Math.max(...allArticles.map(a => a.time)).toString());
        document.getElementById('last-update').textContent = "Last Run: " + new Date().toLocaleString();
        status.textContent = "✅ Intelligence Briefing Complete.";
    } else {
        throw new Error("AI response format invalid.");
    }
  } catch (err) {
    status.innerHTML = `❌ <b>AI Error:</b> ${err.message}. Try pulling again.`;
  }
}

async function callGemini(promptText, key) {
  const url = `https://generativelanguage.googleapis.com/v1beta/models/${MODEL_ID}:generateContent?key=${key}`;
  const response = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      contents: [{ parts: [{ text: promptText }] }],
      generationConfig: { responseMimeType: "application/json" }
    })
  });
  const resData = await response.json();
  if (resData.error) throw new Error(resData.error.message);
  return resData.candidates[0].content.parts[0].text;
}

function renderBriefing(data, articles) {
  const container = document.getElementById('briefing-output');
  container.innerHTML = "";

  data.themes.forEach((theme, index) => {
    const primaryArticle = articles.find(a => theme.summary.includes(a.title.slice(0, 5))) || articles[0];
    
    const div = document.createElement('div');
    div.className = 'section';
    div.innerHTML = `
      <h2>${theme.title}</h2>
      <p id="sum-${index}">${theme.summary}</p>
      <div class="btn-row">
        <button class="action-btn" onclick="explainAsStory(${index})">✨ Story Mode</button>
        <button class="action-btn" onclick="fetchDetails('${primaryArticle.link}', ${index})">📈 Deep Dive</button>
      </div>
      <div id="detail-${index}" class="detail-box"></div>
    `;
    container.appendChild(div);
  });
}

async function fetchDetails(link, index) {
  const box = document.getElementById(`detail-${index}`);
  const key = localStorage.getItem('gemini_key');
  box.style.display = 'block';
  box.innerHTML = "<i>Attempting to bypass security and scrape content...</i>";

  const proxies = [
    `https://api.allorigins.win/get?url=${encodeURIComponent(link)}`,
    `https://corsproxy.io/?${encodeURIComponent(link)}`
  ];

  for (let proxyUrl of proxies) {
    try {
      const res = await fetch(proxyUrl);
      let html = "";
      
      if (proxyUrl.includes("allorigins")) {
        const data = await res.json();
        html = data.contents;
      } else {
        html = await res.text();
      }

      const doc = new DOMParser().parseFromString(html, 'text/html');
      doc.querySelectorAll('script, style, nav, footer, header').forEach(el => el.remove());
      const bodyText = doc.body.innerText.replace(/\s\s+/g, ' ').slice(0, 4500);

      // --- SECURITY VALIDATION ---
      const errorKeywords = ["403 Forbidden", "Access Denied", "Cloudflare", "Akamai", "Reference ID"];
      const isErrorPage = errorKeywords.some(word => bodyText.includes(word));

      if (isErrorPage || bodyText.length < 300) {
        throw new Error("Blocked by Firewall");
      }

      const prompt = `Act as a senior Research Analyst. Based on this article text: "${bodyText}", provide a Deep Dive report with: 1. CORE, 2. BACKGROUND, 3. SEQUENCE (Impact chain), and 4. INVESTOR VIEW. Use bullet points and simple language.`;

      const detailText = await callGemini(prompt, key);
      box.innerHTML = `<h3>Deep Dive Report</h3>` + detailText.replace(/\n/g, '<br>');
      box.scrollIntoView({ behavior: 'smooth', block: 'center' });
      return; 
    } catch (e) {
      console.warn(`Proxy failed, trying fallback...`);
    }
  }
  
  box.innerHTML = `❌ <b>Security Block:</b> This site (NDTV/Akamai) is blocking automated research. <br><br> 
                   <a href="${link}" target="_blank" style="color:var(--accent); font-weight:bold;">
                   Click here to read the full article on their site.</a>`;
}

async function explainAsStory(index) {
  const text = document.getElementById(`sum-${index}`).textContent;
  const box = document.getElementById(`detail-${index}`);
  box.style.display = 'block';
  box.innerHTML = "<i>Writing story...</i>";
  const prompt = `Explain this market update as a simple story for a beginner: "${text}"`;
  try {
      const result = await callGemini(prompt, localStorage.getItem('gemini_key'));
      box.innerHTML = `<h3>The Story</h3>` + result.replace(/\n/g, '<br>');
  } catch(e) { box.innerHTML = "Error writing story."; }
}

// PWA Service Worker
if ('serviceWorker' in navigator) {
  const swCode = `self.addEventListener('fetch', function(e) { e.respondWith(fetch(e.request)); });`;
  const blob = new Blob([swCode], {type: 'text/javascript'});
  navigator.serviceWorker.register(URL.createObjectURL(blob));
}
</script>
</body>
</html>
