<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self';
                 script-src  'unsafe-inline' https://api.rss2json.com;
                 style-src   'unsafe-inline' https://fonts.googleapis.com;
                 font-src    https://fonts.gstatic.com;
                 img-src     * data:;
                 connect-src *;">
  <title>Pulse v26B</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">

  <style>

    /* ════════════════════════════════════════════════════════════════════
       CSS §1 — DESIGN TOKENS & GLOBAL BASE STYLES
    ════════════════════════════════════════════════════════════════════ */
    :root {
      --ink:            #1a1a18;   
      --paper:          #f5f0e8;   
      --accent:         #1a5c3a;   
      --rule:           #c8c0b0;   
      --muted:          #5a554c;   
      --meta-color:     #8c867a;   
      --error:          #c0392b;   
      --reader-font-sz: 17px;      
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background:  var(--paper);
      color:       var(--ink);
      font-family: 'IBM Plex Sans', sans-serif;
      min-height:  100vh;
      line-height: 1.6;
    }


    /* ════════════════════════════════════════════════════════════════════
       CSS §2 — CONTROLS BAR
    ════════════════════════════════════════════════════════════════════ */
    .controls-bar {
      position:    absolute;
      top:         16px;
      right:       20px;
      z-index:     100;
      display:     flex;
      align-items: center;
      gap:         10px;
    }

    select {
      font-family:      'IBM Plex Mono', monospace;
      font-size:        11px;
      background-color: transparent;
      color:            var(--ink);
      border:           1px solid var(--rule);
      padding:          6px 10px;
      border-radius:    4px;
      cursor:           pointer;
      outline:          none;
      text-transform:   uppercase;
      font-weight:      500;
      max-width:        200px;
    }
    select:hover { border-color: var(--accent); }

    .btn-outline {
      font-family:    'IBM Plex Mono', monospace;
      font-size:      14px; /* Slightly larger for icons */
      background:     transparent;
      color:          var(--accent);
      border:         1px solid var(--accent);
      padding:        6px 12px;
      border-radius:  4px;
      cursor:         pointer;
      text-transform: uppercase;
      font-weight:    500;
      transition:     all 0.2s;
      white-space:    nowrap;
    }
    .btn-outline:hover    { background: var(--accent); color: var(--paper); }
    .btn-outline:disabled { opacity: 0.4; cursor: not-allowed; }

    #clear-key-btn       { color: var(--muted); border-color: var(--rule); }
    #clear-key-btn:hover { background: var(--ink); color: var(--paper); border-color: var(--ink); }

    #refresh-btn.spinning { animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }


    /* ════════════════════════════════════════════════════════════════════
       CSS §3 — MASTHEAD
    ════════════════════════════════════════════════════════════════════ */
    .masthead {
      border-bottom: 3px double var(--ink);
      padding:       30px 20px;
      text-align:    center;
      background:    var(--paper);
      position:      relative;
    }
    .masthead-title {
      font-family: 'Playfair Display', serif;
      font-size:   clamp(32px, 5vw, 56px);
      font-weight: 700;
    }
    .tagline {
      font-family:    'IBM Plex Mono', monospace;
      font-size:      10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color:          var(--meta-color);
      margin-top:     8px;
    }


    /* ════════════════════════════════════════════════════════════════════
       CSS §4 — FEED STATUS BAR
    ════════════════════════════════════════════════════════════════════ */
    .feed-status-bar {
      max-width:       800px;
      margin:          16px auto 0;
      padding:         0 20px;
      display:         flex;
      justify-content: space-between;
      align-items:     center;
      font-family:     'IBM Plex Mono', monospace;
      font-size:       10px;
      color:           var(--meta-color);
      text-transform:  uppercase;
      letter-spacing:  0.05em;
    }


    /* ════════════════════════════════════════════════════════════════════
       CSS §5 — FEED CONTAINER & ARTICLE CARDS
    ════════════════════════════════════════════════════════════════════ */
    .container {
      max-width: 800px;
      margin:    0 auto;
      padding:   20px 20px 80px;
    }

    .feed-item {
      margin-bottom:  35px;
      border-bottom:  1px solid var(--rule);
      padding-bottom: 25px;
      animation:      fadeIn 0.3s ease forwards;
      opacity:        0;
    }
    .feed-item:last-child { border-bottom: none; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .headline {
      font-family:     'Playfair Display', serif;
      font-size:       22px;
      color:           var(--ink);
      text-decoration: none;
      font-weight:     700;
      display:         block;
      line-height:     1.3;
      margin-bottom:   10px;
      word-break:      break-word;
      cursor:          pointer;
    }
    .headline:hover { color: var(--accent); text-decoration: underline; }

    .description {
      font-size:     15px;
      color:         var(--muted);
      margin-bottom: 12px;
      line-height:   1.6;
    }

    .meta {
      font-family:    'IBM Plex Mono', monospace;
      font-size:      10px;
      color:          var(--meta-color);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }


    /* ════════════════════════════════════════════════════════════════════
       CSS §6 — SYSTEM / STATUS MESSAGES
    ════════════════════════════════════════════════════════════════════ */
    .system-msg {
      font-family: 'IBM Plex Mono', monospace;
      font-size:   12px;
      color:       var(--meta-color);
      text-align:  center;
      margin-top:  60px;
      line-height: 2;
    }
    .system-msg.error { color: var(--error); }

    .cached-badge {
      display:        inline-block;
      font-family:    'IBM Plex Mono', monospace;
      font-size:      9px;
      background:     var(--rule);
      color:          var(--muted);
      padding:        1px 5px;
      border-radius:  2px;
      text-transform: uppercase;
      margin-left:    6px;
      vertical-align: middle;
    }


    /* ════════════════════════════════════════════════════════════════════
       CSS §7 — READER MODE PANEL
    ════════════════════════════════════════════════════════════════════ */
    #reader-backdrop {
      display:         none;
      position:        fixed;
      inset:           0;
      background:      rgba(26,26,24,0.45);
      z-index:         998;
      backdrop-filter: blur(2px);
    }
    #reader-backdrop.open { display: block; }

    #reader-panel {
      position:       fixed;
      top: 0; right: 0; bottom: 0;
      width:          100%;
      max-width:      780px;
      background:     var(--paper);
      z-index:        999;
      display:        flex;
      flex-direction: column;
      transform:      translateX(100%);
      transition:     transform 0.35s cubic-bezier(.4,0,.2,1);
      box-shadow:     -4px 0 40px rgba(0,0,0,0.18);
    }
    #reader-panel.open { transform: translateX(0); }

    #reader-progress {
      position:   absolute;
      top: 0; left: 0;
      height:     3px;
      width:      0%;
      background: var(--accent);
      transition: width 0.2s;
      z-index:    5;
    }

    .reader-topbar {
      display:       flex;
      align-items:   center;
      gap:           10px;
      padding:       14px 20px;
      border-bottom: 1px solid var(--rule);
      background:    var(--paper);
      flex-shrink:   0;
      position:      relative;
      z-index:       20;
    }

    .reader-back-btn {
      font-family:    'IBM Plex Mono', monospace;
      font-size:      11px;
      font-weight:    500;
      text-transform: uppercase;
      background:     transparent;
      color:          var(--accent);
      border:         1px solid var(--accent);
      padding:        5px 12px;
      border-radius:  4px;
      cursor:         pointer;
      white-space:    nowrap;
      transition:     background 0.2s, color 0.2s;
      flex-shrink:    0;
    }
    .reader-back-btn:hover { background: var(--accent); color: var(--paper); }

    .reader-source-url {
      font-family:   'IBM Plex Mono', monospace;
      font-size:     10px;
      color:         var(--meta-color);
      white-space:   nowrap;
      overflow:      hidden;
      text-overflow: ellipsis;
      flex:          1;
    }

    .reader-font-ctrl { display: flex; gap: 4px; flex-shrink: 0; }
    .reader-font-ctrl button {
      font-family:     'IBM Plex Mono', monospace;
      font-size:       13px;
      background:      transparent;
      border:          1px solid var(--rule);
      color:           var(--muted);
      width: 28px; height: 28px;
      border-radius:   4px;
      cursor:          pointer;
      display:         flex;
      align-items:     center;
      justify-content: center;
      transition:      border-color 0.2s;
    }
    .reader-font-ctrl button:hover { border-color: var(--ink); color: var(--ink); }

    .reader-open-btn {
      font-family:     'IBM Plex Mono', monospace;
      font-size:       10px;
      font-weight:     500;
      text-transform:  uppercase;
      background:      transparent;
      color:           var(--muted);
      border:          1px solid var(--rule);
      padding:         5px 10px;
      border-radius:   4px;
      cursor:          pointer;
      white-space:     nowrap;
      text-decoration: none;
      transition:      all 0.2s;
      flex-shrink:     0;
    }
    .reader-open-btn:hover { border-color: var(--ink); color: var(--ink); }

    .reader-ai-btn {
      color:        var(--accent);
      border-color: var(--accent);
      background:   rgba(26, 92, 58, 0.05);
      font-weight:  600;
    }
    .reader-ai-btn:hover { background: var(--accent); color: var(--paper); }

    .reader-scroll {
      overflow-y: auto;
      flex:       1;
      padding:    36px 40px 60px;
      position:   relative;
      z-index:    10;
    }

    .reader-article-title {
      font-family:   'Playfair Display', serif;
      font-size:     clamp(22px, 3.5vw, 32px);
      font-weight:   700;
      line-height:   1.25;
      color:         var(--ink);
      margin-bottom: 16px;
    }
    .reader-article-meta {
      font-family:    'IBM Plex Mono', monospace;
      font-size:      11px;
      color:          var(--meta-color);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom:  28px;
      padding-bottom: 20px;
      border-bottom:  2px solid var(--rule);
    }

    .reader-body {
      font-size:      var(--reader-font-sz);
      line-height:    1.85;
      color:          var(--ink);
      padding-bottom: 40px;
    }
    .reader-body p:empty,
    .reader-body div:empty,
    .reader-body section:empty,
    .reader-body li:empty,
    .reader-body blockquote:empty { display: none; }

    .reader-body p:has(> br:only-child) { display: none; }

    .reader-body p { margin-bottom: 1.4em; }
    .reader-body h1, .reader-body h2, .reader-body h3, .reader-body h4 {
      font-family: 'Playfair Display', serif;
      margin:      1.6em 0 0.6em;
      line-height: 1.25;
    }
    .reader-body h1 { font-size: 1.5em; }
    .reader-body h2 { font-size: 1.3em; }
    .reader-body h3 { font-size: 1.1em; }
    .reader-body h4 { font-size: 1.0em; }
    .reader-body img {
      max-width:     100%;
      height:        auto;
      border-radius: 4px;
      margin:        1.2em 0;
      display:       block;
    }
    .reader-body blockquote {
      border-left: 3px solid var(--accent);
      padding:     4px 0 4px 16px;
      margin:      1.4em 0;
      color:       var(--muted);
      font-style:  italic;
    }
    .reader-body a    { color: var(--accent); word-break: break-word; }
    .reader-body ul, .reader-body ol { padding-left: 1.6em; margin-bottom: 1.2em; }
    .reader-body li   { margin-bottom: 0.4em; }


    /* ════════════════════════════════════════════════════════════════════
       CSS §8 — AI CHAT PANEL
    ════════════════════════════════════════════════════════════════════ */
    #ai-panel {
      position:       absolute;
      top:            65px;   
      right:          20px;
      width:          360px;
      max-width:      calc(100vw - 40px);
      background:     #ffffff;
      border:         1px solid var(--rule);
      border-radius:  12px;
      box-shadow:     0 8px 30px rgba(0,0,0,0.15);
      display:        flex;
      flex-direction: column;
      opacity:        0;
      pointer-events: none;
      transform:      translateY(-15px);
      transition:     all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      max-height:     65vh;
      z-index:        1005;
    }
    #ai-panel.open {
      opacity:        1;
      pointer-events: auto;
      transform:      translateY(0);
    }

    .ai-header {
      display:         flex;
      justify-content: space-between;
      align-items:     center;
      padding:         12px 16px;
      background:      var(--paper);
      border-bottom:   1px solid var(--rule);
      border-radius:   12px 12px 0 0;
      font-family:     'IBM Plex Mono', monospace;
      font-size:       11px;
      font-weight:     500;
      text-transform:  uppercase;
      color:           var(--accent);
    }
    .ai-close-btn {
      background:  transparent;
      border:      none;
      font-size:   20px;
      line-height: 1;
      cursor:      pointer;
      color:       var(--muted);
    }
    .ai-close-btn:hover { color: var(--ink); }

    .ai-chat-area {
      padding:     16px;
      overflow-y:  auto;
      flex:        1;
      font-size:   14px;
      line-height: 1.6;
    }

    .ai-message {
      margin-bottom: 16px;
      padding:       12px 16px;
      border-radius: 8px;
      background:    var(--paper);
      color:         var(--ink);
    }
    .ai-message.user   { background: rgba(26, 92, 58, 0.08); border-left: 3px solid var(--accent); }
    .ai-message.system { color: var(--muted); font-style: italic; font-size: 13px; background: transparent; padding: 0; }


    /* ════════════════════════════════════════════════════════════════════
       CSS §9 — MOBILE
    ════════════════════════════════════════════════════════════════════ */
    @media (max-width: 520px) {
      .controls-bar {
        position:         static;
        padding:          12px 16px;
        justify-content:  flex-end;
        border-bottom:    1px solid var(--rule);
        flex-wrap:        wrap;
      }
      select              { max-width: 140px; font-size: 10px; }
      .reader-source-url  { display: none; }  
    }

  </style>
</head>

  <script>
    'use strict';

    /* ════════════════════════════════════════════════════════════════════
       JS §1 — APPLICATION CONFIGURATION
    ════════════════════════════════════════════════════════════════════ */
    const CONFIG = Object.freeze({
      CACHE_TTL_MS:       5 * 60 * 1000,  
      FEED_TIMEOUT_MS:    15_000,          
      ARTICLE_TIMEOUT_MS: 7_000,           
      AUTO_REFRESH_S:     600,             
      MAX_DESC_CHARS:     500,             
      READER_FONT_MIN:    13,              
      READER_FONT_MAX:    24,              
      READER_FONT_DEF:    17,              
      GEMINI_MODEL:       'gemini-3.1-flash-lite-preview'  
    });


    /* ════════════════════════════════════════════════════════════════════
       JS §2 — STATE VARIABLES
    ════════════════════════════════════════════════════════════════════ */
    const feedCache          = {};                    
    let   requestCounter     = 0;                     
    let   debounceTimer      = null;                  
    let   countdownTimer     = null;                  
    let   readerFontSize     = CONFIG.READER_FONT_DEF; 
    let   currentArticleText = "";                    


    /* ════════════════════════════════════════════════════════════════════
       JS §3 — DOM REFERENCES
    ════════════════════════════════════════════════════════════════════ */
    const DOM = {
      output:         document.getElementById('rss-output'),
      dropdown:       document.getElementById('feed-dropdown'),
      refreshBtn:     document.getElementById('refresh-btn'),
      clearKeyBtn:    document.getElementById('clear-key-btn'),
      itemCount:      document.getElementById('item-count'),
      nextRefresh:    document.getElementById('next-refresh'),
      headerDate:     document.getElementById('header-date'),
      uploadPdfBtn:   document.getElementById('upload-pdf-btn'),
      pdfFileInput:   document.getElementById('pdf-file-input'),
      readerPanel:    document.getElementById('reader-panel'),
      readerBackdrop: document.getElementById('reader-backdrop'),
      readerContent:  document.getElementById('reader-content'),
      readerScroll:   document.getElementById('reader-scroll'),
      readerUrlLabel: document.getElementById('reader-url-label'),
      readerExtLink:  document.getElementById('reader-ext-link'),
      readerProgress: document.getElementById('reader-progress'),
      readerBack:     document.getElementById('reader-back'),
      aiToggle:       document.getElementById('reader-ai-toggle'),
      aiPanel:        document.getElementById('ai-panel'),
      aiInput:        document.getElementById('ai-input'),
      aiSubmit:       document.getElementById('ai-submit'),
      aiChatArea:     document.getElementById('ai-chat-area'),
      aiPromptBtns:   document.querySelectorAll('.ai-prompt-btn')
    };


    /* ════════════════════════════════════════════════════════════════════
       JS §4 — UTILITY & HELPER FUNCTIONS
    ════════════════════════════════════════════════════════════════════ */

    function xhrFetch(url, timeoutMs) {
      return new Promise((resolve, reject) => {
        const xhr = new XMLHttpRequest();
        let didTimeout = false;
        const timer = setTimeout(() => {
          didTimeout = true;
          xhr.abort();
          reject(new Error('TIMEOUT'));
        }, timeoutMs);
        xhr.open('GET', url, true);
        xhr.onload = () => {
          clearTimeout(timer);
          if (didTimeout) return;
          if (xhr.status >= 200 && xhr.status < 300) resolve(xhr.responseText);
          else reject(new Error('HTTP ' + xhr.status));
        };
        xhr.onerror = () => { clearTimeout(timer); reject(new Error('Network error')); };
        xhr.onabort = () => { if (!didTimeout) reject(new Error('Request aborted')); };
        xhr.send();
      });
    }

    function escapeHtml(str) {
      if (str == null) return '';
      return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    function safeUrl(url) {
      if (!url) return '#';
      if (url.startsWith('pdf-local-file')) return url; 
      try {
        const parsed = new URL(url);
        return (parsed.protocol === 'http:' || parsed.protocol === 'https:') ? url : '#';
      } catch { return '#'; }
    }

    function timeSince(dateString) {
      if (!dateString) return 'Just now';
      const date = new Date(dateString);
      if (isNaN(date.getTime())) return 'Just now';
      const seconds = Math.floor((Date.now() - date) / 1000);
      if (seconds < 60) return 'Just now';
      const mins = Math.floor(seconds / 60);
      if (mins < 60) return `${mins} mins ago`;
      return `${Math.floor(mins / 60)} hours ago`;
    }

    function processRssText(html, maxLength) {
      if (!html) return '';
      let text = html.replace(/<!\[CDATA\[(.*?)\]\]>/gs, '$1');
      text = text.replace(/<\/(p|div|h[1-6]|li)>/gi, ' ');
      text = text.replace(/<br\s*\/?>/gi, ' ');
      text = text.replace(/<[^>]*>?/gm, '');
      const doc = new DOMParser().parseFromString(text, 'text/html');
      text = doc.documentElement.textContent || '';
      text = text.replace(/\s+/g, ' ').trim();
      if (text.length > maxLength) {
        text = text.substring(0, maxLength);
        text = text.substring(0, Math.min(text.length, text.lastIndexOf(' '))) + '…';
      }
      return text;
    }

    function parseMarkdown(md) {
      if (!md) return '';
      let html = md.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
      html = html.replace(/\*(.*?)\*/g,  '<em>$1</em>');
      html = html.replace(/^- (.*)$/gm, '<ul><li>$1</li></ul>');
      html = html.replace(/<\/ul>\n<ul>/g, '\n');
      html = html.replace(/\n\n/g, '</p><p>');
      return `<p>${html}</p>`;
    }


    /* ════════════════════════════════════════════════════════════════════
       JS §5 — RSS FEEDS & FETCHING
    ════════════════════════════════════════════════════════════════════ */

    async function fetchViaJsonp(feedUrl) {
      const fnName = '_gp_' + Math.random().toString(36).slice(2, 9);
      return new Promise((resolve, reject) => {
        const script = document.createElement('script');
        window[fnName] = (data) => {
          document.head.removeChild(script);
          delete window[fnName];
          if (data.status === 'ok') resolve(data.items);
          else reject(new Error(data.message));
        };
        script.src = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(feedUrl)}&callback=${fnName}`;
        document.head.appendChild(script);
      });
    }

    async function fetchFeed(feedUrl) {
      try {
        return await fetchViaJsonp(feedUrl);
      } catch (err) {
        throw new Error('Standard proxy failed: ' + err.message);
      }
    }


    /* ════════════════════════════════════════════════════════════════════
       JS §6 — FEED RENDERING
    ════════════════════════════════════════════════════════════════════ */

    function loadFeed(forceRefresh = false) {
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(async () => {
        const feedUrl = DOM.dropdown.value;
        const feedName = DOM.dropdown.options[DOM.dropdown.selectedIndex].text;
        
        if (feedUrl === 'uploaded-pdf') {
          if (feedCache[feedUrl]) {
            renderFeedItems(feedCache[feedUrl].items, 'PDF SUMMARY', true);
            DOM.nextRefresh.textContent = 'Auto-refresh paused for local files';
          } else {
            setFeedStatus('📭 Select "PDF SUMMARY" after upload.');
          }
          return;
        }

        const cached = feedCache[feedUrl];
        const isCacheHit = cached && (Date.now() - cached.timestamp < CONFIG.CACHE_TTL_MS);
        const thisId = ++requestCounter; 

        if (!forceRefresh && isCacheHit) {
          renderFeedItems(cached.items, cached.feedName, true);
          startCountdown();
          return;
        }

        setFeedStatus('📡 Fetching feed…');
        setRefreshing(true);

        try {
          const items = await fetchFeed(feedUrl);
          if (thisId !== requestCounter) return; 
          feedCache[feedUrl] = { timestamp: Date.now(), items, feedName };
          renderFeedItems(items, feedName, false);
          startCountdown();
        } catch (err) {
          if (thisId !== requestCounter) return;
          DOM.output.innerHTML = `<div class="system-msg error">❌ Error: ${escapeHtml(err.message)}</div>`;
        } finally {
          if (thisId === requestCounter) setRefreshing(false);
        }
      }, 200);
    }

    function renderFeedItems(items, feedName, fromCache) {
      const cacheBadge = fromCache ? `<span class="cached-badge">Cached</span>` : '';
      DOM.output.innerHTML = items.map((item, idx) => {
        let desc = processRssText(item.description, CONFIG.MAX_DESC_CHARS);
        return `
          <div class="feed-item">
            <span class="headline reader-trigger" 
                  data-idx="${idx}" 
                  role="button">${escapeHtml(item.title)}</span>
            ${desc ? `<p class="description">${escapeHtml(desc)}</p>` : ''}
            <div class="meta">${timeSince(item.pubDate)} &mdash; ${escapeHtml(feedName)}${idx === 0 ? cacheBadge : ''}</div>
          </div>
        `;
      }).join('');
      DOM.itemCount.textContent = `${items.length} articles`;
    }

    function setFeedStatus(msg) {
      DOM.output.innerHTML = `<div class="system-msg">${msg}</div>`;
    }

    function setRefreshing(isLoading) {
      DOM.refreshBtn.disabled = isLoading;
      DOM.refreshBtn.classList.toggle('spinning', isLoading);
    }

    function startCountdown() {
      clearInterval(countdownTimer);
      let secondsLeft = CONFIG.AUTO_REFRESH_S;
      countdownTimer = setInterval(() => {
        secondsLeft--;
        DOM.nextRefresh.textContent = `Auto-refresh in ${Math.floor(secondsLeft / 60)}:${String(secondsLeft % 60).padStart(2, '0')}`;
        if (secondsLeft <= 0) { clearInterval(countdownTimer); loadFeed(true); }
      }, 1000);
    }


    /* ════════════════════════════════════════════════════════════════════
       JS §7 — READER MODE
    ════════════════════════════════════════════════════════════════════ */

    function openReader(idx) {
      const feedUrl = DOM.dropdown.value;
      const items = feedCache[feedUrl]?.items || [];
      const item = items[idx];
      if (!item) return;

      DOM.readerPanel.classList.add('open');
      DOM.readerBackdrop.classList.add('open');
      document.body.style.overflow = 'hidden';

      const content = item.full_text || item.description;
      DOM.readerContent.innerHTML = `<h1>${escapeHtml(item.title)}</h1><div class="reader-body">${parseMarkdown(content)}</div>`;
      currentArticleText = content;
      DOM.aiToggle.style.display = 'block';
    }

    function closeReader() {
      DOM.readerPanel.classList.remove('open');
      DOM.readerBackdrop.classList.remove('open');
      document.body.style.overflow = '';
    }


    /* ════════════════════════════════════════════════════════════════════
       JS §8 — ★ AI ENGINE ★
    ════════════════════════════════════════════════════════════════════ */

    function getGeminiKey() {
      let key = localStorage.getItem('gemini_api_key');
      if (!key) {
        key = prompt("🔒 Enter your Gemini API Key:");
        if (key) localStorage.setItem('gemini_api_key', key.trim());
      }
      return key;
    }

    function clearGeminiKey() {
      localStorage.removeItem('gemini_api_key');
    }

    async function fetchWithRetry(url, options) {
      const response = await fetch(url, options);
      if (!response.ok) throw new Error(`API Error: ${response.status}`);
      return response;
    }

    async function submitAiPrompt(userPrompt) {
      if (!userPrompt) return;
      addChatMessage('user', userPrompt);
      DOM.aiInput.value = '';
      
      const key = getGeminiKey();
      if (!key) return;

      try {
        const endpoint = `https://generativelanguage.googleapis.com/v1beta/models/${CONFIG.GEMINI_MODEL}:generateContent?key=${key}`;
        const prompt = `Context: ${currentArticleText.substring(0, 30000)}\n\nQuestion: ${userPrompt}`;
        const res = await fetchWithRetry(endpoint, {
          method: 'POST',
          body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
        });
        const data = await res.json();
        const rawText = data.candidates[0].content.parts[0].text;
        addChatMessage('assistant', rawText);
      } catch (err) {
        addChatMessage('system', `Error: ${err.message}`);
      }
    }

    function addChatMessage(role, text) {
      const div = document.createElement('div');
      div.className = `ai-message ${role}`;
      div.innerHTML = parseMarkdown(text);
      DOM.aiChatArea.appendChild(div);
      DOM.aiChatArea.scrollTop = DOM.aiChatArea.scrollHeight;
    }


    /* ════════════════════════════════════════════════════════════════════
       JS §10 — PDF BACKGROUND ENGINE
    ════════════════════════════════════════════════════════════════════ */

    async function processPdf(file) {
      const key = getGeminiKey();
      if (!key) return;

      const reader = new FileReader();
      reader.onload = async () => {
        const base64 = reader.result.split(',')[1];
        DOM.uploadPdfBtn.disabled = true;

        try {
          const endpoint = `https://generativelanguage.googleapis.com/v1beta/models/${CONFIG.GEMINI_MODEL}:generateContent?key=${key}`;
          const payload = {
            contents: [{
              parts: [
                { inlineData: { mimeType: "application/pdf", data: base64 } },
                { text: "Identify every section. Return JSON array of objects with 'title', 'summary', and 'full_text'. NO TRUNCATION of full_text." }
              ]
            }]
          };

          const response = await fetchWithRetry(endpoint, { method: 'POST', body: JSON.stringify(payload) });
          const data = await response.json();
          const cleanText = data.candidates[0].content.parts[0].text.replace(/```json|```/g, '');
          const sections = JSON.parse(cleanText);

          const items = sections.map((s, i) => ({
            title: s.title || "Untitled",
            description: s.summary || "",
            full_text: s.full_text || s.summary,
            link: `pdf-local-file-${i}`,
            pubDate: new Date().toISOString()
          }));

          feedCache['uploaded-pdf'] = { timestamp: Date.now(), items, feedName: 'PDF SUMMARY' };

          if (!Array.from(DOM.dropdown.options).some(o => o.value === 'uploaded-pdf')) {
            const optGroup = document.createElement('optgroup');
            optGroup.label = "── Local Documents ──";
            const pdfOption = document.createElement('option');
            pdfOption.value = 'uploaded-pdf';
            pdfOption.textContent = 'PDF SUMMARY';
            optGroup.appendChild(pdfOption);
            DOM.dropdown.prepend(optGroup);
          }

          // Analysis complete: Turn Light Green
          DOM.uploadPdfBtn.style.backgroundColor = '#90ee90'; 
          DOM.uploadPdfBtn.style.borderColor = '#1a5c3a';

        } catch (err) {
          console.error(err);
        } finally {
          DOM.uploadPdfBtn.disabled = false;
        }
      };
      reader.readAsDataURL(file);
    }


    /* ════════════════════════════════════════════════════════════════════
       JS §11 — INIT
    ════════════════════════════════════════════════════════════════════ */
    window.addEventListener('load', () => {
      DOM.headerDate.textContent = new Date().toLocaleDateString('en-IN', { weekday: 'long', day: 'numeric', month: 'long' });
      DOM.dropdown.addEventListener('change', () => loadFeed(false));
      DOM.refreshBtn.addEventListener('click', () => { delete feedCache[DOM.dropdown.value]; loadFeed(true); });
      DOM.clearKeyBtn.addEventListener('click', clearGeminiKey);
      DOM.uploadPdfBtn.addEventListener('click', () => DOM.pdfFileInput.click());
      DOM.pdfFileInput.addEventListener('change', (e) => { if (e.target.files[0]) processPdf(e.target.files[0]); });
      DOM.output.addEventListener('click', e => {
        const t = e.target.closest('.reader-trigger');
        if (t) openReader(t.dataset.idx);
      });
      DOM.readerBack.addEventListener('click', closeReader);
      DOM.readerBackdrop.addEventListener('click', closeReader);
      DOM.aiToggle.addEventListener('click', () => DOM.aiPanel.classList.toggle('open'));
      DOM.aiSubmit.addEventListener('click', () => submitAiPrompt(DOM.aiInput.value));
      DOM.aiInput.addEventListener('keydown', e => { if (e.key === 'Enter') submitAiPrompt(DOM.aiInput.value); });
      loadFeed();
    });

  </script>
