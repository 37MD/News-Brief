  ║             Gemini AI Parsing, Clean Original Fallback.          ║

<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self';
                 script-src  'unsafe-inline' https://api.rss2json.com;
                 style-src   'unsafe-inline' https://fonts.googleapis.com;
                 font-src    https://fonts.gstatic.com;
                 img-src     * data:;
                 connect-src *;">
  <title>Gemini Pulse</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    /* ================================================================
       DESIGN TOKENS & BASE STYLES
    ================================================================ */
    :root {
      --ink:            #1a1a18;
      --paper:          #f5f0e8;
      --accent:         #1a5c3a;
      --rule:           #c8c0b0;
      --muted:          #5a554c;
      --meta-color:     #8c867a;
      --error:          #c0392b;
      --reader-font-sz: 17px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background:   var(--paper);
      color:        var(--ink);
      font-family:  'IBM Plex Sans', sans-serif;
      min-height:   100vh;
      line-height:  1.6;
    }

    /* ================================================================
       CONTROLS BAR (Top Right)
    ================================================================ */
    .controls-bar {
      position:    absolute;
      top:         16px;
      right:       20px;
      z-index:     100;
      display:     flex;
      align-items: center;
      gap:         10px;
    }

    select {
      font-family:      'IBM Plex Mono', monospace;
      font-size:        11px;
      background-color: transparent;
      color:            var(--ink);
      border:           1px solid var(--rule);
      padding:          6px 10px;
      border-radius:    4px;
      cursor:           pointer;
      outline:          none;
      text-transform:   uppercase;
      font-weight:      500;
      max-width:        200px;
    }
    select:hover { border-color: var(--accent); }

    .btn-outline {
      font-family:    'IBM Plex Mono', monospace;
      font-size:      11px;
      background:     transparent;
      color:          var(--accent);
      border:         1px solid var(--accent);
      padding:        6px 10px;
      border-radius:  4px;
      cursor:         pointer;
      text-transform: uppercase;
      font-weight:    500;
      transition:     background 0.2s, color 0.2s;
      white-space:    nowrap;
    }
    .btn-outline:hover    { background: var(--accent); color: var(--paper); }
    .btn-outline:disabled { opacity: 0.4; cursor: not-allowed; }
    
    #clear-key-btn {
      color: var(--muted);
      border-color: var(--rule);
    }
    #clear-key-btn:hover {
      background: var(--ink);
      color: var(--paper);
      border-color: var(--ink);
    }

    #refresh-btn.spinning { animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ================================================================
       MASTHEAD (Title)
    ================================================================ */
    .masthead {
      border-bottom: 3px double var(--ink);
      padding:       30px 20px;
      text-align:    center;
      background:    var(--paper);
      position:      relative;
    }
    .masthead-title {
      font-family: 'Playfair Display', serif;
      font-size:   clamp(32px, 5vw, 56px);
      font-weight: 700;
    }
    .tagline {
      font-family:     'IBM Plex Mono', monospace;
      font-size:       10px;
      letter-spacing:  0.2em;
      text-transform:  uppercase;
      color:           var(--meta-color);
      margin-top:      8px;
    }

    /* ================================================================
       FEED STATUS BAR
    ================================================================ */
    .feed-status-bar {
      max-width:   800px;
      margin:      16px auto 0;
      padding:     0 20px;
      display:     flex;
      justify-content: space-between;
      align-items: center;
      font-family:     'IBM Plex Mono', monospace;
      font-size:       10px;
      color:           var(--meta-color);
      text-transform:  uppercase;
      letter-spacing:  0.05em;
    }

    /* ================================================================
       FEED CONTAINER & ARTICLES
    ================================================================ */
    .container {
      max-width: 800px;
      margin:    0 auto;
      padding:   20px 20px 80px;
    }

    .feed-item {
      margin-bottom: 35px;
      border-bottom: 1px solid var(--rule);
      padding-bottom: 25px;
      animation:     fadeIn 0.3s ease forwards;
      opacity:       0;
    }
    .feed-item:last-child { border-bottom: none; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .headline {
      font-family:  'Playfair Display', serif;
      font-size:    22px;
      color:        var(--ink);
      text-decoration: none;
      font-weight:  700;
      display:      block;
      line-height:  1.3;
      margin-bottom: 10px;
      word-break:   break-word;
      cursor:       pointer;
    }
    .headline:hover { color: var(--accent); text-decoration: underline; }

    .description {
      font-size:     15px;
      color:         var(--muted);
      margin-bottom: 12px;
      line-height:   1.6;
    }

    .meta {
      font-family:    'IBM Plex Mono', monospace;
      font-size:      10px;
      color:          var(--meta-color);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    /* ================================================================
       SYSTEM / STATUS MESSAGES
    ================================================================ */
    .system-msg {
      font-family: 'IBM Plex Mono', monospace;
      font-size:   12px;
      color:       var(--meta-color);
      text-align:  center;
      margin-top:  60px;
      line-height: 2;
    }
    .system-msg.error { color: var(--error); }

    .cached-badge {
      display:        inline-block;
      font-family:    'IBM Plex Mono', monospace;
      font-size:      9px;
      background:     var(--rule);
      color:          var(--muted);
      padding:        1px 5px;
      border-radius:  2px;
      text-transform: uppercase;
      margin-left:    6px;
      vertical-align: middle;
    }

    /* ================================================================
       READER MODE PANEL (Pop-up Article Viewer)
    ================================================================ */
    #reader-backdrop {
      display:         none;
      position:        fixed;
      inset:           0;
      background:      rgba(26,26,24,0.45);
      z-index:         998;
      backdrop-filter: blur(2px);
    }
    #reader-backdrop.open { display: block; }

    #reader-panel {
      position:        fixed;
      top: 0; right: 0; bottom: 0;
      width:           100%;
      max-width:       780px;
      background:      var(--paper);
      z-index:         999;
      display:         flex;
      flex-direction:  column;
      transform:       translateX(100%);
      transition:      transform 0.35s cubic-bezier(.4,0,.2,1);
      box-shadow:      -4px 0 40px rgba(0,0,0,0.18);
      overflow:        hidden;
    }
    #reader-panel.open { transform: translateX(0); }

    #reader-progress {
      position:   absolute;
      top: 0; left: 0;
      height:     3px;
      width:      0%;
      background: var(--accent);
      transition: width 0.2s;
      z-index:    5;
    }

    .reader-topbar {
      display:      flex;
      align-items:  center;
      gap:          10px;
      padding:      14px 20px;
      border-bottom: 1px solid var(--rule);
      background:   var(--paper);
      flex-shrink:  0;
    }

    .reader-back-btn {
      font-family:    'IBM Plex Mono', monospace;
      font-size:      11px;
      font-weight:    500;
      text-transform: uppercase;
      background:     transparent;
      color:          var(--accent);
      border:         1px solid var(--accent);
      padding:        5px 12px;
      border-radius:  4px;
      cursor:         pointer;
      white-space:    nowrap;
      transition:     background 0.2s, color 0.2s;
      flex-shrink:    0;
    }
    .reader-back-btn:hover { background: var(--accent); color: var(--paper); }

    .reader-source-url {
      font-family:   'IBM Plex Mono', monospace;
      font-size:     10px;
      color:         var(--meta-color);
      white-space:   nowrap;
      overflow:      hidden;
      text-overflow: ellipsis;
      flex:          1;
    }

    .reader-font-ctrl { display: flex; gap: 4px; flex-shrink: 0; }
    .reader-font-ctrl button {
      font-family:  'IBM Plex Mono', monospace;
      font-size:    13px;
      background:   transparent;
      border:       1px solid var(--rule);
      color:        var(--muted);
      width: 28px; height: 28px;
      border-radius: 4px;
      cursor:       pointer;
      display:      flex;
      align-items:  center;
      justify-content: center;
      transition:   border-color 0.2s;
    }
    .reader-font-ctrl button:hover { border-color: var(--ink); color: var(--ink); }

    .reader-open-btn {
      font-family:    'IBM Plex Mono', monospace;
      font-size:      10px;
      font-weight:    500;
      text-transform: uppercase;
      background:     transparent;
      color:          var(--muted);
      border:         1px solid var(--rule);
      padding:        5px 10px;
      border-radius:  4px;
      cursor:         pointer;
      white-space:    nowrap;
      text-decoration: none;
      transition:     border-color 0.2s, color 0.2s;
      flex-shrink:    0;
    }
    .reader-open-btn:hover { border-color: var(--ink); color: var(--ink); }

    .reader-scroll {
      overflow-y: auto;
      flex:       1;
      padding:    36px 40px 60px;
    }

    .reader-article-title {
      font-family:   'Playfair Display', serif;
      font-size:     clamp(22px, 3.5vw, 32px);
      font-weight:   700;
      line-height:   1.25;
      color:         var(--ink);
      margin-bottom: 16px;
    }

    .reader-article-meta {
      font-family:    'IBM Plex Mono', monospace;
      font-size:      11px;
      color:          var(--meta-color);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom:  28px;
      padding-bottom: 20px;
      border-bottom:  2px solid var(--rule);
    }

    .reader-body {
      font-size:   var(--reader-font-sz);
      line-height: 1.85;
      color:       var(--ink);
    }
    .reader-body p { margin-bottom: 1.4em; }
    .reader-body h1, .reader-body h2, .reader-body h3, .reader-body h4 {
      font-family: 'Playfair Display', serif;
      margin:      1.6em 0 0.6em;
      line-height: 1.25;
    }
    .reader-body h1 { font-size: 1.5em; }
    .reader-body h2 { font-size: 1.3em; }
    .reader-body h3 { font-size: 1.1em; }
    .reader-body h4 { font-size: 1.0em; }
    .reader-body img {
      max-width:     100%;
      height:        auto;
      border-radius: 4px;
      margin:        1.2em 0;
      display:       block;
    }
    .reader-body blockquote {
      border-left: 3px solid var(--accent);
      padding:     4px 0 4px 16px;
      margin:      1.4em 0;
      color:       var(--muted);
      font-style:  italic;
    }
    .reader-body a    { color: var(--accent); word-break: break-word; }
    .reader-body ul,
    .reader-body ol   { padding-left: 1.6em; margin-bottom: 1.2em; }
    .reader-body li   { margin-bottom: 0.4em; }
    .reader-body figure { margin: 1.2em 0; }
    .reader-body figcaption {
      font-family: 'IBM Plex Mono', monospace;
      font-size:   11px;
      color:       var(--meta-color);
      margin-top:  6px;
    }

    .reader-status {
      font-family: 'IBM Plex Mono', monospace;
      font-size:   12px;
      color:       var(--meta-color);
      text-align:  center;
      margin-top:  80px;
      line-height: 2.5;
    }
    .reader-status.error { color: var(--error); }

    /* ================================================================
       RESPONSIVE (Mobile specific rules)
    ================================================================ */
    @media (max-width: 520px) {
      .controls-bar {
        position:     static;
        padding:      12px 16px;
        justify-content: flex-end;
        border-bottom: 1px solid var(--rule);
        flex-wrap: wrap;
      }
      select          { max-width: 140px; font-size: 10px; }
      .masthead       { padding: 20px 16px; }
      .reader-scroll  { padding: 20px 18px 50px; }
      .reader-source-url { display: none; }
    }
  </style>
</head>

  <!-- ==============================================================
       JAVASCRIPT LOGIC
  =============================================================== -->
  <script>
    'use strict';

    /* ============================================================
       1. CONFIG
    ============================================================ */
    const CONFIG = Object.freeze({
      CACHE_TTL_MS:      5 * 60 * 1000, 
      FEED_TIMEOUT_MS:   15_000,
      ARTICLE_TIMEOUT_MS: 12_000,
      AUTO_REFRESH_S:    600,
      MAX_DESC_CHARS:    350,
      READER_FONT_MIN:   13,
      READER_FONT_MAX:   24,
      READER_FONT_DEF:   17,
    });

    /* ============================================================
       2. STATE
    ============================================================ */
    const feedCache      = {};
    let   requestCounter = 0;
    let   debounceTimer  = null;
    let   countdownTimer = null;
    let   readerFontSize = CONFIG.READER_FONT_DEF;

    /* ============================================================
       3. DOM REFS
    ============================================================ */
    const DOM = {
      output:          document.getElementById('rss-output'),
      dropdown:        document.getElementById('feed-dropdown'),
      refreshBtn:      document.getElementById('refresh-btn'),
      clearKeyBtn:     document.getElementById('clear-key-btn'),
      itemCount:       document.getElementById('item-count'),
      nextRefresh:     document.getElementById('next-refresh'),
      readerPanel:     document.getElementById('reader-panel'),
      readerBackdrop:  document.getElementById('reader-backdrop'),
      readerContent:   document.getElementById('reader-content'),
      readerScroll:    document.getElementById('reader-scroll'),
      readerUrlLabel:  document.getElementById('reader-url-label'),
      readerExtLink:   document.getElementById('reader-ext-link'),
      readerProgress:  document.getElementById('reader-progress'),
      readerBack:      document.getElementById('reader-back'),
      fontUp:          document.getElementById('font-up'),
      fontDown:        document.getElementById('font-down'),
      headerDate:      document.getElementById('header-date'),
    };

    /* ============================================================
       4. SECURITY & STORAGE (Local Key Vault)
    ============================================================ */
    function getGeminiKey() {
      let key = localStorage.getItem('gemini_api_key');
      if (!key) {
        key = prompt(
          "🔒 Security Check: Enter your Gemini API Key.\n\n" +
          "This is securely saved in your browser's local storage and will NEVER be uploaded to GitHub.\n" +
          "Get a free key at: aistudio.google.com/app/apikey"
        );
        if (key && key.trim() !== "") {
          localStorage.setItem('gemini_api_key', key.trim());
        } else {
          return null; 
        }
      }
      return key;
    }

    function clearGeminiKey() {
      localStorage.removeItem('gemini_api_key');
      alert("Gemini API Key removed. It will prompt again on your next fetch.");
    }

    /* ============================================================
       5. UTILITY & HELPERS
    ============================================================ */
    function xhrFetch(url, timeoutMs) {
      return new Promise((resolve, reject) => {
        const xhr = new XMLHttpRequest();
        let didTimeout = false;
        const timer = setTimeout(() => {
          didTimeout = true;
          xhr.abort();
          reject(new Error('TIMEOUT'));
        }, timeoutMs);
        xhr.open('GET', url, true);
        xhr.onload = () => {
          clearTimeout(timer);
          if (didTimeout) return;
          if (xhr.status >= 200 && xhr.status < 300) resolve(xhr.responseText);
          else reject(new Error('HTTP ' + xhr.status));
        };
        xhr.onerror = () => { clearTimeout(timer); reject(new Error('Network error')); };
        xhr.onabort = () => { if (!didTimeout) reject(new Error('Request aborted')); };
        xhr.send();
      });
    }

    function escapeHtml(str) {
      if (str == null) return '';
      return String(str)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;').replace(/'/g, '&#039;');
    }

    function safeUrl(url) {
      if (!url) return '#';
      try {
        const parsed = new URL(url);
        return (parsed.protocol === 'http:' || parsed.protocol === 'https:') ? url : '#';
      } catch { return '#'; }
    }

    function timeSince(dateString) {
      if (!dateString) return 'Unknown time';
      const date = new Date(dateString);
      if (isNaN(date.getTime())) return 'Unknown time';
      const seconds = Math.floor((Date.now() - date) / 1000);
      if (seconds < 60) return 'Just now';
      const mins = Math.floor(seconds / 60);
      const hours = Math.floor(seconds / 3600);
      const days = Math.floor(seconds / 86400);
      if (days > 1) return `${days} days ago`;
      if (days === 1) return '1 day ago';
      if (hours > 1) return `${hours} hours ago`;
      if (hours === 1) return '1 hour ago';
      if (mins > 1) return `${mins} mins ago`;
      return '1 min ago';
    }

    function stripHtml(html) {
      if (!html) return '';
      return html.replace(/<[^>]*>?/gm, '').replace(/&nbsp;/g, ' ')
        .replace(/&amp;/g, '&').replace(/&lt;/g, '<').replace(/&gt;/g, '>')
        .replace(/&quot;/g, '"').trim();
    }

    function cleanAiResponse(text) {
      let t = text.trim();
      const marker = String.fromCharCode(96, 96, 96); 
      if (t.startsWith(marker)) {
        const firstNewline = t.indexOf('\n');
        if (firstNewline !== -1) t = t.substring(firstNewline + 1);
      }
      if (t.endsWith(marker)) {
        t = t.substring(0, t.length - 3);
      }
      return t.trim();
    }

    /* ============================================================
       6. RSS PROXIES & AI FETCH
    ============================================================ */
    const proxyUrl = {
      rss2json:   (feed, cb) => `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(feed)}${cb ? '&callback='+cb : ''}`,
      allOrigins: (feed) => `https://api.allorigins.win/raw?url=${encodeURIComponent(feed)}`,
      corsproxy:  (feed) => `https://corsproxy.io/?${encodeURIComponent(feed)}`
    };

    /**
     * Tier 0 — Gemini API for robust Feed Parsing
     */
    async function fetchViaGeminiApi(feedUrl, feedName) {
      const apiKey = getGeminiKey();
      if (!apiKey) throw new Error("Gemini API key required");

      let rawData = "";
      try {
        rawData = await xhrFetch(proxyUrl.corsproxy(feedUrl), CONFIG.FEED_TIMEOUT_MS);
      } catch(e) {
        rawData = await xhrFetch(proxyUrl.allOrigins(feedUrl), CONFIG.FEED_TIMEOUT_MS);
      }

      if(!rawData) throw new Error("Failed to retrieve source XML.");

      const endpoint = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`;
      const prompt = `Parse this raw RSS/Atom XML feed into a JSON array of the latest articles.
Source name: ${feedName}

Each item must have exactly these fields:
  title       — article headline (string)
  link        — full article URL (string)
  description — 1–2 sentence summary (string)
  pubDate     — publication date, ISO-8601 if available (string)

Return ONLY the JSON array. Maximum 15 items. Do not include formatting wrappers.

Raw XML data (truncated):
${rawData.substring(0, 15000)}`;

      const response = await fetch(endpoint, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] }),
      });

      if (!response.ok) throw new Error(`Gemini API Error: ${response.status}`);

      const data = await response.json();
      const rawText = data.candidates?.[0]?.content?.parts?.[0]?.text || '';
      
      const stripped = cleanAiResponse(rawText);
      const start = stripped.indexOf('[');
      const end = stripped.lastIndexOf(']');
      
      if (start === -1 || end === -1) throw new Error('API response contained no JSON array');
      const items = JSON.parse(stripped.slice(start, end + 1));
      if (!Array.isArray(items) || !items.length) throw new Error('API returned an empty array');
      
      return items;
    }

    function jsonpFetch(scriptUrl, fnName, timeoutMs) {
      return new Promise((resolve, reject) => {
        const script = document.createElement('script');
        let settled = false;
        const timer = setTimeout(() => {
          if (settled) return;
          settled = true; cleanup(); reject(new Error('TIMEOUT'));
        }, timeoutMs);
        function cleanup() {
          clearTimeout(timer); delete window[fnName];
          if (script.parentNode) script.parentNode.removeChild(script);
        }
        window[fnName] = (data) => {
          if (settled) return;
          settled = true; cleanup(); resolve(data);
        };
        script.src = scriptUrl; script.async = true;
        script.onerror = () => { if (settled) return; settled = true; cleanup(); reject(new Error('Script blocked')); };
        document.head.appendChild(script);
      });
    }

    async function fetchViaJsonp(feedUrl) {
      const fnName = '_gp_' + Math.random().toString(36).slice(2, 9);
      const data = await jsonpFetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(feedUrl)}&callback=${fnName}`, fnName, CONFIG.FEED_TIMEOUT_MS);
      if (!data || data.status !== 'ok') throw new Error(data?.message || 'rss2json: non-ok');
      return data.items;
    }

    async function fetchFeed(feedUrl, onStatus) {
      const errors = [];
      const feedName = DOM.dropdown.options[DOM.dropdown.selectedIndex].text;

      try { return await fetchViaGeminiApi(feedUrl, feedName); } 
      catch (err) {
        errors.push(`T0-Gemini: ${err.message}`);
        console.warn('[Proxy T0 Gemini]', err.message);
        onStatus('📡 AI unavailable. Retrying via standard proxy…');
      }

      try { return await fetchViaJsonp(feedUrl); } 
      catch (err) {
        errors.push(`T1-JSONP: ${err.message}`);
        throw new Error('All proxies failed.\n' + errors.join('\n'));
      }
    }

    /* ============================================================
       7. FEED RENDERING
    ============================================================ */
    function loadFeed(forceRefresh = false) {
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(async () => {
        const feedUrl = DOM.dropdown.value;
        const feedName = DOM.dropdown.options[DOM.dropdown.selectedIndex].text;
        const cached = feedCache[feedUrl];
        const isCacheHit = cached && (Date.now() - cached.timestamp < CONFIG.CACHE_TTL_MS);
        const thisId = ++requestCounter;

        if (!forceRefresh && isCacheHit) {
          renderFeedItems(cached.items, cached.feedName, true);
          startCountdown();
          return;
        }

        setFeedStatus('📡 Fetching via Gemini AI…');
        DOM.itemCount.textContent = '';
        setRefreshing(true);

        try {
          const items = await fetchFeed(feedUrl, (msg) => { if (thisId === requestCounter) setFeedStatus(msg); });
          if (thisId !== requestCounter) return;
          if (!items || !items.length) { setFeedStatus('📭 No articles found.'); return; }
          
          feedCache[feedUrl] = { timestamp: Date.now(), items, feedName };
          renderFeedItems(items, feedName, false);
          startCountdown();
        } catch (err) {
          if (thisId !== requestCounter) return;
          DOM.output.innerHTML = `<div class="system-msg error">❌ Feed unavailable.<br>` +
            `<small style="font-size:10px;opacity:.7;line-height:2;white-space:pre-line">${escapeHtml(err.message)}</small></div>`;
        } finally {
          if (thisId === requestCounter) setRefreshing(false);
        }
      }, 200);
    }

    function renderFeedItems(items, feedName, fromCache) {
      const cacheBadge = fromCache ? `<span class="cached-badge">Cached</span>` : '';
      DOM.output.innerHTML = items.map((item, idx) => {
        let desc = stripHtml(item.description || '');
        if (desc.length > CONFIG.MAX_DESC_CHARS) desc = desc.substring(0, CONFIG.MAX_DESC_CHARS) + '…';
        return `<div class="feed-item" style="animation-delay:${idx * 40}ms">` +
            `<span class="headline reader-trigger" data-url="${escapeHtml(safeUrl(item.link))}" ` +
            `data-title="${escapeHtml(item.title || 'Untitled')}" data-feed="${escapeHtml(feedName)}" ` +
            `data-date="${escapeHtml(item.pubDate || '')}" role="button" tabindex="0">` +
            `${escapeHtml(item.title || 'Untitled')}</span>` +
            (desc ? `<p class="description">${escapeHtml(desc)}</p>` : '') +
            `<div class="meta">${timeSince(item.pubDate)} &mdash; ${escapeHtml(feedName)}${idx === 0 ? cacheBadge : ''}</div></div>`;
      }).join('');
      DOM.itemCount.textContent = `${items.length} articles`;
    }

    function setFeedStatus(msg) { DOM.output.innerHTML = `<div class="system-msg">${msg}</div>`; }
    function setRefreshing(isLoading) {
      DOM.refreshBtn.disabled = isLoading;
      DOM.refreshBtn.classList.toggle('spinning', isLoading);
    }

    function startCountdown() {
      clearInterval(countdownTimer);
      let secondsLeft = CONFIG.AUTO_REFRESH_S;
      countdownTimer = setInterval(() => {
        secondsLeft--;
        DOM.nextRefresh.textContent = `Auto-refresh in ${Math.floor(secondsLeft / 60)}:${String(secondsLeft % 60).padStart(2, '0')}`;
        if (secondsLeft <= 0) { clearInterval(countdownTimer); loadFeed(true); }
      }, 1000);
    }

    /* ============================================================
       8. READER MODE ENGINE (Readability Fallback)
    ============================================================ */
    function openReader(url, title, feedName, pubDate) {
      const validatedUrl = safeUrl(url);
      if (validatedUrl === '#') return;

      DOM.readerPanel.classList.add('open');
      DOM.readerBackdrop.classList.add('open');
      DOM.readerBackdrop.removeAttribute('aria-hidden');
      document.body.style.overflow = 'hidden';

      try { DOM.readerUrlLabel.textContent = new URL(validatedUrl).hostname; } 
      catch { DOM.readerUrlLabel.textContent = validatedUrl; }

      DOM.readerExtLink.href = validatedUrl;
      DOM.readerScroll.scrollTop = 0;
      setReaderProgress(0);
      DOM.readerContent.innerHTML = `<div class="reader-status">📰 Fetching article...</div>`;

      fetchArticle(validatedUrl, title, feedName, pubDate);
    }

    function closeReader() {
      DOM.readerPanel.classList.remove('open');
      DOM.readerBackdrop.classList.remove('open');
      DOM.readerBackdrop.setAttribute('aria-hidden', 'true');
      document.body.style.overflow = '';
    }

    function setReaderProgress(pct) {
      const clamped = Math.min(100, Math.max(0, pct));
      DOM.readerProgress.style.width = clamped + '%';
      DOM.readerProgress.setAttribute('aria-valuenow', Math.round(clamped));
    }

    // Custom DOM Extractor based on Mozilla Readability concepts
    function extractMainContent(html, baseUrl) {
      const parser = new DOMParser();
      const doc = parser.parseFromString(html, 'text/html');
      
      // Fix relative images/links
      const base = doc.createElement('base');
      base.href = baseUrl;
      doc.head.appendChild(base);

      // Strip useless elements
      const junk = ['script', 'style', 'nav', 'footer', 'aside', 'iframe', 'noscript', '.ad', '.advertisement', '.social-share', '.related-stories', '#comments', '.header'];
      junk.forEach(sel => { try { doc.querySelectorAll(sel).forEach(el => el.remove()); } catch(e){} });

      // Find primary content node
      const selectors = ['article', '.article-body', '.story-details', '.story-content', '#article-content', '.content-area', '.article-txt', 'main', '.entry-content', '.page-content'];
      let mainEl = null;
      for(const sel of selectors) {
         const el = doc.querySelector(sel);
         if (el && el.textContent.trim().length > 300) { mainEl = el; break; }
      }

      if (!mainEl) return null;
      return sanitizeHtml(mainEl.innerHTML);
    }

    async function fetchArticle(url, title, feedName, pubDate) {
      setReaderProgress(15);
      
      const proxies = [
        `https://corsproxy.io/?${encodeURIComponent(url)}`,
        `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`
      ];

      let rawHtml = null;
      for (const proxy of proxies) {
        try {
          const res = await xhrFetch(proxy, CONFIG.ARTICLE_TIMEOUT_MS);
          // Check to ensure it's not a Cloudflare/Akamai challenge page
          if (res && res.length > 2000 && !res.includes("Just a moment...") && !res.toLowerCase().includes("enable javascript")) {
            rawHtml = res;
            break;
          }
        } catch (e) { console.warn("Proxy failed", proxy); }
        setReaderProgress(30);
      }

      // If we got the HTML, try extracting it locally
      if (rawHtml) {
         setReaderProgress(50);
         const cleanHtml = extractMainContent(rawHtml, url);
         if (cleanHtml && cleanHtml.length > 200) {
            setReaderProgress(100);
            renderArticle(cleanHtml, title, feedName, pubDate);
            return;
         }
      }

      // Tier 2: If internal extraction fails or proxy is blocked, use Gemini API
      setReaderProgress(60);
      try {
         await fetchArticleViaApi(url, title, feedName, pubDate);
         return;
      } catch(e) {
         console.warn("Gemini Extraction failed", e);
      }

      // Tier 3: TOTAL BLOCK -> Show Clean Original Button
      setReaderProgress(100);
      setTimeout(() => setReaderProgress(0), 500);
      renderReaderError(url);
    }

    async function fetchArticleViaApi(url, title, feedName, pubDate) {
      const apiKey = getGeminiKey();
      if (!apiKey) throw new Error("GEMINI_KEY_MISSING");

      let rawHtml = '';
      try {
        const res = await fetch(`https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`);
        rawHtml = await res.text();
      } catch (e) { throw new Error("Could not retrieve page source"); }

      const endpoint = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`;
      const prompt = `Act as a precise article extractor. Extract the full article body from the following raw HTML.
Article Title: "${title}"

Return ONLY the clean article HTML using only these tags: <p>, <h2>, <h3>, <h4>, <strong>, <em>, <ul>, <ol>, <li>, blockquote>.
Do NOT include navigation, ads, headers, or footers.
If the article is strictly paywalled and unreadable, return exactly: PAYWALL
Do not wrap your response in formatting markers.

RAW HTML (truncated):
${rawHtml.substring(0, 30000)}`;

      const response = await fetch(endpoint, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] }),
      });

      if (!response.ok) throw new Error(`Gemini API Error: ${response.status}`);
      const data = await response.json();
      const rawText = data.candidates?.[0]?.content?.parts?.[0]?.text || '';
      const cleanHtml = cleanAiResponse(rawText);

      if (cleanHtml === 'PAYWALL') throw new Error('PAYWALL');
      if (cleanHtml.length < CONFIG.MIN_ARTICLE_LEN) throw new Error('AI extraction too short');

      setReaderProgress(90);
      renderArticle(cleanHtml, title, feedName, pubDate);
    }

    function renderArticle(cleanHtml, title, feedName, pubDate) {
      DOM.readerContent.innerHTML =
        `<h1 class="reader-article-title">${escapeHtml(title)}</h1>` +
        `<div class="reader-article-meta">${pubDate ? `${timeSince(pubDate)} &nbsp;·&nbsp; ` : ''}${escapeHtml(feedName)}</div>` +
        `<div class="reader-body">${cleanHtml}</div>`;
      setReaderProgress(100);
      setTimeout(() => setReaderProgress(0), 800);
    }

    function renderReaderError(url) {
      // Provide the user with a clean, straightforward button to view the original content
      DOM.readerContent.innerHTML =
        `<div class="reader-status error" style="margin-top: 40px; border: 1px solid var(--rule); padding: 30px; border-radius: 8px; background: var(--paper);">
           <h3 style="color: var(--ink); font-family: 'Playfair Display', serif; font-size: 24px; margin-bottom: 10px;">Publisher Firewall Detected</h3>
           <p style="color: var(--muted); line-height: 1.5; font-size: 14px; margin-bottom: 25px; text-transform: none; letter-spacing: normal;">
             This news site strictly blocks external readers to force you to view their ads. Please continue reading the original article directly on their website.
           </p>
           <div style="display:flex; justify-content:center;">
             <a href="${escapeHtml(url)}" target="_blank" rel="noopener noreferrer" 
                style="background: var(--ink); color: var(--paper); font-family: 'IBM Plex Mono', monospace; font-size: 12px; font-weight: 500; text-transform: uppercase; padding: 10px 20px; border-radius: 4px; text-decoration: none; transition: opacity 0.2s;">
                ↗ Read Original Article
             </a>
           </div>
        </div>`;
    }

    const ALLOWED_TAGS = new Set(['p', 'br', 'strong', 'b', 'em', 'i', 'u', 'h1', 'h2', 'h3', 'h4', 'ul', 'ol', 'li', 'blockquote', 'figure', 'figcaption', 'img', 'a', 'span', 'div', 'section']);
    const ALLOWED_ATTRS = { img: ['src', 'srcset', 'alt', 'loading'], a: ['href', 'target', 'rel'] };

    function sanitizeHtml(html) {
      const wrapper = document.createElement('div');
      wrapper.innerHTML = html;
      sanitizeNode(wrapper);
      return wrapper.innerHTML;
    }

    function sanitizeNode(node) {
      const children = Array.from(node.childNodes);
      for (const child of children) {
        if (child.nodeType === Node.COMMENT_NODE) { node.removeChild(child); continue; }
        if (child.nodeType !== Node.ELEMENT_NODE) continue;
        const tag = child.tagName.toLowerCase();
        if (!ALLOWED_TAGS.has(tag)) {
          while (child.firstChild) node.insertBefore(child.firstChild, child);
          node.removeChild(child);
          continue;
        }
        const allowedForTag = ALLOWED_ATTRS[tag] || [];
        Array.from(child.attributes).forEach(attr => { if (!allowedForTag.includes(attr.name)) child.removeAttribute(attr.name); });
        if (tag === 'a') { child.setAttribute('target', '_blank'); child.setAttribute('rel', 'noopener noreferrer'); }
        if (tag === 'img') { child.setAttribute('loading', 'lazy'); }
        sanitizeNode(child);
      }
    }

    /* ============================================================
       9. INIT & EVENT LISTENERS
    ============================================================ */
    window.addEventListener('load', () => {
      DOM.headerDate.textContent = new Date().toLocaleDateString('en-IN', { weekday: 'long', day: 'numeric', month: 'long' });

      DOM.dropdown.addEventListener('change', () => loadFeed(false));
      DOM.refreshBtn.addEventListener('click', () => { delete feedCache[DOM.dropdown.value]; loadFeed(true); });
      DOM.clearKeyBtn.addEventListener('click', clearGeminiKey);

      DOM.output.addEventListener('click', (e) => {
        const trigger = e.target.closest('.reader-trigger');
        if (!trigger) return;
        const url = trigger.getAttribute('data-url');
        if (url && url !== '#') openReader(url, trigger.getAttribute('data-title'), trigger.getAttribute('data-feed'), trigger.getAttribute('data-date'));
      });
      DOM.output.addEventListener('keydown', (e) => {
        if (e.key !== 'Enter' && e.key !== ' ') return;
        const trigger = e.target.closest('.reader-trigger');
        if (trigger) { e.preventDefault(); trigger.click(); }
      });

      DOM.readerBack.addEventListener('click', closeReader);
      DOM.readerBackdrop.addEventListener('click', closeReader);
      document.addEventListener('keydown', (e) => { if (e.key === 'Escape' && DOM.readerPanel.classList.contains('open')) closeReader(); });

      DOM.fontUp.addEventListener('click', () => {
        readerFontSize = Math.min(CONFIG.READER_FONT_MAX, readerFontSize + 1);
        document.documentElement.style.setProperty('--reader-font-sz', `${readerFontSize}px`);
      });
      DOM.fontDown.addEventListener('click', () => {
        readerFontSize = Math.max(CONFIG.READER_FONT_MIN, readerFontSize - 1);
        document.documentElement.style.setProperty('--reader-font-sz', `${readerFontSize}px`);
      });

      DOM.readerScroll.addEventListener('scroll', () => {
        const { scrollTop, scrollHeight, clientHeight } = DOM.readerScroll;
        const denominator = scrollHeight - clientHeight;
        setReaderProgress(denominator > 0 ? (scrollTop / denominator) * 100 : 0);
      });

      loadFeed();
    });
  </script>
</body>
</html>
