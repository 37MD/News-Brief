<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self';
                 script-src  'unsafe-inline' https://api.rss2json.com;
                 style-src   'unsafe-inline' https://fonts.googleapis.com;
                 font-src    https://fonts.gstatic.com;
                 img-src     * data:;
                 connect-src *;">
  <title>Pulse v26B</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    /* ════════════════════════════════════════════════════════════════════
       CSS §1 — DESIGN TOKENS & GLOBAL BASE STYLES
    ════════════════════════════════════════════════════════════════════ */
    :root {
      --ink:            #1a1a18;   
      --paper:          #f5f0e8;   
      --accent:         #1a5c3a;   
      --rule:           #c8c0b0;   
      --muted:          #5a554c;   
      --meta-color:     #8c867a;   
      --error:          #c0392b;   
      --reader-font-sz: 17px;      
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background:  var(--paper);
      color:       var(--ink);
      font-family: 'IBM Plex Sans', sans-serif;
      min-height:  100vh;
      line-height: 1.6;
    }

    .controls-bar {
      position:    absolute;
      top:         16px;
      right:       20px;
      z-index:     100;
      display:     flex;
      align-items: center;
      gap:         10px;
    }

    select {
      font-family:      'IBM Plex Mono', monospace;
      font-size:        11px;
      background-color: transparent;
      color:            var(--ink);
      border:           1px solid var(--rule);
      padding:          6px 10px;
      border-radius:    4px;
      cursor:           pointer;
      outline:          none;
      text-transform:   uppercase;
      font-weight:      500;
      max-width:        200px;
    }
    select:hover { border-color: var(--accent); }

    .btn-outline {
      font-family:    'IBM Plex Mono', monospace;
      font-size:      11px;
      background:     transparent;
      color:          var(--accent);
      border:         1px solid var(--accent);
      padding:        6px 10px;
      border-radius:  4px;
      cursor:         pointer;
      text-transform: uppercase;
      font-weight:    500;
      transition:     background 0.2s, color 0.2s;
      white-space:    nowrap;
    }
    .btn-outline:hover    { background: var(--accent); color: var(--paper); }
    .btn-outline:disabled { opacity: 0.4; cursor: not-allowed; }

    #clear-key-btn       { color: var(--muted); border-color: var(--rule); }
    #clear-key-btn:hover { background: var(--ink); color: var(--paper); border-color: var(--ink); }

    #refresh-btn.spinning { animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .masthead {
      border-bottom: 3px double var(--ink);
      padding:       30px 20px;
      text-align:    center;
      background:    var(--paper);
      position:      relative;
    }
    .masthead-title {
      font-family: 'Playfair Display', serif;
      font-size:   clamp(32px, 5vw, 56px);
      font-weight: 700;
    }
    .tagline {
      font-family:    'IBM Plex Mono', monospace;
      font-size:      10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color:          var(--meta-color);
      margin-top:     8px;
    }

    .feed-status-bar {
      max-width:       800px;
      margin:          16px auto 0;
      padding:         0 20px;
      display:         flex;
      justify-content: space-between;
      align-items:     center;
      font-family:     'IBM Plex Mono', monospace;
      font-size:       10px;
      color:           var(--meta-color);
      text-transform:  uppercase;
      letter-spacing:  0.05em;
    }

    .container {
      max-width: 800px;
      margin:    0 auto;
      padding:   20px 20px 80px;
    }

    .feed-item {
      margin-bottom:  35px;
      border-bottom:  1px solid var(--rule);
      padding-bottom: 25px;
      animation:      fadeIn 0.3s ease forwards;
      opacity:        0;
    }
    .feed-item:last-child { border-bottom: none; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .headline {
      font-family:     'Playfair Display', serif;
      font-size:       22px;
      color:           var(--ink);
      text-decoration: none;
      font-weight:     700;
      display:         block;
      line-height:     1.3;
      margin-bottom:   10px;
      word-break:      break-word;
      cursor:          pointer;
    }
    .headline:hover { color: var(--accent); text-decoration: underline; }

    .description {
      font-size:     15px;
      color:         var(--muted);
      margin-bottom: 12px;
      line-height:   1.6;
    }

    .meta {
      font-family:    'IBM Plex Mono', monospace;
      font-size:      10px;
      color:          var(--meta-color);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .system-msg {
      font-family: 'IBM Plex Mono', monospace;
      font-size:   12px;
      color:       var(--meta-color);
      text-align:  center;
      margin-top:  60px;
      line-height: 2;
    }
    .system-msg.error { color: var(--error); }

    #reader-backdrop {
      display:         none;
      position:        fixed;
      inset:           0;
      background:      rgba(26,26,24,0.45);
      z-index:         998;
      backdrop-filter: blur(2px);
    }
    #reader-backdrop.open { display: block; }

    #reader-panel {
      position:       fixed;
      top: 0; right: 0; bottom: 0;
      width:          100%;
      max-width:      780px;
      background:     var(--paper);
      z-index:        999;
      display:        flex;
      flex-direction: column;
      transform:      translateX(100%);
      transition:     transform 0.35s cubic-bezier(.4,0,.2,1);
      box-shadow:     -4px 0 40px rgba(0,0,0,0.18);
    }
    #reader-panel.open { transform: translateX(0); }

    #reader-progress {
      position:   absolute;
      top: 0; left: 0;
      height:     3px;
      width:      0%;
      background: var(--accent);
      transition: width 0.2s;
      z-index:    5;
    }

    .reader-topbar {
      display:       flex;
      align-items:   center;
      gap:           10px;
      padding:       14px 20px;
      border-bottom: 1px solid var(--rule);
      background:    var(--paper);
      flex-shrink:   0;
      position:      relative;
      z-index:       20;
    }

    .reader-back-btn {
      font-family:    'IBM Plex Mono', monospace;
      font-size:      11px;
      font-weight:    500;
      text-transform: uppercase;
      background:     transparent;
      color:          var(--accent);
      border:         1px solid var(--accent);
      padding:        5px 12px;
      border-radius:  4px;
      cursor:         pointer;
      white-space:    nowrap;
      transition:     background 0.2s, color 0.2s;
      flex-shrink:    0;
    }
    .reader-back-btn:hover { background: var(--accent); color: var(--paper); }

    .reader-source-url {
      font-family:   'IBM Plex Mono', monospace;
      font-size:     10px;
      color:         var(--meta-color);
      white-space:   nowrap;
      overflow:      hidden;
      text-overflow: ellipsis;
      flex:          1;
    }

    .reader-font-ctrl { display: flex; gap: 4px; flex-shrink: 0; }
    .reader-font-ctrl button {
      font-family:     'IBM Plex Mono', monospace;
      font-size:       13px;
      background:      transparent;
      border:          1px solid var(--rule);
      color:           var(--muted);
      width: 28px; height: 28px;
      border-radius:   4px;
      cursor:          pointer;
      display:         flex;
      align-items:     center;
      justify-content: center;
      transition:      border-color 0.2s;
    }
    .reader-font-ctrl button:hover { border-color: var(--ink); color: var(--ink); }

    .reader-open-btn {
      font-family:     'IBM Plex Mono', monospace;
      font-size:       10px;
      font-weight:     500;
      text-transform:  uppercase;
      background:      transparent;
      color:           var(--muted);
      border:          1px solid var(--rule);
      padding:         5px 10px;
      border-radius:   4px;
      cursor:          pointer;
      white-space:     nowrap;
      text-decoration: none;
      transition:      all 0.2s;
      flex-shrink:     0;
    }
    .reader-open-btn:hover { border-color: var(--ink); color: var(--ink); }

    .reader-ai-btn {
      color:        var(--accent);
      border-color: var(--accent);
      background:   rgba(26, 92, 58, 0.05);
      font-weight:  600;
    }
    .reader-ai-btn:hover { background: var(--accent); color: var(--paper); }

    .reader-scroll {
      overflow-y: auto;
      flex:       1;
      padding:    36px 40px 60px;
      position:   relative;
      z-index:    10;
    }

    .reader-article-title {
      font-family:   'Playfair Display', serif;
      font-size:     clamp(22px, 3.5vw, 32px);
      font-weight:   700;
      line-height:   1.25;
      color:         var(--ink);
      margin-bottom: 16px;
    }
    .reader-article-meta {
      font-family:    'IBM Plex Mono', monospace;
      font-size:      11px;
      color:          var(--meta-color);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom:  28px;
      padding-bottom: 20px;
      border-bottom:  2px solid var(--rule);
    }

    .reader-body {
      font-size:      var(--reader-font-sz);
      line-height:    1.85;
      color:          var(--ink);
      padding-bottom: 40px;
    }

    #ai-panel {
      position:       absolute;
      top:            65px;
      right:          20px;
      width:          360px;
      max-width:      calc(100vw - 40px);
      background:     #ffffff;
      border:         1px solid var(--rule);
      border-radius:  12px;
      box-shadow:     0 8px 30px rgba(0,0,0,0.15);
      display:        flex;
      flex-direction: column;
      opacity:        0;
      pointer-events: none;
      transform:      translateY(-15px);
      transition:     all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      max-height:     65vh;
      z-index:        1005;
    }
    #ai-panel.open {
      opacity:        1;
      pointer-events: auto;
      transform:      translateY(0);
    }

    .ai-header {
      display:         flex;
      justify-content: space-between;
      align-items:     center;
      padding:         12px 16px;
      background:      var(--paper);
      border-bottom:   1px solid var(--rule);
      border-radius:   12px 12px 0 0;
      font-family:     'IBM Plex Mono', monospace;
      font-size:       11px;
      font-weight:     500;
      text-transform:  uppercase;
      color:           var(--accent);
    }
    .ai-close-btn {
      background:  transparent;
      border:      none;
      font-size:   20px;
      line-height: 1;
      cursor:      pointer;
      color:       var(--muted);
    }
    .ai-close-btn:hover { color: var(--ink); }

    .ai-chat-area {
      padding:     16px;
      overflow-y:  auto;
      flex:        1;
      font-size:   14px;
      line-height: 1.6;
    }

    .ai-message {
      margin-bottom: 16px;
      padding:       12px 16px;
      border-radius: 8px;
      background:    var(--paper);
      color:         var(--ink);
    }
    .ai-message.user   { background: rgba(26, 92, 58, 0.08); border-left: 3px solid var(--accent); }
    .ai-message.system { color: var(--muted); font-style: italic; font-size: 13px; background: transparent; padding: 0; }

    .ai-quick-prompts {
      display:         flex;
      gap:             8px;
      padding:         0 16px 12px;
      overflow-x:      auto;
      white-space:     nowrap;
      scrollbar-width: none;
    }
    .ai-input-area {
      display:       flex;
      padding:       12px 16px;
      border-top:    1px solid var(--rule);
      background:    #fff;
      border-radius: 0 0 12px 12px;
    }
    .ai-input-area input {
      flex:          1;
      border:        1px solid var(--rule);
      border-radius: 4px;
      padding:       10px 14px;
      font-family:   'IBM Plex Sans', sans-serif;
      font-size:     14px;
      outline:       none;
    }
    .ai-input-area button {
      background:    var(--accent);
      color:         var(--paper);
      border:        none;
      border-radius: 4px;
      padding:       0 16px;
      margin-left:   8px;
      cursor:        pointer;
      font-weight:   500;
    }

    @media (max-width: 520px) {
      .controls-bar {
        position:         static;
        padding:          12px 16px;
        justify-content:  flex-end;
        border-bottom:    1px solid var(--rule);
        flex-wrap:        wrap;
      }
      select              { max-width: 140px; font-size: 10px; }
      .reader-source-url  { display: none; }
    }
  </style>
</head>

<body>

  <div class="controls-bar">
    <select id="feed-dropdown" aria-label="Select news feed">
      <optgroup label="── Times of India ──">
        <option value="https://timesofindia.indiatimes.com/rssfeedstopstories.cms" selected>TOI · Top News</option>
        <option value="https://timesofindia.indiatimes.com/business/economy/rssfeedstopstories.cms">TOI · Economy</option>
        <option value="https://timesofindia.indiatimes.com/business/rssfeedstopstories.cms">TOI · Business</option>
      </optgroup>

      <optgroup label="── The Hindu ──">
        <option value="https://www.thehindu.com/feeder/default.rss">Hindu · Top News</option>
        <option value="https://www.thehindu.com/business/feeder/default.rss">Hindu · Business</option>
      </optgroup>

      <optgroup label="── Economic Times ──">
        <option value="https://economictimes.indiatimes.com/rssfeedsdefault.cms">ET · Top News</option>
        <option value="https://economictimes.indiatimes.com/news/economy/rssfeedsdefault.cms">ET · Economy</option>
      </optgroup>
    </select>
    
    <button class="btn-outline" id="upload-pdf-btn" title="Upload PDF">📄 Upload PDF</button>
    <input type="file" id="pdf-file-input" accept="application/pdf" style="display: none;">
    
    <button class="btn-outline" id="refresh-btn" title="Refresh feed">⟳ Refresh</button>
    <button class="btn-outline" id="clear-key-btn" title="Clear Gemini Key">🔑 Reset Key</button>
  </div>

  <div class="masthead">
    <div class="tagline" id="header-date">Financial Intelligence Terminal</div>
    <div class="masthead-title">Pulse v26B</div>
    <div class="tagline">Standard RSS Protocol</div>
  </div>

  <div class="feed-status-bar">
    <span id="item-count"></span>
    <span id="next-refresh"></span>
  </div>

  <div class="container">
    <div id="rss-output" aria-live="polite">
      <div class="system-msg">Initialising secure terminal…</div>
    </div>
  </div>

  <div id="reader-backdrop"></div>
  <div id="reader-panel">
    <div id="reader-progress"></div>
    <div class="reader-topbar">
      <button class="reader-back-btn" id="reader-back">← Back</button>
      <span class="reader-source-url" id="reader-url-label"></span>
      <div class="reader-font-ctrl">
        <button id="font-down">A−</button>
        <button id="font-up">A+</button>
      </div>
      <button class="reader-open-btn reader-ai-btn" id="reader-ai-toggle" style="display:none;">✨ Ask AI</button>
      <a class="reader-open-btn" id="reader-ext-link" href="#" target="_blank">↗ Original</a>
    </div>
    <div class="reader-scroll">
      <div id="reader-content"></div>
    </div>

    <div id="ai-panel">
      <div class="ai-header">
        <span>✨ Gemini Assistant</span>
        <button class="ai-close-btn" id="ai-close-btn">×</button>
      </div>
      <div class="ai-chat-area" id="ai-chat-area"></div>
      <div class="ai-input-area">
        <input type="text" id="ai-input" placeholder="Ask Gemini...">
        <button id="ai-submit">Ask</button>
      </div>
    </div>
  </div>

  <script>
    'use strict';

    const CONFIG = Object.freeze({
      CACHE_TTL_MS:       5 * 60 * 1000,
      FEED_TIMEOUT_MS:    15_000,
      AUTO_REFRESH_S:     600,
      READER_FONT_DEF:    17,
      GEMINI_MODEL:       'gemini-3.1-flash-lite-preview'
    });

    const feedCache = {};
    let requestCounter = 0;
    let countdownTimer = null;
    let readerFontSize = CONFIG.READER_FONT_DEF;
    let currentArticleText = "";

    const DOM = {
      output:          document.getElementById('rss-output'),
      dropdown:        document.getElementById('feed-dropdown'),
      refreshBtn:      document.getElementById('refresh-btn'),
      itemCount:       document.getElementById('item-count'),
      nextRefresh:     document.getElementById('next-refresh'),
      headerDate:      document.getElementById('header-date'),
      uploadPdfBtn:    document.getElementById('upload-pdf-btn'),
      pdfFileInput:    document.getElementById('pdf-file-input'),
      readerPanel:     document.getElementById('reader-panel'),
      readerBackdrop:  document.getElementById('reader-backdrop'),
      readerContent:   document.getElementById('reader-content'),
      readerUrlLabel:  document.getElementById('reader-url-label'),
      readerExtLink:   document.getElementById('reader-ext-link'),
      readerProgress:  document.getElementById('reader-progress'),
      readerBack:      document.getElementById('reader-back'),
      aiToggle:        document.getElementById('reader-ai-toggle'),
      aiPanel:         document.getElementById('ai-panel'),
      aiInput:         document.getElementById('ai-input'),
      aiSubmit:        document.getElementById('ai-submit'),
      aiChatArea:      document.getElementById('ai-chat-area')
    };

    function escapeHtml(str) {
      if (!str) return '';
      return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    function timeSince(dateString) {
      if (!dateString) return 'Just now';
      const date = new Date(dateString);
      const seconds = Math.floor((Date.now() - date) / 1000);
      if (seconds < 60) return 'Just now';
      const mins = Math.floor(seconds / 60);
      if (mins < 60) return `${mins} mins ago`;
      return `${Math.floor(mins / 60)} hours ago`;
    }

    async function fetchFeed(url) {
      const fnName = '_gp_' + Math.random().toString(36).slice(2, 9);
      return new Promise((resolve, reject) => {
        const script = document.createElement('script');
        window[fnName] = (data) => {
          document.head.removeChild(script);
          delete window[fnName];
          if (data.status === 'ok') resolve(data.items);
          else reject(new Error(data.message));
        };
        script.src = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(url)}&callback=${fnName}`;
        document.head.appendChild(script);
      });
    }

    function renderFeedItems(items, feedName) {
      DOM.output.innerHTML = items.map((item, idx) => `
        <div class="feed-item">
          <span class="headline reader-trigger" 
                data-idx="${idx}" 
                role="button">${escapeHtml(item.title)}</span>
          <p class="description">${escapeHtml(item.description.substring(0, 300))}...</p>
          <div class="meta">${timeSince(item.pubDate)} &mdash; ${escapeHtml(feedName)}</div>
        </div>
      `).join('');
      DOM.itemCount.textContent = `${items.length} articles`;
    }

    function loadFeed() {
      const url = DOM.dropdown.value;
      if (url === 'uploaded-pdf') {
        renderFeedItems(feedCache['uploaded-pdf'].items, 'PDF SUMMARY');
        return;
      }
      fetchFeed(url).then(items => {
        renderFeedItems(items, DOM.dropdown.options[DOM.dropdown.selectedIndex].text);
      }).catch(err => {
        DOM.output.innerHTML = `<div class="system-msg error">❌ Error: ${err.message}</div>`;
      });
    }

    function openReader(idx) {
      const feedUrl = DOM.dropdown.value;
      const items = feedCache[feedUrl]?.items || [];
      const item = items[idx];
      if (!item) return;

      DOM.readerPanel.classList.add('open');
      DOM.readerBackdrop.classList.add('open');
      DOM.readerContent.innerHTML = `<h1>${escapeHtml(item.title)}</h1><div class="reader-body">${item.full_text || item.description}</div>`;
      currentArticleText = item.full_text || item.description;
      DOM.aiToggle.style.display = 'block';
    }

    async function processPdf(file) {
      const key = localStorage.getItem('gemini_api_key') || prompt("Enter Gemini Key:");
      if (!key) return;
      localStorage.setItem('gemini_api_key', key);

      const reader = new FileReader();
      reader.onload = async () => {
        const base64 = reader.result.split(',')[1];
        const payload = {
          contents: [{
            parts: [
              { inlineData: { mimeType: "application/pdf", data: base64 } },
              { text: "Extract EVERY section. Return JSON array of objects with 'title', 'summary', and 'full_text'. NO TRUNCATION of full_text." }
            ]
          }]
        };
        const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${CONFIG.GEMINI_MODEL}:generateContent?key=${key}`, {
          method: 'POST',
          body: JSON.stringify(payload)
        });
        const data = await res.json();
        const text = data.candidates[0].content.parts[0].text.replace(/```json|```/g, '');
        const items = JSON.parse(text).map(i => ({ ...i, link: 'local', pubDate: new Date().toISOString() }));
        
        feedCache['uploaded-pdf'] = { items };
        if (!document.querySelector('option[value="uploaded-pdf"]')) {
          const opt = document.createElement('option');
          opt.value = 'uploaded-pdf';
          opt.textContent = 'PDF SUMMARY';
          DOM.dropdown.prepend(opt);
        }
      };
      reader.readAsDataURL(file);
    }

    DOM.dropdown.addEventListener('change', loadFeed);
    DOM.uploadPdfBtn.addEventListener('click', () => DOM.pdfFileInput.click());
    DOM.pdfFileInput.addEventListener('change', e => processPdf(e.target.files[0]));
    DOM.output.addEventListener('click', e => {
      const t = e.target.closest('.reader-trigger');
      if (t) openReader(t.dataset.idx);
    });
    DOM.readerBack.addEventListener('click', () => {
      DOM.readerPanel.classList.remove('open');
      DOM.readerBackdrop.classList.remove('open');
    });

    window.addEventListener('load', () => {
      DOM.headerDate.textContent = new Date().toLocaleDateString('en-IN', { weekday: 'long', day: 'numeric', month: 'long' });
      loadFeed();
    });
  </script>
</body>
</html>
