<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Pdf Analysis Version PDF1</title>
    <link id="pwa-manifest" rel="manifest" href="">
    <style>
        :root {
            --bg-color: #f4f6f9;
            --box-bg: #ffffff;
            --border-color: #b0bece;
            --btn-bg: #d0d7e0;
            --highlight-bg: #e4eaf2;
        }

        * {
            box-sizing: border-box;
            color: black !important;
            font-family: monospace;
        }

        body {
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 900px;
            background: var(--box-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.15);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            display: flex;
            align-items: center;
            padding: 15px;
            background: var(--highlight-bg);
            border-bottom: 1px solid var(--border-color);
        }

        .logo-svg {
            width: 40px;
            height: 40px;
            margin-right: 15px;
            stroke: black !important;
        }

        .header-title {
            font-size: 1.2rem;
            font-weight: bold;
            flex-grow: 1;
        }

        .settings-bar {
            padding: 10px 15px;
            background: #d9e2ec;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            gap: 10px;
            align-items: center;
        }

        input, button, textarea {
            padding: 8px 12px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            background: white;
            outline: none;
            font-size: 0.85rem;
        }

        button {
            background: var(--btn-bg);
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }

        button:hover {
            background: #bcc8d6;
        }

        .upload-section {
            padding: 15px;
            border-bottom: 1px solid var(--border-color);
            background: #eef2f7;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .analysis-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            padding: 15px;
            border-bottom: 1px solid var(--border-color);
            background: #f9fafc;
        }

        @media (max-width: 600px) {
            .analysis-grid {
                grid-template-columns: 1fr;
            }
        }

        .analysis-box {
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background: white;
            display: flex;
            flex-direction: column;
        }

        .box-title {
            background: var(--highlight-bg);
            padding: 10px;
            font-weight: bold;
            border-bottom: 1px solid var(--border-color);
            text-align: center;
            border-radius: 8px 8px 0 0;
            text-transform: uppercase;
            font-size: 0.9rem;
        }

        .box-content {
            padding: 12px;
            font-size: 0.85rem;
            line-height: 1.5;
            height: 200px;
            overflow-y: auto;
            white-space: pre-wrap;
            background: white;
        }

        .chat-area {
            flex-grow: 1;
            height: 350px;
            overflow-y: auto;
            padding: 15px;
            background: white;
        }

        .message {
            margin-bottom: 12px;
            padding: 10px 14px;
            border-radius: 8px;
            background: var(--highlight-bg);
            word-wrap: break-word;
            font-size: 0.85rem;
            line-height: 1.4;
        }

        .message.user {
            background: #d1f4e0;
            border-left: 4px solid #009e70;
        }

        .message.system {
            background: #f0f0f0;
            border-left: 4px solid #666;
        }

        .message strong {
            font-weight: bold;
        }

        .input-area {
            display: flex;
            padding: 15px;
            background: var(--highlight-bg);
            border-top: 1px solid var(--border-color);
        }

        .input-area input {
            flex-grow: 1;
            margin-right: 10px;
        }

        #status-banner {
            font-size: 0.85rem;
            padding: 8px 15px;
            background: #fff3cd;
            border-bottom: 1px solid var(--border-color);
            display: none;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <svg class="logo-svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/>
            </svg>
            <div class="header-title">AI Pdf Analysis Version PDF1</div>
        </div>

        <div class="settings-bar">
            <span>⚙️ Settings:</span>
            <input type="password" id="api-key" placeholder="Enter Gemini API Key" style="flex-grow: 1;">
            <button id="save-key">Save Key</button>
        </div>

        <div class="upload-section">
            <span style="font-weight: bold;">Upload Document:</span>
            <input type="file" id="file-input" style="flex-grow: 1;" accept="*/*">
            <button id="upload-btn">Analyze Document</button>
        </div>

        <div id="status-banner"></div>

        <div class="analysis-grid">
            <div class="analysis-box">
                <div class="box-title">Summary</div>
                <div class="box-content" id="summary-content">Awaiting document upload...</div>
            </div>
            <div class="analysis-box">
                <div class="box-title">Key Takeaways</div>
                <div class="box-content" id="takeaways-content">Awaiting document upload...</div>
            </div>
        </div>

        <div class="chat-area" id="chat-area">
            <div class="message system">
                <strong>System Online:</strong> Ready for document ingestion. Upload any PDF, Book, presentation, or infographic to begin unrestricted analysis.
            </div>
        </div>

        <div class="input-area">
            <input type="text" id="chat-input" placeholder="Ask questions about the uploaded document...">
            <button id="send-btn">➤ Send</button>
        </div>
    </div>

    <script>
    (function() {
        const openBookSvgUri = "data:image/svg+xml;charset=utf-8," + encodeURIComponent(`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/></svg>`);
        
        const manifest = {
            "name": "AI Pdf Analysis",
            "short_name": "PDF AI",
            "start_url": ".",
            "display": "standalone",
            "background_color": "#f4f6f9",
            "theme_color": "#e4eaf2",
            "icons": [
                {
                    "src": openBookSvgUri,
                    "sizes": "192x192",
                    "type": "image/svg+xml"
                }
            ]
        };
        const manifestBlob = new Blob([JSON.stringify(manifest)], {type: 'application/manifest+json'});
        document.getElementById('pwa-manifest').href = URL.createObjectURL(manifestBlob);

        const swCode = `
            self.addEventListener('install', (e) => self.skipWaiting());
            self.addEventListener('activate', (e) => self.clients.claim());
            self.addEventListener('fetch', (e) => {});
        `;
        const swBlob = new Blob([swCode], {type: 'application/javascript'});
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register(URL.createObjectURL(swBlob)).catch(console.error);
        }

        const apiKeyIn = document.getElementById('api-key');
        const saveKeyBtn = document.getElementById('save-key');
        const fileInput = document.getElementById('file-input');
        const uploadBtn = document.getElementById('upload-btn');
        const statusBanner = document.getElementById('status-banner');
        const summaryContent = document.getElementById('summary-content');
        const takeawaysContent = document.getElementById('takeaways-content');
        const chatArea = document.getElementById('chat-area');
        const chatInput = document.getElementById('chat-input');
        const sendBtn = document.getElementById('send-btn');

        let apiKey = localStorage.getItem('ld_gemini_api_key_pdf_v1') || '';
        if (apiKey) apiKeyIn.value = apiKey;

        let currentFileUri = null;
        let currentFileMime = null;
        let currentFileName = null;

        saveKeyBtn.onclick = () => {
            apiKey = apiKeyIn.value.trim();
            localStorage.setItem('ld_gemini_api_key_pdf_v1', apiKey);
            updateStatus("API Key Saved.");
        };

        function updateStatus(msg) {
            statusBanner.style.display = 'block';
            statusBanner.innerText = msg;
        }

        function appendMessage(role, text) {
            const div = document.createElement('div');
            div.className = `message ${role}`;
            div.innerHTML = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').replace(/\n/g, '<br>');
            chatArea.appendChild(div);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        uploadBtn.onclick = async () => {
            if (!apiKey) return updateStatus("Error: Save API Key first.");
            const file = fileInput.files[0];
            if (!file) return updateStatus("Error: Select a file to upload.");

            updateStatus("Uploading to Gemini Pipeline... Please wait.");
            
            try {
                let mimeType = file.type || "application/pdf";
                
                const uploadUrl = `https://generativelanguage.googleapis.com/upload/v1beta/files?key=${apiKey}`;
                const response = await fetch(uploadUrl, {
                    method: 'POST',
                    headers: {
                        'X-Goog-Upload-Command': 'start, upload, finalize',
                        'X-Goog-Upload-Header-Content-Length': file.size.toString(),
                        'X-Goog-Upload-Header-Content-Type': mimeType,
                        'Content-Type': mimeType
                    },
                    body: file
                });

                const data = await response.json();

                if (data.error) {
                    updateStatus("Upload Failed: " + data.error.message);
                    return;
                }

                currentFileUri = data.file.uri;
                currentFileMime = mimeType;
                currentFileName = file.name;

                updateStatus(`File [${currentFileName}] ingested successfully. Extracting intelligence...`);
                
                await fetchDocumentIntelligence();

            } catch (err) {
                updateStatus("Upload Exception: " + err.message);
            }
        };

        async function fetchDocumentIntelligence() {
            try {
                summaryContent.innerText
