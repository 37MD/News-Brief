<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self';
                 script-src  'unsafe-inline' https://api.rss2json.com;
                 style-src   'unsafe-inline' https://fonts.googleapis.com;
                 font-src    https://fonts.gstatic.com;
                 img-src     * data:;
                 connect-src *;">
  <title>Pulse v26D</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">

  <style>

    /* ════════════════════════════════════════════════════════════════════
       CSS §1 — DESIGN TOKENS & GLOBAL BASE
    ════════════════════════════════════════════════════════════════════ */
    :root {
      --ink:            #1a1a18;
      --paper:          #f5f0e8;
      --accent:         #1a5c3a;
      --rule:           #c8c0b0;
      --muted:          #5a554c;
      --meta-color:     #8c867a;
      --error:          #c0392b;
      --success:        #2e7d52;
      --reader-font-sz: 17px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background:  var(--paper);
      color:       var(--ink);
      font-family: 'IBM Plex Sans', sans-serif;
      min-height:  100vh;
      line-height: 1.6;
    }


    /* ════════════════════════════════════════════════════════════════════
       CSS §2 — CONTROLS BAR
    ════════════════════════════════════════════════════════════════════ */
    .controls-bar {
      position:    absolute;
      top:         16px;
      right:       20px;
      z-index:     100;
      display:     flex;
      align-items: center;
      gap:         10px;
    }
    select {
      font-family:      'IBM Plex Mono', monospace;
      font-size:        11px;
      background-color: transparent;
      color:            var(--ink);
      border:           1px solid var(--rule);
      padding:          6px 10px;
      border-radius:    4px;
      cursor:           pointer;
      outline:          none;
      text-transform:   uppercase;
      font-weight:      500;
      max-width:        200px;
    }
    select:hover { border-color: var(--accent); }
    .btn-outline {
      font-family:    'IBM Plex Mono', monospace;
      font-size:      14px;
      background:     transparent;
      color:          var(--accent);
      border:         1px solid var(--accent);
      padding:        5px 10px;
      border-radius:  4px;
      cursor:         pointer;
      font-weight:    500;
      transition:     background 0.2s, color 0.2s, border-color 0.2s;
      white-space:    nowrap;
      line-height:    1;
    }
    .btn-outline:hover    { background: var(--accent); color: var(--paper); }
    .btn-outline:disabled { opacity: 0.4; cursor: not-allowed; }
    #clear-key-btn       { color: var(--muted); border-color: var(--rule); }
    #clear-key-btn:hover { background: var(--ink); color: var(--paper); border-color: var(--ink); }
    #refresh-btn.spinning { animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* PDF success toast — silent light-green flash */
    #pdf-toast {
      position:      fixed;
      top:           20px;
      left:          50%;
      transform:     translateX(-50%) translateY(-60px);
      background:    #d4edda;
      color:         #155724;
      border:        1px solid #c3e6cb;
      padding:       10px 22px;
      border-radius: 6px;
      font-family:   'IBM Plex Mono', monospace;
      font-size:     12px;
      font-weight:   500;
      z-index:       9999;
      transition:    transform 0.35s ease, opacity 0.35s ease;
      opacity:       0;
      pointer-events:none;
    }
    #pdf-toast.show {
      transform: translateX(-50%) translateY(0);
      opacity:   1;
    }


    /* ════════════════════════════════════════════════════════════════════
       CSS §3 — MASTHEAD
    ════════════════════════════════════════════════════════════════════ */
    .masthead {
      border-bottom: 3px double var(--ink);
      padding:       30px 20px;
      text-align:    center;
      background:    var(--paper);
      position:      relative;
    }
    .masthead-title {
      font-family: 'Playfair Display', serif;
      font-size:   clamp(32px, 5vw, 56px);
      font-weight: 700;
    }
    .tagline {
      font-family:    'IBM Plex Mono', monospace;
      font-size:      10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color:          var(--meta-color);
      margin-top:     8px;
    }


    /* ════════════════════════════════════════════════════════════════════
       CSS §4 — FEED STATUS BAR
    ════════════════════════════════════════════════════════════════════ */
    .feed-status-bar {
      max-width:       800px;
      margin:          16px auto 0;
      padding:         0 20px;
      display:         flex;
      justify-content: space-between;
      align-items:     center;
      font-family:     'IBM Plex Mono', monospace;
      font-size:       10px;
      color:           var(--meta-color);
      text-transform:  uppercase;
      letter-spacing:  0.05em;
    }


    /* ════════════════════════════════════════════════════════════════════
       CSS §5 — FEED CONTAINER & ARTICLE CARDS
    ════════════════════════════════════════════════════════════════════ */
    .container {
      max-width: 800px;
      margin:    0 auto;
      padding:   20px 20px 80px;
    }
    .feed-item {
      margin-bottom:  35px;
      border-bottom:  1px solid var(--rule);
      padding-bottom: 25px;
      animation:      fadeIn 0.3s ease forwards;
      opacity:        0;
    }
    .feed-item:last-child { border-bottom: none; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .headline {
      font-family:     'Playfair Display', serif;
      font-size:       22px;
      color:           var(--ink);
      text-decoration: none;
      font-weight:     700;
      display:         block;
      line-height:     1.3;
      margin-bottom:   10px;
      word-break:      break-word;
      cursor:          pointer;
    }
    .headline:hover { color: var(--accent); text-decoration: underline; }
    .description {
      font-size:     15px;
      color:         var(--muted);
      margin-bottom: 12px;
      line-height:   1.6;
    }
    .meta {
      font-family:    'IBM Plex Mono', monospace;
      font-size:      10px;
      color:          var(--meta-color);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    /* Infinite-scroll sentinel */
    #scroll-sentinel {
      height:  1px;
      margin:  0;
      padding: 0;
    }
    .load-more-indicator {
      text-align:  center;
      font-family: 'IBM Plex Mono', monospace;
      font-size:   11px;
      color:       var(--meta-color);
      padding:     16px 0;
      letter-spacing: 0.08em;
    }


    /* ════════════════════════════════════════════════════════════════════
       CSS §6 — SYSTEM / STATUS MESSAGES
    ════════════════════════════════════════════════════════════════════ */
    .system-msg {
      font-family: 'IBM Plex Mono', monospace;
      font-size:   12px;
      color:       var(--meta-color);
      text-align:  center;
      margin-top:  60px;
      line-height: 2;
    }
    .system-msg.error { color: var(--error); }
    .cached-badge {
      display:        inline-block;
      font-family:    'IBM Plex Mono', monospace;
      font-size:      9px;
      background:     var(--rule);
      color:          var(--muted);
      padding:        1px 5px;
      border-radius:  2px;
      text-transform: uppercase;
      margin-left:    6px;
      vertical-align: middle;
    }


    /* ════════════════════════════════════════════════════════════════════
       CSS §7 — READER MODE PANEL
    ════════════════════════════════════════════════════════════════════ */
    #reader-backdrop {
      display:         none;
      position:        fixed;
      inset:           0;
      background:      rgba(26,26,24,0.45);
      z-index:         998;
      backdrop-filter: blur(2px);
    }
    #reader-backdrop.open { display: block; }
    #reader-panel {
      position:       fixed;
      top: 0; right: 0; bottom: 0;
      width:          100%;
      max-width:      780px;
      background:     var(--paper);
      z-index:        999;
      display:        flex;
      flex-direction: column;
      transform:      translateX(100%);
      transition:     transform 0.35s cubic-bezier(.4,0,.2,1);
      box-shadow:     -4px 0 40px rgba(0,0,0,0.18);
    }
    #reader-panel.open { transform: translateX(0); }
    #reader-progress {
      position:   absolute;
      top: 0; left: 0;
      height:     3px;
      width:      0%;
      background: var(--accent);
      transition: width 0.2s;
      z-index:    5;
    }
    .reader-topbar {
      display:       flex;
      align-items:   center;
      gap:           10px;
      padding:       14px 20px;
      border-bottom: 1px solid var(--rule);
      background:    var(--paper);
      flex-shrink:   0;
      position:      relative;
      z-index:       20;
    }
    .reader-back-btn {
      font-family:    'IBM Plex Mono', monospace;
      font-size:      11px;
      font-weight:    500;
      text-transform: uppercase;
      background:     transparent;
      color:          var(--accent);
      border:         1px solid var(--accent);
      padding:        5px 12px;
      border-radius:  4px;
      cursor:         pointer;
      white-space:    nowrap;
      transition:     background 0.2s, color 0.2s;
      flex-shrink:    0;
    }
    .reader-back-btn:hover { background: var(--accent); color: var(--paper); }
    .reader-source-url {
      font-family:   'IBM Plex Mono', monospace;
      font-size:     10px;
      color:         var(--meta-color);
      white-space:   nowrap;
      overflow:      hidden;
      text-overflow: ellipsis;
      flex:          1;
    }
    .reader-font-ctrl { display: flex; gap: 4px; flex-shrink: 0; }
    .reader-font-ctrl button {
      font-family:     'IBM Plex Mono', monospace;
      font-size:       13px;
      background:      transparent;
      border:          1px solid var(--rule);
      color:           var(--muted);
      width: 28px; height: 28px;
      border-radius:   4px;
      cursor:          pointer;
      display:         flex;
      align-items:     center;
      justify-content: center;
      transition:      border-color 0.2s;
    }
    .reader-font-ctrl button:hover { border-color: var(--ink); color: var(--ink); }
    .reader-open-btn {
      font-family:     'IBM Plex Mono', monospace;
      font-size:       10px;
      font-weight:     500;
      text-transform:  uppercase;
      background:      transparent;
      color:           var(--muted);
      border:          1px solid var(--rule);
      padding:         5px 10px;
      border-radius:   4px;
      cursor:          pointer;
      white-space:     nowrap;
      text-decoration: none;
      transition:      all 0.2s;
      flex-shrink:     0;
    }
    .reader-open-btn:hover { border-color: var(--ink); color: var(--ink); }
    .reader-ai-btn {
      color:        var(--accent);
      border-color: var(--accent);
      background:   rgba(26, 92, 58, 0.05);
      font-weight:  600;
    }
    .reader-ai-btn:hover { background: var(--accent); color: var(--paper); }
    .reader-scroll {
      overflow-y: auto;
      flex:       1;
      padding:    36px 40px 60px;
      position:   relative;
      z-index:    10;
    }
    .reader-article-title {
      font-family:   'Playfair Display', serif;
      font-size:     clamp(22px, 3.5vw, 32px);
      font-weight:   700;
      line-height:   1.25;
      color:         var(--ink);
      margin-bottom: 16px;
    }
    .reader-article-meta {
      font-family:    'IBM Plex Mono', monospace;
      font-size:      11px;
      color:          var(--meta-color);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom:  28px;
      padding-bottom: 20px;
      border-bottom:  2px solid var(--rule);
    }
    .reader-body {
      font-size:      var(--reader-font-sz);
      line-height:    1.85;
      color:          var(--ink);
      padding-bottom: 40px;
    }
    .reader-body p:empty,
    .reader-body div:empty,
    .reader-body section:empty,
    .reader-body li:empty,
    .reader-body blockquote:empty { display: none; }
    .reader-body p:has(> br:only-child) { display: none; }
    .reader-body p              { margin-bottom: 1.5em; }
    .reader-body h1, .reader-body h2, .reader-body h3, .reader-body h4 {
      font-family: 'Playfair Display', serif;
      margin:      1.6em 0 0.6em;
      line-height: 1.25;
    }
    .reader-body h1 { font-size: 1.5em; }
    .reader-body h2 { font-size: 1.3em; }
    .reader-body h3 { font-size: 1.1em; }
    .reader-body h4 { font-size: 1.0em; }
    .reader-body img {
      max-width:     100%;
      height:        auto;
      border-radius: 4px;
      margin:        1.2em 0;
      display:       block;
    }
    .reader-body blockquote {
      border-left: 3px solid var(--accent);
      padding:     4px 0 4px 16px;
      margin:      1.4em 0;
      color:       var(--muted);
      font-style:  italic;
    }
    .reader-body a    { color: var(--accent); word-break: break-word; }
    .reader-body ul, .reader-body ol { padding-left: 1.6em; margin-bottom: 1.2em; }
    .reader-body li   { margin-bottom: 0.4em; }
    .reader-status {
      font-family: 'IBM Plex Mono', monospace;
      font-size:   12px;
      color:       var(--meta-color);
      text-align:  center;
      margin-top:  80px;
      line-height: 2.5;
    }
    .reader-status.error { color: var(--error); }


    /* ════════════════════════════════════════════════════════════════════
       CSS §8 — AI CHAT PANEL
    ════════════════════════════════════════════════════════════════════ */
    #ai-panel {
      position:       absolute;
      top:            65px;
      right:          20px;
      width:          360px;
      max-width:      calc(100vw - 40px);
      background:     #ffffff;
      border:         1px solid var(--rule);
      border-radius:  12px;
      box-shadow:     0 8px 30px rgba(0,0,0,0.15);
      display:        flex;
      flex-direction: column;
      opacity:        0;
      pointer-events: none;
      transform:      translateY(-15px);
      transition:     all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      max-height:     65vh;
      z-index:        1005;
    }
    #ai-panel.open { opacity: 1; pointer-events: auto; transform: translateY(0); }
    .ai-header {
      display:         flex;
      justify-content: space-between;
      align-items:     center;
      padding:         12px 16px;
      background:      var(--paper);
      border-bottom:   1px solid var(--rule);
      border-radius:   12px 12px 0 0;
      font-family:     'IBM Plex Mono', monospace;
      font-size:       11px;
      font-weight:     500;
      text-transform:  uppercase;
      color:           var(--accent);
    }
    .ai-close-btn { background: transparent; border: none; font-size: 20px; line-height: 1; cursor: pointer; color: var(--muted); }
    .ai-close-btn:hover { color: var(--ink); }
    .ai-chat-area { padding: 16px; overflow-y: auto; flex: 1; font-size: 14px; line-height: 1.6; }
    .ai-message { margin-bottom: 16px; padding: 12px 16px; border-radius: 8px; background: var(--paper); color: var(--ink); }
    .ai-message.user   { background: rgba(26, 92, 58, 0.08); border-left: 3px solid var(--accent); }
    .ai-message.system { color: var(--muted); font-style: italic; font-size: 13px; background: transparent; padding: 0; }
    .ai-message strong { font-weight: 600; }
    .ai-message ul     { margin-left: 20px; margin-top: 8px; }
    .ai-message p      { margin-bottom: 8px; }
    .ai-message p:last-child { margin-bottom: 0; }
    .ai-quick-prompts { display: flex; gap: 8px; padding: 0 16px 12px; overflow-x: auto; white-space: nowrap; scrollbar-width: none; }
    .ai-quick-prompts::-webkit-scrollbar { display: none; }
    .ai-quick-prompts button { background: var(--paper); border: 1px solid var(--rule); padding: 6px 12px; border-radius: 20px; font-size: 12px; color: var(--muted); cursor: pointer; transition: all 0.2s; }
    .ai-quick-prompts button:hover { background: var(--ink); color: var(--paper); border-color: var(--ink); }
    .ai-input-area { display: flex; padding: 12px 16px; border-top: 1px solid var(--rule); background: #fff; border-radius: 0 0 12px 12px; }
    .ai-input-area input { flex: 1; border: 1px solid var(--rule); border-radius: 4px; padding: 10px 14px; font-family: 'IBM Plex Sans', sans-serif; font-size: 14px; outline: none; }
    .ai-input-area input:focus { border-color: var(--accent); }
    .ai-input-area button { background: var(--accent); color: var(--paper); border: none; border-radius: 4px; padding: 0 16px; margin-left: 8px; cursor: pointer; font-weight: 500; }
    .ai-input-area button:disabled { background: var(--rule); cursor: not-allowed; }


    /* ════════════════════════════════════════════════════════════════════
       CSS §9 — RESPONSIVE
    ════════════════════════════════════════════════════════════════════ */
    @media (max-width: 520px) {
      .controls-bar { position: static; padding: 12px 16px; justify-content: flex-end; border-bottom: 1px solid var(--rule); flex-wrap: wrap; }
      select { max-width: 140px; font-size: 10px; }
      .masthead { padding: 20px 16px; }
      .reader-scroll { padding: 20px 18px 0px; }
      .reader-source-url { display: none; }
      #ai-panel { top: 65px; right: 10px; max-width: calc(100vw - 20px); max-height: 70vh; }
    }

  </style>
</head>

  <script>
    'use strict';

    /* ════════════════════════════════════════════════════════════════════
       JS §1 — APPLICATION CONFIGURATION
    ════════════════════════════════════════════════════════════════════ */
    const CONFIG = Object.freeze({
      CACHE_TTL_MS:        5  * 60 * 1000,   // In-memory feed cache TTL
      LS_TTL_MS:           24 * 60 * 60 * 1000, // localStorage 24-hour TTL
      FEED_TIMEOUT_MS:     15_000,
      ARTICLE_TIMEOUT_MS:  7_000,
      AUTO_REFRESH_S:      600,
      MAX_DESC_CHARS:      500,
      READER_FONT_MIN:     13,
      READER_FONT_MAX:     24,
      READER_FONT_DEF:     17,
      FETCH_PER_FEED:      30,    // Articles fetched per RSS call
      PAGE_SIZE:           10,    // Articles shown per page-load
      MAX_LS_PER_FEED:     100,   // Max summaries stored in localStorage per feed
      DEDUP_THRESHOLD:     0.60,  // 60% similarity = skip article
      GEMINI_MODEL:        'gemini-2.0-flash'
    });


    /* ════════════════════════════════════════════════════════════════════
       JS §2 — STATE
    ════════════════════════════════════════════════════════════════════ */
    const feedCache          = {};
    let   requestCounter     = 0;
    let   debounceTimer      = null;
    let   countdownTimer     = null;
    let   readerFontSize     = CONFIG.READER_FONT_DEF;
    let   currentArticleText = "";
    let   isPdfArticle       = false;   // flag: current reader content is from PDF

    // Pagination state for the current feed view
    const page = { items: [], displayed: 0 };

    // IntersectionObserver for infinite scroll
    let scrollObserver = null;


    /* ════════════════════════════════════════════════════════════════════
       JS §3 — DOM REFERENCES
    ════════════════════════════════════════════════════════════════════ */
    const DOM = {
      output:         document.getElementById('rss-output'),
      dropdown:       document.getElementById('feed-dropdown'),
      refreshBtn:     document.getElementById('refresh-btn'),
      clearKeyBtn:    document.getElementById('clear-key-btn'),
      itemCount:      document.getElementById('item-count'),
      nextRefresh:    document.getElementById('next-refresh'),
      headerDate:     document.getElementById('header-date'),
      uploadPdfBtn:   document.getElementById('upload-pdf-btn'),
      pdfFileInput:   document.getElementById('pdf-file-input'),
      pdfToast:       document.getElementById('pdf-toast'),
      readerPanel:    document.getElementById('reader-panel'),
      readerBackdrop: document.getElementById('reader-backdrop'),
      readerContent:  document.getElementById('reader-content'),
      readerScroll:   document.getElementById('reader-scroll'),
      readerUrlLabel: document.getElementById('reader-url-label'),
      readerExtLink:  document.getElementById('reader-ext-link'),
      readerProgress: document.getElementById('reader-progress'),
      readerBack:     document.getElementById('reader-back'),
      fontUp:         document.getElementById('font-up'),
      fontDown:       document.getElementById('font-down'),
      aiToggle:       document.getElementById('reader-ai-toggle'),
      aiPanel:        document.getElementById('ai-panel'),
      aiCloseBtn:     document.getElementById('ai-close-btn'),
      aiChatArea:     document.getElementById('ai-chat-area'),
      aiInput:        document.getElementById('ai-input'),
      aiSubmit:       document.getElementById('ai-submit'),
      aiPromptBtns:   document.querySelectorAll('.ai-prompt-btn')
    };


    /* ════════════════════════════════════════════════════════════════════
       JS §4 — UTILITY HELPERS
    ════════════════════════════════════════════════════════════════════ */

    function xhrFetch(url, timeoutMs) {
      return new Promise((resolve, reject) => {
        const xhr = new XMLHttpRequest();
        let timedOut = false;
        const timer = setTimeout(() => {
          timedOut = true; xhr.abort();
          reject(new Error('TIMEOUT'));
        }, timeoutMs);
        xhr.open('GET', url, true);
        xhr.onload  = () => { clearTimeout(timer); if (timedOut) return; xhr.status >= 200 && xhr.status < 300 ? resolve(xhr.responseText) : reject(new Error('HTTP ' + xhr.status)); };
        xhr.onerror = () => { clearTimeout(timer); reject(new Error('Network error')); };
        xhr.onabort = () => { if (!timedOut) reject(new Error('Aborted')); };
        xhr.send();
      });
    }

    function escapeHtml(str) {
      if (str == null) return '';
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;');
    }

    function safeUrl(url) {
      if (!url) return '#';
      if (url.startsWith('pdf-local-')) return url;
      try {
        const p = new URL(url);
        return (p.protocol === 'http:' || p.protocol === 'https:') ? url : '#';
      } catch { return '#'; }
    }

    function timeSince(dateString) {
      if (!dateString) return 'Just now';
      const date = new Date(dateString);
      if (isNaN(date.getTime())) return 'Just now';
      const s = Math.floor((Date.now() - date) / 1000);
      if (s < 60)   return 'Just now';
      const m = Math.floor(s/60), h = Math.floor(s/3600), d = Math.floor(s/86400);
      if (d > 1)  return `${d} days ago`;
      if (d === 1) return '1 day ago';
      if (h > 1)  return `${h} hours ago`;
      if (h === 1) return '1 hour ago';
      if (m > 1)  return `${m} mins ago`;
      return '1 min ago';
    }

    function processRssText(html, maxLength) {
      if (!html) return '';
      let t = html.replace(/<!\[CDATA\[(.*?)\]\]>/gs,'$1');
      t = t.replace(/<\/(p|div|h[1-6]|li)>/gi,' ').replace(/<br\s*\/?>/gi,' ').replace(/<[^>]*>?/gm,'');
      t = new DOMParser().parseFromString(t,'text/html').documentElement.textContent || '';
      t = t.replace(/\s+/g,' ').trim();
      if (t.length > maxLength) t = t.substring(0, t.lastIndexOf(' ', maxLength)) + '…';
      return t;
    }

    function parseMarkdown(md) {
      if (!md) return '';
      let h = md.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\*(.*?)\*/g,'<em>$1</em>');
      h = h.replace(/^- (.*)$/gm,'<ul><li>$1</li></ul>').replace(/<\/ul>\n<ul>/g,'\n');
      h = h.replace(/\n\n/g,'</p><p>');
      return `<p>${h}</p>`;
    }

    function cleanAiResponse(text) {
      let t = text.trim();
      const m = '```';
      if (t.startsWith(m)) { const nl = t.indexOf('\n'); if (nl !== -1) t = t.substring(nl+1); }
      if (t.endsWith(m)) t = t.substring(0, t.length-3);
      return t.trim();
    }


    /* ════════════════════════════════════════════════════════════════════
       JS §5 — GEMINI API KEY MANAGEMENT
    ════════════════════════════════════════════════════════════════════ */

    function getGeminiKey() {
      let key = localStorage.getItem('gemini_api_key');
      if (!key) {
        key = prompt('Enter your Gemini API key:');
        if (key) localStorage.setItem('gemini_api_key', key.trim());
      }
      return key ? key.trim() : null;
    }

    function clearGeminiKey() {
      localStorage.removeItem('gemini_api_key');
      DOM.clearKeyBtn.textContent = '🔑';
      setTimeout(() => DOM.clearKeyBtn.textContent = '🔑', 1500);
    }

    async function fetchWithRetry(url, options = {}, retries = 2) {
      const headers = { 'Content-Type': 'application/json', ...(options.headers || {}) };
      for (let i = 0; i <= retries; i++) {
        const res = await fetch(url, { ...options, headers });
        if (res.status === 429 && i < retries) { await new Promise(r => setTimeout(r, 2000 * (i+1))); continue; }
        return res;
      }
    }


    /* ════════════════════════════════════════════════════════════════════
       JS §6 — LOCALSTORAGE FEED CACHE (B3)
       24-hour TTL · max 100 items per feed · viewed tracking · 60% dedup
    ════════════════════════════════════════════════════════════════════ */

    /** Stable hash for a feed URL → localStorage key */
    function lsKey(feedUrl) {
      let h = 0;
      for (let i = 0; i < feedUrl.length; i++) { h = (Math.imul(31, h) + feedUrl.charCodeAt(i)) | 0; }
      return 'pulse_v26d_' + Math.abs(h).toString(36);
    }

    /** Load stored items for a feed (null if expired or missing) */
    function lsLoad(feedUrl) {
      try {
        const raw = localStorage.getItem(lsKey(feedUrl));
        if (!raw) return null;
        const data = JSON.parse(raw);
        if (Date.now() - data.timestamp > CONFIG.LS_TTL_MS) {
          localStorage.removeItem(lsKey(feedUrl)); return null;
        }
        return data; // { timestamp, feedName, items: [{id,title,description,link,pubDate,viewed}] }
      } catch { return null; }
    }

    /** Persist items list for a feed */
    function lsSave(feedUrl, feedName, items) {
      try {
        const stored = lsLoad(feedUrl);
        const ts = stored ? stored.timestamp : Date.now(); // preserve original fetch time
        localStorage.setItem(lsKey(feedUrl), JSON.stringify({
          timestamp: ts,
          feedName,
          items: items.slice(0, CONFIG.MAX_LS_PER_FEED)
        }));
      } catch(e) { console.warn('lsSave failed', e); }
    }

    /** Mark a specific article (by id) as viewed and remove from storage */
    function lsMarkViewed(feedUrl, articleId) {
      try {
        const data = lsLoad(feedUrl);
        if (!data) return;
        // Remove the viewed item entirely
        data.items = data.items.filter(i => i.id !== articleId);
        localStorage.setItem(lsKey(feedUrl), JSON.stringify(data));
      } catch(e) { console.warn('lsMarkViewed failed', e); }
    }

    /** Generate a short stable id for an article (based on title) */
    function articleId(title) {
      let h = 0;
      const s = (title || '').toLowerCase();
      for (let i = 0; i < s.length; i++) { h = (Math.imul(31, h) + s.charCodeAt(i)) | 0; }
      return Math.abs(h).toString(36);
    }

    /** Jaccard similarity on significant words (>3 chars) */
    function similarity(a, b) {
      const words = str => new Set(
        str.toLowerCase().replace(/[^a-z0-9\s]/g,'').split(/\s+/).filter(w => w.length > 3)
      );
      const A = words(a), B = words(b);
      if (!A.size || !B.size) return 0;
      const inter = [...A].filter(w => B.has(w)).length;
      return inter / (new Set([...A,...B]).size);
    }

    /**
     * Merge fresh RSS items into the stored list:
     *  - Deduplicate: if ≥60% match with any stored title → skip
     *  - Append genuinely new items at top (latest first)
     *  - Cap at MAX_LS_PER_FEED
     */
    function mergeIntoStore(feedUrl, feedName, freshItems) {
      const existing = (lsLoad(feedUrl)?.items || []);
      const existingTitles = existing.map(i => i.title || '');

      const genuinelyNew = freshItems.filter(item => {
        const t = item.title || '';
        return !existingTitles.some(et => similarity(t, et) >= CONFIG.DEDUP_THRESHOLD);
      }).map(item => ({
        id:          articleId(item.title),
        title:       item.title || 'Untitled',
        description: processRssText(item.description, 500),
        link:        item.link || '#',
        pubDate:     item.pubDate || '',
        viewed:      false
      }));

      // Latest first — genuinely new ones go to the top
      const merged = [...genuinelyNew, ...existing].slice(0, CONFIG.MAX_LS_PER_FEED);
      lsSave(feedUrl, feedName, merged);
      return merged;
    }


    /* ════════════════════════════════════════════════════════════════════
       JS §7 — RSS FETCH PIPELINE
    ════════════════════════════════════════════════════════════════════ */

    function jsonpFetch(scriptUrl, fnName, timeoutMs) {
      return new Promise((resolve, reject) => {
        const script = document.createElement('script');
        let settled = false;
        const timer = setTimeout(() => {
          if (settled) return; settled = true;
          cleanup(); reject(new Error('TIMEOUT'));
        }, timeoutMs);
        function cleanup() { clearTimeout(timer); delete window[fnName]; if (script.parentNode) script.parentNode.removeChild(script); }
        window[fnName] = (data) => { if (settled) return; settled = true; cleanup(); resolve(data); };
        script.src = scriptUrl; script.async = true;
        script.onerror = () => { if (settled) return; settled = true; cleanup(); reject(new Error('Script blocked')); };
        document.head.appendChild(script);
      });
    }

    async function fetchViaJsonp(feedUrl) {
      const fn = '_gp_' + Math.random().toString(36).slice(2, 9);
      const data = await jsonpFetch(
        `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(feedUrl)}&callback=${fn}`,
        fn, CONFIG.FEED_TIMEOUT_MS
      );
      if (!data || data.status !== 'ok') throw new Error(data?.message || 'rss2json non-ok');
      return data.items;
    }


    /* ════════════════════════════════════════════════════════════════════
       JS §8 — FEED RENDERING & PAGINATION (B1 / B2 / B3)
    ════════════════════════════════════════════════════════════════════ */

    /** Attach IntersectionObserver to the sentinel div for infinite scroll */
    function attachScrollObserver() {
      if (scrollObserver) scrollObserver.disconnect();
      scrollObserver = new IntersectionObserver((entries) => {
        if (entries[0].isIntersecting) {
          entries[0].target.remove();
          renderNextBatch();
        }
      }, { rootMargin: '200px' });
      const sentinel = document.getElementById('scroll-sentinel');
      if (sentinel) scrollObserver.observe(sentinel);
    }

    /** Render the next PAGE_SIZE items from page.items into the output div */
    function renderNextBatch() {
      const batch = page.items.slice(page.displayed, page.displayed + CONFIG.PAGE_SIZE);
      if (!batch.length) return;

      const frag = document.createDocumentFragment();
      batch.forEach((item, relIdx) => {
        const delay = relIdx * 40;
        const el    = document.createElement('div');
        el.className = 'feed-item';
        el.style.animationDelay = `${delay}ms`;
        el.dataset.articleId    = item.id || '';

        const desc = processRssText(item.description, CONFIG.MAX_DESC_CHARS);
        el.innerHTML =
          `<span class="headline reader-trigger"
                 data-url="${escapeHtml(safeUrl(item.link))}"
                 data-title="${escapeHtml(item.title || 'Untitled')}"
                 data-feed="${escapeHtml(item._feedName || '')}"
                 data-date="${escapeHtml(item.pubDate || '')}"
                 data-article-id="${escapeHtml(item.id || '')}"
                 data-feed-url="${escapeHtml(item._feedUrl || '')}"
                 role="button" tabindex="0">` +
            `${escapeHtml(item.title || 'Untitled')}` +
          `</span>` +
          (desc ? `<p class="description">${escapeHtml(desc)}</p>` : '') +
          `<div class="meta">${timeSince(item.pubDate)} &mdash; ${escapeHtml(item._feedName || '')}</div>`;
        frag.appendChild(el);
      });

      page.displayed += batch.length;

      // Add sentinel before appending if more remain
      if (page.displayed < page.items.length) {
        const sentinel = document.createElement('div');
        sentinel.id = 'scroll-sentinel';
        const loader = document.createElement('div');
        loader.className = 'load-more-indicator';
        loader.textContent = `Loading more… (${page.items.length - page.displayed} remaining)`;
        frag.appendChild(sentinel);
        frag.appendChild(loader);
      } else {
        const end = document.createElement('div');
        end.className = 'load-more-indicator';
        end.textContent = `— All ${page.items.length} articles loaded —`;
        frag.appendChild(end);
      }

      DOM.output.appendChild(frag);

      if (page.displayed < page.items.length) attachScrollObserver();
    }

    /** Initialise page state and kick off first batch */
    function startPagination(items, feedName, feedUrl) {
      page.items     = items.map(i => ({ ...i, _feedName: feedName, _feedUrl: feedUrl }));
      page.displayed = 0;
      DOM.output.innerHTML = '';
      renderNextBatch();
      DOM.itemCount.textContent = `${items.length} articles`;
    }

    function setFeedStatus(msg) {
      DOM.output.innerHTML = `<div class="system-msg">${msg}</div>`;
    }

    function setRefreshing(on) {
      DOM.refreshBtn.disabled = on;
      DOM.refreshBtn.classList.toggle('spinning', on);
    }

    function startCountdown() {
      clearInterval(countdownTimer);
      let s = CONFIG.AUTO_REFRESH_S;
      countdownTimer = setInterval(() => {
        s--;
        DOM.nextRefresh.textContent = `Next refresh in ${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;
        if (s <= 0) { clearInterval(countdownTimer); loadFeed(true); }
      }, 1000);
    }

    /**
     * B2: Refresh button clears ALL feed caches (both memory and localStorage)
     * then reloads the current feed fresh.
     */
    function clearAllCaches() {
      // Clear in-memory cache
      Object.keys(feedCache).forEach(k => delete feedCache[k]);
      // Clear all Pulse localStorage entries
      Object.keys(localStorage)
        .filter(k => k.startsWith('pulse_v26d_'))
        .forEach(k => localStorage.removeItem(k));
    }

    async function loadFeed(forceRefresh = false) {
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(async () => {

        const feedUrl  = DOM.dropdown.value;
        const feedName = DOM.dropdown.options[DOM.dropdown.selectedIndex].text;

        // ── PDF virtual feed ─────────────────────────────────────────
        if (feedUrl === 'uploaded-pdf') {
          if (feedCache['uploaded-pdf']) {
            const items = feedCache['uploaded-pdf'].items;
            startPagination(items, 'PDF Summary', 'uploaded-pdf');
            DOM.nextRefresh.textContent = 'Local file — auto-refresh paused';
          } else {
            setFeedStatus('📭 No PDF loaded. Tap 📖 to upload a document.');
            DOM.itemCount.textContent = '';
          }
          return;
        }

        // ── Memory cache hit ──────────────────────────────────────────
        const mem = feedCache[feedUrl];
        const memHit = mem && (Date.now() - mem.timestamp < CONFIG.CACHE_TTL_MS);
        if (!forceRefresh && memHit) {
          const stored = lsLoad(feedUrl);
          const items  = stored ? stored.items.filter(i => !i.viewed) : mem.items;
          startPagination(items, feedName, feedUrl);
          startCountdown();
          return;
        }

        const reqId = ++requestCounter;
        setFeedStatus('📡 Fetching latest articles…');
        DOM.itemCount.textContent = '';
        setRefreshing(true);

        try {
          const rawItems = await fetchViaJsonp(feedUrl);
          if (reqId !== requestCounter) return;
          if (!rawItems?.length) { setFeedStatus('📭 No articles found.'); return; }

          // Merge into localStorage (dedup + 24hr store)
          let mergedItems;
          try { mergedItems = mergeIntoStore(feedUrl, feedName, rawItems); } catch(e) { mergedItems = []; }

          // If dedup filtered everything (shouldn't happen on first load), fall back to raw items
          if (!mergedItems.length) {
            mergedItems = rawItems.map(item => ({
              id: articleId(item.title), title: item.title || 'Untitled',
              description: processRssText(item.description, 500),
              link: item.link || '#', pubDate: item.pubDate || '', viewed: false
            }));
          }

          // Memory cache (short TTL)
          feedCache[feedUrl] = { timestamp: Date.now(), items: mergedItems, feedName };

          // Only show non-viewed items, latest first
          const displayItems = mergedItems.filter(i => !i.viewed);
          startPagination(displayItems.length ? displayItems : mergedItems, feedName, feedUrl);
          startCountdown();

        } catch (err) {
          if (reqId !== requestCounter) return;
          console.error('Feed load error:', err);
          DOM.output.innerHTML =
            `<div class="system-msg error">❌ Feed unavailable: ${escapeHtml(err.message)}<br>` +
            `<small style="font-size:10px;opacity:.7;display:block;margin-top:8px">Try the ⟳ refresh button or switch to a different feed.</small></div>`;
        } finally {
          if (reqId === requestCounter) setRefreshing(false);
        }
      }, 200);
    }


    /* ════════════════════════════════════════════════════════════════════
       JS §9 — ARTICLE SANITISATION & LAYOUT REBUILD (B4)
    ════════════════════════════════════════════════════════════════════ */

    const ALLOWED_TAGS = new Set([
      'p','br','strong','b','em','i','u','h1','h2','h3','h4','h5','h6',
      'ul','ol','li','blockquote','a','span','div','section','article'
    ]);
    const ALLOWED_ATTRS = { a: ['href','title'], img: ['src','alt'] };

    function sanitizeNode(node) {
      Array.from(node.childNodes).forEach(child => {
        if (child.nodeType === Node.ELEMENT_NODE) {
          const tag = child.tagName.toLowerCase();
          if (!ALLOWED_TAGS.has(tag)) {
            while (child.firstChild) node.insertBefore(child.firstChild, child);
            node.removeChild(child);
          } else {
            Array.from(child.attributes).forEach(attr => {
              const allowed = ALLOWED_ATTRS[tag] || [];
              if (!allowed.includes(attr.name)) child.removeAttribute(attr.name);
            });
            sanitizeNode(child);
          }
        } else if (child.nodeType === Node.COMMENT_NODE) {
          node.removeChild(child);
        }
      });
    }

    function sanitizeHtml(html) {
      const wrap = document.createElement('div');
      wrap.innerHTML = html;
      sanitizeNode(wrap);

      // Post-sanitize: remove empty blocks (bottom-up, O(n))
      Array.from(wrap.querySelectorAll('div,p,section,span,ul,ol,li,blockquote,h1,h2,h3,h4'))
        .reverse()
        .forEach(el => { if (el.textContent.trim() === '' && !el.querySelector('img')) el.remove(); });

      // Collapse br runs
      wrap.innerHTML = wrap.innerHTML
        .replace(/(<br\s*\/?>\s*){3,}/gi, '</p><p>')
        .replace(/<p>\s*<\/p>/g, '');

      return wrap.innerHTML;
    }

    /**
     * B4 — Rebuild article HTML into clean, well-spaced paragraphs.
     * Extracts all text content from the sanitized HTML, splits into
     * sentences (~3 per paragraph) and wraps each group in a <p>.
     * Headings are preserved as-is; pure-text nodes get paragraph treatment.
     */
    function rebuildArticleLayout(html) {
      const wrap = document.createElement('div');
      wrap.innerHTML = html;

      const result = [];

      // Walk top-level children
      Array.from(wrap.childNodes).forEach(node => {
        if (node.nodeType === Node.ELEMENT_NODE) {
          const tag = node.tagName.toLowerCase();
          // Headings, lists, blockquotes — keep as-is
          if (/^h[1-6]$/.test(tag) || tag === 'ul' || tag === 'ol' || tag === 'blockquote') {
            result.push(node.outerHTML);
            return;
          }
          // Paragraphs and divs — extract and reflow text
          const text = node.textContent.trim();
          if (!text) return;
          result.push(...reflowText(text));
        } else if (node.nodeType === Node.TEXT_NODE) {
          const text = node.textContent.trim();
          if (text) result.push(...reflowText(text));
        }
      });

      return result.join('\n') || html; // fallback to original if nothing extracted
    }

    /** Split raw text into sentence-grouped paragraphs (~3 sentences each) */
    function reflowText(text) {
      // Split on sentence boundaries (., !, ? followed by space or end)
      const sentences = text.match(/[^.!?…]+(?:[.!?…]+(?:\s|$)|\s*$)/g) || [text];
      const paras = [];
      for (let i = 0; i < sentences.length; i += 3) {
        const chunk = sentences.slice(i, i+3).join(' ').replace(/\s+/g,' ').trim();
        if (chunk.length > 10) paras.push(`<p>${escapeHtml(chunk)}</p>`);
      }
      return paras;
    }

    function extractMainContent(html, baseUrl) {
      const parser = new DOMParser();
      const doc    = parser.parseFromString(html, 'text/html');

      const base = doc.createElement('base');
      base.href  = baseUrl;
      doc.head.appendChild(base);

      // Comprehensive junk removal
      const junk = [
        'script','style','nav','footer','aside','iframe','noscript','form',
        'header','button','input','select','textarea','object','embed',
        '.ad','.ads','.ad-unit','.ad-slot','.ad-container','.advertisement','.advert',
        '.dfp-ad','.google-ad','[id*="google_ads"]','[id*="dfp"]',
        '[class*="ad-"]','[class*="-ad"]','[class*="advert"]','[class*="sponsor"]',
        '[class*="promo"]','[class*="promotion"]',
        '.social-share','.share','.sharing','.share-buttons','.social-buttons',
        '.social-links','.social-icons','[class*="social"]','[class*="share"]',
        '.related-stories','.related-articles','.related','.recommended',
        '[class*="related"]','[class*="recommended"]','[class*="more-stories"]',
        '#comments','.comments','[class*="comment"]',
        '[class*="newsletter"]','[class*="subscribe"]','[class*="signup"]',
        '[class*="paywall"]','[class*="subscription"]',
        '.breadcrumb','.tags','.tag-list','.article-tags','[class*="breadcrumb"]',
        '.author-bio','.author-box','[class*="author-bio"]',
        '[class*="sticky"]','[class*="toast"]','[class*="popup"]','[class*="modal"]',
        '[class*="overlay"]','[class*="banner"]',
        '[class*="widget"]','[class*="embed"]',
        'figure','picture','.article-image','[class*="article-img"]',
        '[class*="hero-img"]','[class*="lead-img"]','[class*="featured-img"]',
        '[class*="pull-quote"]','[class*="callout"]',
      ];
      junk.forEach(sel => { try { doc.querySelectorAll(sel).forEach(el => el.remove()); } catch(e){} });

      // Bottom-up empty-block purge (O(n))
      Array.from(doc.querySelectorAll('div,p,section,span,ul,ol,li,blockquote,h1,h2,h3,h4,h5,h6'))
        .reverse()
        .forEach(el => { if (el.textContent.trim() === '' && !el.querySelector('img')) el.remove(); });

      // Selector priority list for main content
      const selectors = [
        'article[class*="article"]','article[class*="story"]','article',
        '[class*="article-body"]','[class*="story-body"]','[class*="story-content"]',
        '[class*="article-content"]','[class*="entry-content"]',
        '#article-content','#story-content','.content-area','.article-txt','main',
        '.page-content','[role="main"]'
      ];
      let mainEl = null;
      for (const sel of selectors) {
        const el = doc.querySelector(sel);
        if (el && el.textContent.trim().length > 300) { mainEl = el; break; }
      }
      if (!mainEl) return null;

      currentArticleText = mainEl.innerText || mainEl.textContent;
      const sanitized    = sanitizeHtml(mainEl.innerHTML);
      return rebuildArticleLayout(sanitized); // B4: rebuild into clean paragraphs
    }


    /* ════════════════════════════════════════════════════════════════════
       JS §10 — READER MODE ENGINE
    ════════════════════════════════════════════════════════════════════ */

    function openReader(url, title, feedName, pubDate, articleIdVal, feedUrl) {
      const vUrl = safeUrl(url);
      if (vUrl === '#') return;

      DOM.readerPanel.classList.add('open');
      DOM.readerBackdrop.classList.add('open');
      DOM.readerBackdrop.removeAttribute('aria-hidden');
      document.body.style.overflow = 'hidden';

      DOM.aiToggle.style.display = 'none';
      isPdfArticle = false;
      closeAiPanel();
      DOM.aiChatArea.innerHTML = `<div class="ai-message system">Ask me anything — about this article, or any topic.</div>`;
      currentArticleText = '';

      // ── B3: mark viewed and remove from front page ───────────────────
      if (articleIdVal && feedUrl && feedUrl !== 'uploaded-pdf') {
        lsMarkViewed(feedUrl, articleIdVal);
        // Remove the card from the DOM immediately
        const card = DOM.output.querySelector(`[data-article-id="${CSS.escape(articleIdVal)}"]`);
        if (card) card.closest('.feed-item')?.remove();
      }

      // ── PDF local article intercept ───────────────────────────────────
      if (vUrl.startsWith('pdf-local-')) {
        const idx  = parseInt(vUrl.replace('pdf-local-',''), 10);
        const item = feedCache['uploaded-pdf']?.items[idx];
        isPdfArticle = true;

        DOM.readerUrlLabel.textContent = 'Local PDF Document';
        DOM.readerExtLink.style.display = 'none';
        DOM.aiToggle.style.display = 'none';  // AI hidden for PDF (Core rule)
        DOM.readerScroll.scrollTop = 0;
        setReaderProgress(0);

        if (item) {
          currentArticleText = item.full_text;
          // Bypass AI — render FULL TEXT directly, formatted (B4 reflow)
          const formattedFull = reflowText(item.full_text).join('\n');
          renderArticle(formattedFull, title, 'PDF Summary', pubDate);
        } else {
          renderReaderError(url, 'PDF article data not found.');
        }
        return;
      }

      // ── Web article ───────────────────────────────────────────────────
      DOM.readerExtLink.style.display = 'inline-block';
      try { DOM.readerUrlLabel.textContent = new URL(vUrl).hostname; }
      catch { DOM.readerUrlLabel.textContent = vUrl; }
      DOM.readerExtLink.href     = vUrl;
      DOM.readerScroll.scrollTop = 0;
      setReaderProgress(0);
      DOM.readerContent.innerHTML = `<div class="reader-status">📰 Fetching article…</div>`;

      fetchArticle(vUrl, title, feedName, pubDate);
    }

    function closeReader() {
      DOM.readerPanel.classList.remove('open');
      DOM.readerBackdrop.classList.remove('open');
      DOM.readerBackdrop.setAttribute('aria-hidden','true');
      document.body.style.overflow = '';
      closeAiPanel();
      DOM.aiToggle.style.display = 'none';
      isPdfArticle = false;
    }

    function setReaderProgress(pct) {
      const c = Math.min(100, Math.max(0, pct));
      DOM.readerProgress.style.width = c + '%';
      DOM.readerProgress.setAttribute('aria-valuenow', Math.round(c));
    }

    async function fetchArticle(url, title, feedName, pubDate) {
      setReaderProgress(15);

      const proxyUrls = [
        `https://corsproxy.io/?${encodeURIComponent(url)}`,
        `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`
      ];
      const isUsable = h => h && h.length > 2000 && !h.includes('Just a moment...') && !h.toLowerCase().includes('enable javascript');

      let rawHtml = null;
      try {
        rawHtml = await Promise.any(
          proxyUrls.map(proxy =>
            xhrFetch(proxy, CONFIG.ARTICLE_TIMEOUT_MS).then(res => { if (!isUsable(res)) throw new Error('unusable'); return res; })
          )
        );
      } catch(e) { /* all proxies failed — fall to Tier 2 */ }

      setReaderProgress(50);

      if (rawHtml) {
        const cleanHtml = extractMainContent(rawHtml, url);
        if (cleanHtml && cleanHtml.length > 200) {
          setReaderProgress(100);
          renderArticle(cleanHtml, title, feedName, pubDate);
          return;
        }
      }

      // Tier 2: Gemini extraction
      setReaderProgress(60);
      try {
        await fetchArticleViaApi(url, title, feedName, pubDate);
        return;
      } catch(e) {
        console.warn('Gemini extraction failed', e);
      }

      setReaderProgress(100);
      setTimeout(() => setReaderProgress(0), 500);
      renderReaderError(url);
    }

    async function fetchArticleViaApi(url, title, feedName, pubDate) {
      const apiKey = getGeminiKey();
      if (!apiKey) throw new Error('API key missing');

      const endpoint = `https://generativelanguage.googleapis.com/v1beta/models/${CONFIG.GEMINI_MODEL}:generateContent?key=${apiKey}`;
      const prompt   =
        `Extract only the article body text from this news article URL: ${url}\n` +
        `Return clean readable paragraphs only. No HTML, no ads, no nav, no metadata.`;

      const response = await fetchWithRetry(endpoint, {
        method: 'POST',
        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
      });

      if (!response.ok) throw new Error(`Gemini API ${response.status}`);
      const data = await response.json();
      const text = data.candidates?.[0]?.content?.parts?.[0]?.text || '';
      if (!text || text.length < 200) throw new Error('Gemini returned too little content');

      currentArticleText = text;
      // B4: reflow Gemini's text into clean paragraphs
      const rebuilt = reflowText(text).join('\n');
      renderArticle(rebuilt, title, feedName, pubDate);
    }

    function renderArticle(cleanHtml, title, feedName, pubDate) {
      DOM.readerContent.innerHTML =
        `<h1 class="reader-article-title">${escapeHtml(title)}</h1>` +
        `<div class="reader-article-meta">${pubDate ? `${timeSince(pubDate)} &nbsp;·&nbsp; ` : ''}${escapeHtml(feedName)}</div>` +
        `<div class="reader-body">${cleanHtml}</div>`;

      // AI button only shown for web articles, not PDF (Core rule)
      if (!isPdfArticle) {
        DOM.aiToggle.style.display = 'inline-block';
      }
      setReaderProgress(100);
      setTimeout(() => setReaderProgress(0), 800);
    }

    function renderReaderError(url, customMsg) {
      const msg = customMsg || 'This news site strictly blocks external readers.';
      DOM.readerContent.innerHTML =
        `<div class="reader-status error" style="margin-top:40px;border:1px solid var(--rule);padding:30px;border-radius:8px;background:var(--paper);">
           <h3 style="color:var(--ink);font-family:'Playfair Display',serif;font-size:24px;margin-bottom:10px;">Article Unavailable</h3>
           <p style="color:var(--muted);line-height:1.5;font-size:14px;margin-bottom:25px;">${escapeHtml(msg)}</p>
           <a href="${escapeHtml(url)}" target="_blank" rel="noopener noreferrer"
              style="display:inline-block;background:var(--accent);color:var(--paper);padding:12px 24px;border-radius:4px;text-decoration:none;font-family:'IBM Plex Mono',monospace;font-size:12px;text-transform:uppercase;">
             ↗ Read on Original Site
           </a>
         </div>`;
    }


    /* ════════════════════════════════════════════════════════════════════
       JS §11 — AI CHAT (Core rule: only active for web article reader)
    ════════════════════════════════════════════════════════════════════ */

    function toggleAiPanel() {
      if (isPdfArticle) return;  // Guard: never open AI for PDF
      DOM.aiPanel.classList.toggle('open');
      if (DOM.aiPanel.classList.contains('open')) DOM.aiInput.focus();
    }

    function closeAiPanel() {
      DOM.aiPanel.classList.remove('open');
    }

    function addChatMessage(role, text) {
      const div = document.createElement('div');
      div.className = `ai-message ${role}`;
      div.innerHTML = role === 'system' ? escapeHtml(text) : parseMarkdown(text);
      DOM.aiChatArea.appendChild(div);
      DOM.aiChatArea.scrollTop = DOM.aiChatArea.scrollHeight;
    }

    async function submitAiPrompt(userPrompt) {
      if (!userPrompt?.trim() || isPdfArticle) return;

      addChatMessage('user', userPrompt);
      DOM.aiInput.value = '';
      DOM.aiSubmit.disabled = true;
      DOM.aiSubmit.textContent = '…';

      const loadDiv = document.createElement('div');
      loadDiv.className = 'ai-message system';
      loadDiv.textContent = 'Thinking…';
      DOM.aiChatArea.appendChild(loadDiv);
      DOM.aiChatArea.scrollTop = DOM.aiChatArea.scrollHeight;

      try {
        const apiKey = getGeminiKey();
        if (!apiKey) throw new Error('API Key missing');

        const endpoint = `https://generativelanguage.googleapis.com/v1beta/models/${CONFIG.GEMINI_MODEL}:generateContent?key=${apiKey}`;
        const ctx = currentArticleText
          ? `--- CURRENT ARTICLE ---\n${currentArticleText.substring(0, 30000)}\n-----------------------\n\n`
          : '';
        const prompt =
          `You are a smart, helpful AI assistant inside Pulse, an Indian news reader.\n` +
          `Answer clearly and helpfully. Article context (if any) is below; you are not limited to it.\n\n` +
          ctx + `USER: ${userPrompt}`;

        const res  = await fetchWithRetry(endpoint, { method:'POST', body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] }) });
        const data = await res.json();
        const raw  = data.candidates?.[0]?.content?.parts?.[0]?.text || 'No response.';
        DOM.aiChatArea.removeChild(loadDiv);
        addChatMessage('assistant', cleanAiResponse(raw));

      } catch(err) {
        DOM.aiChatArea.removeChild(loadDiv);
        addChatMessage('system', `Error: ${err.message}`);
      } finally {
        DOM.aiSubmit.disabled = false;
        DOM.aiSubmit.textContent = 'Ask';
      }
    }


    /* ════════════════════════════════════════════════════════════════════
       JS §12 — PDF PROCESSING
       - Silent light-green toast instead of alert()
       - Articles shown as virtual newspaper "PDF Summary"
       - AI toggle hidden (Core rule)
       - Click → full text directly, no AI bypass needed
    ════════════════════════════════════════════════════════════════════ */

    function showPdfToast(msg) {
      DOM.pdfToast.innerHTML = msg;
      DOM.pdfToast.classList.add('show');
      setTimeout(() => DOM.pdfToast.classList.remove('show'), 4000);
    }

    async function processPdf(file) {
      const apiKey = getGeminiKey();
      if (!apiKey) return;

      const originalLabel = DOM.uploadPdfBtn.textContent;
      DOM.uploadPdfBtn.textContent = '⚙';
      DOM.uploadPdfBtn.disabled    = true;

      const reader = new FileReader();
      reader.onload = async () => {
        const base64 = reader.result.split(',')[1];

        try {
          const endpoint = `https://generativelanguage.googleapis.com/v1beta/models/${CONFIG.GEMINI_MODEL}:generateContent?key=${apiKey}`;

          // Request structured extraction of ALL sections
          const payload = {
            contents: [{
              parts: [
                { inlineData: { mimeType: 'application/pdf', data: base64 } },
                { text:
                  'Analyze this document thoroughly. Identify every distinct article, report, chapter, or major section.\n' +
                  'For EACH section provide:\n' +
                  '1) "title": A clear, concise headline.\n' +
                  '2) "summary": A 2-sentence summary (for the newspaper list view).\n' +
                  '3) "full_text": The COMPLETE, VERBATIM full text of that section.\n' +
                  'CRITICAL: Do not omit any section. Return ONLY a valid JSON array. No markdown fences.'
                }
              ]
            }]
          };

          const response = await fetchWithRetry(endpoint, { method: 'POST', body: JSON.stringify(payload) });
          const data     = await response.json();
          const clean    = cleanAiResponse(data.candidates?.[0]?.content?.parts?.[0]?.text || '[]');

          let sections;
          try { sections = JSON.parse(clean); }
          catch(e) { throw new Error('AI returned malformed data — try a smaller PDF.'); }

          // Map sections to feed-item format; virtual URL = "pdf-local-{index}"
          const items = sections.map((s, i) => ({
            id:          `pdf-${i}`,
            title:       s.title       || `Section ${i+1}`,
            description: s.summary     || 'Summary unavailable.',
            full_text:   s.full_text   || s.summary || '',
            link:        `pdf-local-${i}`,
            pubDate:     new Date().toISOString(),
            _feedName:   'PDF Summary',
            _feedUrl:    'uploaded-pdf'
          }));

          // Store in memory cache
          feedCache['uploaded-pdf'] = { timestamp: Date.now(), items, feedName: 'PDF Summary' };

          // Inject "PDF Summary" option into dropdown (if not present)
          if (!Array.from(DOM.dropdown.options).find(o => o.value === 'uploaded-pdf')) {
            const grp = document.createElement('optgroup');
            grp.label = '── Local Documents ──';
            const opt = document.createElement('option');
            opt.value = 'uploaded-pdf';
            opt.textContent = '📄 PDF Summary';
            grp.appendChild(opt);
            DOM.dropdown.prepend(grp);
          }

          // Silent green confirmation
          showPdfToast(`✅ PDF analysed — ${items.length} sections found. Select <strong>📄 PDF Summary</strong> to read.`);

        } catch(err) {
          console.error('PDF processing failed', err);
          showPdfToast(`❌ PDF failed: ${err.message}`);
        } finally {
          DOM.uploadPdfBtn.textContent = originalLabel;
          DOM.uploadPdfBtn.disabled    = false;
        }
      };
      reader.readAsDataURL(file);
    }


    /* ════════════════════════════════════════════════════════════════════
       JS §13 — INITIALISATION & EVENT LISTENERS
    ════════════════════════════════════════════════════════════════════ */
    window.addEventListener('load', () => {

      DOM.headerDate.textContent = new Date().toLocaleDateString('en-IN', {
        weekday: 'long', day: 'numeric', month: 'long'
      });

      // Feed controls
      DOM.dropdown.addEventListener('change', () => loadFeed(false));

      // B2: Refresh clears ALL caches then reloads current feed fresh
      DOM.refreshBtn.addEventListener('click', () => {
        clearAllCaches();
        loadFeed(true);
      });

      DOM.clearKeyBtn.addEventListener('click', clearGeminiKey);

      // PDF controls
      DOM.uploadPdfBtn.addEventListener('click', () => DOM.pdfFileInput.click());
      DOM.pdfFileInput.addEventListener('change', e => {
        if (e.target.files[0]) processPdf(e.target.files[0]);
        e.target.value = ''; // allow re-upload of same file
      });

      // Article card click → open reader
      DOM.output.addEventListener('click', e => {
        const trigger = e.target.closest('.reader-trigger');
        if (!trigger) return;
        const url         = trigger.getAttribute('data-url');
        const articleIdV  = trigger.getAttribute('data-article-id');
        const feedUrlV    = trigger.getAttribute('data-feed-url');
        if (url && url !== '#') {
          openReader(url,
            trigger.getAttribute('data-title'),
            trigger.getAttribute('data-feed'),
            trigger.getAttribute('data-date'),
            articleIdV,
            feedUrlV
          );
        }
      });
      DOM.output.addEventListener('keydown', e => {
        if (e.key !== 'Enter' && e.key !== ' ') return;
        const trigger = e.target.closest('.reader-trigger');
        if (trigger) { e.preventDefault(); trigger.click(); }
      });

      // Reader controls
      DOM.readerBack.addEventListener('click', closeReader);
      DOM.readerBackdrop.addEventListener('click', closeReader);
      document.addEventListener('keydown', e => {
        if (e.key === 'Escape' && DOM.readerPanel.classList.contains('open')) closeReader();
      });

      DOM.fontUp.addEventListener('click', () => {
        readerFontSize = Math.min(CONFIG.READER_FONT_MAX, readerFontSize + 1);
        document.documentElement.style.setProperty('--reader-font-sz', `${readerFontSize}px`);
      });
      DOM.fontDown.addEventListener('click', () => {
        readerFontSize = Math.max(CONFIG.READER_FONT_MIN, readerFontSize - 1);
        document.documentElement.style.setProperty('--reader-font-sz', `${readerFontSize}px`);
      });

      DOM.readerScroll.addEventListener('scroll', () => {
        const { scrollTop, scrollHeight, clientHeight } = DOM.readerScroll;
        const d = scrollHeight - clientHeight;
        setReaderProgress(d > 0 ? (scrollTop / d) * 100 : 0);
      });

      // AI chat controls — Core rule: only active for web articles
      DOM.aiToggle.addEventListener('click', toggleAiPanel);
      DOM.aiCloseBtn.addEventListener('click', closeAiPanel);
      DOM.aiSubmit.addEventListener('click', () => submitAiPrompt(DOM.aiInput.value));
      DOM.aiInput.addEventListener('keydown', e => {
        if (e.key === 'Enter') submitAiPrompt(DOM.aiInput.value);
      });
      DOM.aiPromptBtns.forEach(btn => {
        btn.addEventListener('click', () => submitAiPrompt(btn.textContent));
      });

      // Boot
      loadFeed();
    });

  </script>
