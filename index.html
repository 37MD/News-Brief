<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pulse AI Reader</title>
    <meta name="theme-color" content="#000000">
    <link rel="manifest" href="data:application/manifest+json,{'name':'Pulse AI Reader','short_name':'PulseAI','display':'standalone','start_url':'.','background_color':'#ffffff','theme_color':'#000000','icons':[{'src':'https://cdn-icons-png.flaticon.com/512/3251/3251347.png','sizes':'512x512','type':'image/png'}]}">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mozilla/readability@0.5.0/Readability.min.js"></script>
    <script type="importmap">
      { "imports": { "@google/generative-ai": "https://esm.run/@google/generative-ai" } }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Merriweather:ital,wght@0,400;0,700;1,400&family=Inter:wght@400;600&display=swap');
        .reader-font { font-family: 'Merriweather', serif; }
        .ui-font { font-family: 'Inter', sans-serif; }
        .prose h1 { @apply text-3xl font-bold mb-6; }
        .prose p { @apply mb-4 leading-relaxed text-lg; }
    </style>
</head>
<body class="ui-font bg-white overflow-hidden">

<div id="app" class="flex h-screen">
    <main class="w-2/3 flex flex-col border-r border-gray-100 h-full">
        <header class="p-4 bg-gray-50 border-b flex gap-3 items-center">
            <div class="flex-1 flex gap-2">
                <input id="urlInput" type="text" placeholder="Paste link (Zerodha Pulse, RSS, etc.)" 
                       class="w-full px-4 py-2 rounded-lg border border-gray-200 focus:outline-none focus:ring-2 focus:ring-black transition-all">
                <button onclick="loadArticle()" class="bg-black text-white px-6 py-2 rounded-lg font-medium hover:bg-gray-800 flex items-center gap-2">
                    <i data-lucide="book-open" class="w-4 h-4"></i> Read
                </button>
            </div>
            <button onclick="toggleSettings()" class="p-2 text-gray-500 hover:text-black">
                <i data-lucide="settings" class="w-5 h-5"></i>
            </button>
        </header>

        <div id="readerContent" class="flex-1 overflow-y-auto p-12 reader-font">
            <div id="placeholder" class="h-full flex flex-col items-center justify-center text-gray-300 italic">
                <i data-lucide="zap" class="w-12 h-12 mb-4 opacity-20"></i>
                <p>Paste a URL to generate a distraction-free view.</p>
            </div>
            <div id="articleBody" class="max-w-2xl mx-auto hidden">
                <h1 id="articleTitle" class="text-4xl font-bold mb-8 leading-tight"></h1>
                <div id="articleText" class="prose text-gray-800"></div>
            </div>
        </div>
    </main>

    <aside class="w-1/3 bg-gray-50 flex flex-col border-l border-gray-100">
        <div class="p-4 border-b bg-white flex justify-between items-center">
            <span class="font-bold text-sm flex items-center gap-2 uppercase tracking-wider text-gray-500">
                <i data-lucide="sparkles" class="w-4 h-4 text-orange-500"></i> Gemini Analyst
            </span>
        </div>

        <div id="chatHistory" class="flex-1 overflow-y-auto p-4 space-y-4">
            <div class="bg-white p-3 rounded-xl border border-gray-100 text-sm shadow-sm">
                <strong>Gemini:</strong> I'm ready. Load an article, then ask me to summarize or find technical triggers.
            </div>
        </div>

        <div class="p-4 bg-white border-t">
            <div class="relative">
                <textarea id="chatInput" rows="3" placeholder="Analyze this news..." 
                          class="w-full p-3 pr-12 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-1 focus:ring-black resize-none"></textarea>
                <button onclick="askAI()" class="absolute right-3 bottom-3 p-2 bg-black text-white rounded-lg hover:scale-105 transition-transform">
                    <i data-lucide="send" class="w-4 h-4"></i>
                </button>
            </div>
        </div>
    </aside>
</div>

<div id="settingsModal" class="hidden fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center z-50">
    <div class="bg-white p-8 rounded-2xl w-96 shadow-2xl">
        <h2 class="text-xl font-bold mb-4">Settings</h2>
        <label class="block text-sm font-medium mb-2">Gemini API Key</label>
        <input id="apiKeyInput" type="password" class="w-full p-2 border rounded-lg mb-6 focus:ring-1 focus:ring-black outline-none">
        <div class="flex justify-end gap-3">
            <button onclick="toggleSettings()" class="px-4 py-2 text-gray-500">Cancel</button>
            <button onclick="saveSettings()" class="px-6 py-2 bg-black text-white rounded-lg">Save</button>
        </div>
    </div>
</div>

<script type="module">
    import { GoogleGenerativeAI } from "@google/generative-ai";
    lucide.createIcons();

    let currentArticleText = "";
    
    // Core Reader Logic
    window.loadArticle = async () => {
        const url = document.getElementById('urlInput').value;
        if (!url) return alert("Enter a URL first!");

        const btn = document.querySelector('button[onclick="loadArticle()"]');
        btn.disabled = true;
        btn.innerHTML = `<i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i> Fetching...`;
        lucide.createIcons();

        try {
            // Using allorigins.win to bypass CORS
            const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`;
            const response = await fetch(proxyUrl);
            const data = await response.json();
            
            const parser = new DOMParser();
            const doc = parser.parseFromString(data.contents, 'text/html');
            const reader = new Readability(doc);
            const article = reader.parse();

            if (article) {
                document.getElementById('placeholder').classList.add('hidden');
                document.getElementById('articleBody').classList.remove('hidden');
                document.getElementById('articleTitle').innerText = article.title;
                document.getElementById('articleText').innerHTML = article.content;
                currentArticleText = article.textContent;
            }
        } catch (e) {
            alert("Error loading content. Sites with heavy JS or Paywalls might be blocked.");
        } finally {
            btn.disabled = false;
            btn.innerHTML = `<i data-lucide="book-open" class="w-4 h-4"></i> Read`;
            lucide.createIcons();
        }
    };

    // AI Chat Logic
    window.askAI = async () => {
        const key = localStorage.getItem('gemini_key');
        if (!key) return alert("Set your Gemini API Key in settings first!");
        
        const input = document.getElementById('chatInput');
        const prompt = input.value;
        if (!prompt || !currentArticleText) return;

        addMessage('user', prompt);
        input.value = '';

        try {
            const genAI = new GoogleGenerativeAI(key);
            const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash" });
            
            const fullPrompt = `Context: ${currentArticleText}\n\nQuestion: ${prompt}`;
            const result = await model.generateContent(fullPrompt);
            const response = await result.response;
            addMessage('ai', response.text());
        } catch (e) {
            addMessage('ai', "Error: Check your API key or connection.");
        }
    };

    function addMessage(role, text) {
        const container = document.getElementById('chatHistory');
        const div = document.createElement('div');
        div.className = `p-3 rounded-xl border text-sm shadow-sm ${role === 'user' ? 'bg-black text-white ml-8' : 'bg-white border-gray-100 mr-8 text-gray-800'}`;
        div.innerHTML = `<strong>${role === 'user' ? 'You' : 'Gemini'}:</strong> <p class="mt-1">${text}</p>`;
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
    }

    // Settings
    window.toggleSettings = () => {
        const modal = document.getElementById('settingsModal');
        modal.classList.toggle('hidden');
        document.getElementById('apiKeyInput').value = localStorage.getItem('gemini_key') || '';
    };

    window.saveSettings = () => {
        const key = document.getElementById('apiKeyInput').value;
        localStorage.setItem('gemini_key', key);
        toggleSettings();
    };
</script>
</body>
</html>
