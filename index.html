<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gemini Pulse</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root { 
    --ink: #1a1a18; 
    --paper: #f5f0e8; 
    --accent: #1a5c3a; 
    --rule: #c8c0b0; 
    --muted: #5a554c; 
    --meta-color: #8c867a;
    --error: #c0392b;
  }
  
  * { box-sizing: border-box; margin: 0; padding: 0; }
  
  body { 
    background: var(--paper); 
    color: var(--ink); 
    font-family: 'IBM Plex Sans', sans-serif; 
    min-height: 100vh; 
    line-height: 1.6; 
  }
  
  /* ── Top Controls Bar ── */
  .controls-bar {
    position: absolute;
    top: 16px;
    right: 20px;
    z-index: 100;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  select {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    background-color: transparent;
    color: var(--ink);
    border: 1px solid var(--rule);
    padding: 6px 10px;
    border-radius: 4px;
    cursor: pointer;
    outline: none;
    text-transform: uppercase;
    font-weight: 500;
    max-width: 200px;
  }

  select:hover { border-color: var(--accent); }

  /* Refresh button */
  #refresh-btn {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    background: transparent;
    color: var(--accent);
    border: 1px solid var(--accent);
    padding: 6px 10px;
    border-radius: 4px;
    cursor: pointer;
    text-transform: uppercase;
    font-weight: 500;
    transition: background 0.2s, color 0.2s;
    white-space: nowrap;
  }
  #refresh-btn:hover { background: var(--accent); color: var(--paper); }
  #refresh-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  #refresh-btn.spinning { animation: spin 1s linear infinite; }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Masthead ── */
  .masthead { 
    border-bottom: 3px double var(--ink); 
    padding: 30px 20px; 
    text-align: center; 
    background: var(--paper); 
    position: relative;
  }
  
  .masthead-title { 
    font-family: 'Playfair Display', serif; 
    font-size: clamp(32px, 5vw, 56px); 
    font-weight: 700; 
  }
  
  .tagline { 
    font-family: 'IBM Plex Mono', monospace; 
    font-size: 10px; 
    letter-spacing: 0.2em; 
    text-transform: uppercase; 
    color: var(--meta-color); 
    margin-top: 8px; 
  }

  /* ── Feed status bar ── */
  .feed-status-bar {
    max-width: 800px;
    margin: 16px auto 0;
    padding: 0 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--meta-color);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  /* ── Container ── */
  .container { 
    max-width: 800px; 
    margin: 0 auto; 
    padding: 20px 20px 80px; 
  }
  
  /* ── Feed Items ── */
  .feed-item {
    margin-bottom: 35px;
    border-bottom: 1px solid var(--rule);
    padding-bottom: 25px;
    animation: fadeIn 0.3s ease forwards;
    opacity: 0;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .feed-item:last-child { border-bottom: none; }

  .headline {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    color: var(--ink);
    text-decoration: none;
    font-weight: 700;
    display: block; 
    line-height: 1.3;
    margin-bottom: 10px;
    word-break: break-word;
  }

  .headline:hover { color: var(--accent); text-decoration: underline; }

  .description {
    font-size: 15px;
    color: var(--muted);
    margin-bottom: 12px;
    line-height: 1.6;
  }

  .meta {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px; 
    color: var(--meta-color);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  /* ── System Messages ── */
  .system-msg {
    font-family: 'IBM Plex Mono', monospace; 
    font-size: 12px; 
    color: var(--meta-color); 
    text-align: center;
    margin-top: 60px;
    line-height: 2;
  }

  .system-msg.error { color: var(--error); }

  /* ── Auto-refresh countdown ── */
  #next-refresh {
    color: var(--meta-color);
    font-size: 10px;
    font-family: 'IBM Plex Mono', monospace;
  }

  /* ── Cache badge ── */
  .cached-badge {
    display: inline-block;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    background: var(--rule);
    color: var(--muted);
    padding: 1px 5px;
    border-radius: 2px;
    text-transform: uppercase;
    margin-left: 6px;
    vertical-align: middle;
  }

  /* ── Responsive ── */
  @media (max-width: 520px) {
    .controls-bar { 
      position: static; 
      padding: 12px 16px; 
      justify-content: flex-end;
      border-bottom: 1px solid var(--rule);
    }
    select { max-width: 160px; font-size: 10px; }
    .masthead { padding: 20px 16px; }
  }

  /* ══════════════════════════════════════
     READER MODE
  ══════════════════════════════════════ */

  /* Full-screen panel slides in from right */
  #reader-panel {
    position: fixed;
    top: 0; right: 0; bottom: 0;
    width: 100%;
    max-width: 780px;
    background: var(--paper);
    z-index: 999;
    display: flex;
    flex-direction: column;
    transform: translateX(100%);
    transition: transform 0.35s cubic-bezier(.4,0,.2,1);
    box-shadow: -4px 0 40px rgba(0,0,0,0.18);
    overflow: hidden;
  }
  #reader-panel.open { transform: translateX(0); }

  /* Dim backdrop */
  #reader-backdrop {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(26,26,24,0.45);
    z-index: 998;
    backdrop-filter: blur(2px);
  }
  #reader-backdrop.open { display: block; }

  /* Top bar */
  .reader-topbar {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px 20px;
    border-bottom: 1px solid var(--rule);
    background: var(--paper);
    flex-shrink: 0;
  }

  .reader-back-btn {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    text-transform: uppercase;
    background: transparent;
    color: var(--accent);
    border: 1px solid var(--accent);
    padding: 5px 12px;
    border-radius: 4px;
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.2s, color 0.2s;
    flex-shrink: 0;
  }
  .reader-back-btn:hover { background: var(--accent); color: var(--paper); }

  .reader-source-url {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--meta-color);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    flex: 1;
  }

  .reader-open-btn {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    font-weight: 500;
    text-transform: uppercase;
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--rule);
    padding: 5px 10px;
    border-radius: 4px;
    cursor: pointer;
    white-space: nowrap;
    text-decoration: none;
    transition: border-color 0.2s, color 0.2s;
    flex-shrink: 0;
  }
  .reader-open-btn:hover { border-color: var(--ink); color: var(--ink); }

  /* Font size controls */
  .reader-font-ctrl {
    display: flex;
    gap: 4px;
    flex-shrink: 0;
  }
  .reader-font-ctrl button {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    background: transparent;
    border: 1px solid var(--rule);
    color: var(--muted);
    width: 28px; height: 28px;
    border-radius: 4px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: border-color 0.2s;
  }
  .reader-font-ctrl button:hover { border-color: var(--ink); color: var(--ink); }

  /* Scrollable content area */
  .reader-scroll {
    overflow-y: auto;
    flex: 1;
    padding: 36px 40px 60px;
  }

  /* Article header */
  .reader-article-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(22px, 3.5vw, 32px);
    font-weight: 700;
    line-height: 1.25;
    color: var(--ink);
    margin-bottom: 16px;
  }

  .reader-article-meta {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--meta-color);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 28px;
    padding-bottom: 20px;
    border-bottom: 2px solid var(--rule);
  }

  /* Article body typography */
  .reader-body {
    font-size: var(--reader-font-size, 17px);
    line-height: 1.85;
    color: var(--ink);
  }
  .reader-body p  { margin-bottom: 1.4em; }
  .reader-body h1,.reader-body h2,.reader-body h3 {
    font-family: 'Playfair Display', serif;
    margin: 1.6em 0 0.6em;
    line-height: 1.25;
  }
  .reader-body h1 { font-size: 1.5em; }
  .reader-body h2 { font-size: 1.3em; }
  .reader-body h3 { font-size: 1.1em; }
  .reader-body img {
    max-width: 100%;
    height: auto;
    border-radius: 4px;
    margin: 1.2em 0;
    display: block;
  }
  .reader-body blockquote {
    border-left: 3px solid var(--accent);
    padding: 4px 0 4px 16px;
    margin: 1.4em 0;
    color: var(--muted);
    font-style: italic;
  }
  .reader-body a { color: var(--accent); word-break: break-word; }
  .reader-body ul, .reader-body ol { padding-left: 1.6em; margin-bottom: 1.2em; }
  .reader-body li { margin-bottom: 0.4em; }
  .reader-body figure { margin: 1.2em 0; }
  .reader-body figcaption {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--meta-color);
    margin-top: 6px;
  }

  /* Loading / error inside reader */
  .reader-status {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--meta-color);
    text-align: center;
    margin-top: 80px;
    line-height: 2.5;
  }
  .reader-status.error { color: var(--error); }

  /* Progress bar at top of reader */
  #reader-progress {
    position: absolute;
    top: 0; left: 0;
    height: 3px;
    width: 0%;
    background: var(--accent);
    transition: width 0.2s;
    z-index: 5;
  }

  /* Feed items — change cursor to pointer */
  .headline { cursor: pointer; }

  @media (max-width: 520px) {
    .reader-scroll { padding: 20px 18px 50px; }
    .reader-source-url { display: none; }
  }

</style>
</head>

<script>
  // ══════════════════════════════════════
  //  CONSTANTS & STATE
  // ══════════════════════════════════════
  const CACHE_TTL_MS   = 5 * 60 * 1000;
  const FETCH_TIMEOUT  = 15000;
  const AUTO_REFRESH_S = 600;
  const MAX_DESC_CHARS = 350;

  const cache = {};
  let requestId = 0;
  let debounceTimer = null;
  let countdownInterval = null;
  let secondsLeft = AUTO_REFRESH_S;

  // DOM refs
  const output      = document.getElementById('rss-output');
  const dropdown    = document.getElementById('feed-dropdown');
  const refreshBtn  = document.getElementById('refresh-btn');
  const itemCount   = document.getElementById('item-count');
  const nextRefresh = document.getElementById('next-refresh');

  // ══════════════════════════════════════
  //  XHR FETCH (no AbortSignal — works in sandboxed iframes)
  // ══════════════════════════════════════
  function xhrFetch(url, timeoutMs) {
    return new Promise((resolve, reject) => {
      const xhr = new XMLHttpRequest();
      let timedOut = false;
      const timer = setTimeout(() => {
        timedOut = true;
        xhr.abort();
        reject(new Error('TIMEOUT'));
      }, timeoutMs);

      xhr.open('GET', url, true);
      xhr.onload = () => {
        clearTimeout(timer);
        if (timedOut) return;
        if (xhr.status >= 200 && xhr.status < 300) {
          resolve(xhr.responseText);
        } else {
          reject(new Error('HTTP ' + xhr.status));
        }
      };
      xhr.onerror = () => { clearTimeout(timer); reject(new Error('Network error')); };
      xhr.onabort = () => { clearTimeout(timer); if (!timedOut) reject(new Error('Aborted')); };
      xhr.send();
    });
  }

  // ══════════════════════════════════════
  //  HELPERS
  // ══════════════════════════════════════
  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
              .replace(/"/g,'&quot;').replace(/'/g,'&#039;');
  }

  function safeUrl(url) {
    try {
      const p = new URL(url);
      return (p.protocol === 'http:' || p.protocol === 'https:') ? url : '#';
    } catch { return '#'; }
  }

  function timeSince(dateString) {
    if (!dateString) return 'Unknown time';
    const date = new Date(dateString);
    if (isNaN(date.getTime())) return 'Unknown time';
    const seconds = Math.floor((Date.now() - date) / 1000);
    if (seconds < 60)   return 'Just now';
    const mins  = Math.floor(seconds / 60);
    const hours = Math.floor(seconds / 3600);
    const days  = Math.floor(seconds / 86400);
    if (days  > 1)   return days + ' days ago';
    if (days === 1)  return '1 day ago';
    if (hours > 1)   return hours + ' hours ago';
    if (hours === 1) return '1 hour ago';
    if (mins  > 1)   return mins + ' mins ago';
    return '1 min ago';
  }

  function stripHtml(html) {
    if (!html) return '';
    return html.replace(/<[^>]*>?/gm,'')
               .replace(/&nbsp;/g,' ').replace(/&amp;/g,'&')
               .replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&quot;/g,'"').trim();
  }

  // ══════════════════════════════════════
  //  RSS PROXIES
  // ══════════════════════════════════════
  function urlRss2json(feedUrl) {
    return 'https://api.rss2json.com/v1/api.json?rss_url=' + encodeURIComponent(feedUrl);
  }
  function urlAllOrigins(feedUrl) {
    return 'https://api.allorigins.win/get?url=' + encodeURIComponent(feedUrl);
  }

  // XML parser (used by allorigins fallback)
  function parseXML(xmlString) {
    const parser = new DOMParser();
    const xml = parser.parseFromString(xmlString, 'text/xml');
    if (xml.querySelector('parsererror')) throw new Error('XML parse error');
    const nodes = Array.from(xml.querySelectorAll('item, entry'));
    if (!nodes.length) throw new Error('No items in feed');
    return nodes.map(function(node) {
      const linkEl  = node.querySelector('link');
      const link    = linkEl ? (linkEl.getAttribute('href') || linkEl.textContent || '') : '';
      const pubDate = (node.querySelector('pubDate') || node.querySelector('published') || node.querySelector('updated') || {}).textContent || '';
      const description = (node.querySelector('description') || node.querySelector('summary') || node.querySelector('content') || {}).textContent || '';
      return {
        title:       (node.querySelector('title') || {}).textContent || 'Untitled',
        link:        link.trim(),
        description: description,
        pubDate:     pubDate.trim()
      };
    });
  }

  async function fetchViaRss2json(feedUrl) {
    const text = await xhrFetch(urlRss2json(feedUrl), FETCH_TIMEOUT);
    const data = JSON.parse(text);
    if (data.status !== 'ok') throw new Error(data.message || 'rss2json error');
    if (!Array.isArray(data.items) || !data.items.length) throw new Error('Empty feed');
    return data.items;
  }

  async function fetchViaAllOrigins(feedUrl) {
    const text = await xhrFetch(urlAllOrigins(feedUrl), FETCH_TIMEOUT);
    const data = JSON.parse(text);
    if (!data.contents) throw new Error('allorigins returned no content');
    return parseXML(data.contents);
  }

  async function fetchFeed(feedUrl) {
    try {
      return await fetchViaRss2json(feedUrl);
    } catch(e1) {
      console.warn('rss2json failed (' + e1.message + '), trying allorigins…');
      output.innerHTML = "<div class='system-msg'>📡 Retrying via backup proxy…</div>";
      try {
        return await fetchViaAllOrigins(feedUrl);
      } catch(e2) {
        throw new Error('Both proxies failed. [1] ' + e1.message + '  [2] ' + e2.message);
      }
    }
  }

  // ══════════════════════════════════════
  //  COUNTDOWN
  // ══════════════════════════════════════
  function startCountdown() {
    clearInterval(countdownInterval);
    secondsLeft = AUTO_REFRESH_S;
    countdownInterval = setInterval(function() {
      secondsLeft--;
      const m = Math.floor(secondsLeft / 60);
      const s = secondsLeft % 60;
      nextRefresh.textContent = 'Auto-refresh in ' + m + ':' + String(s).padStart(2,'0');
      if (secondsLeft <= 0) { clearInterval(countdownInterval); loadFeed(true); }
    }, 1000);
  }

  // ══════════════════════════════════════
  //  FEED LOADER
  // ══════════════════════════════════════
  function loadFeed(forceRefresh) {
    forceRefresh = forceRefresh || false;
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(async function() {
      const feedUrl    = dropdown.value;
      const feedName   = dropdown.options[dropdown.selectedIndex].text;
      const cacheEntry = cache[feedUrl];
      const cacheValid = cacheEntry && (Date.now() - cacheEntry.timestamp < CACHE_TTL_MS);
      const thisId     = ++requestId;

      if (!forceRefresh && cacheValid) {
        renderItems(cacheEntry.items, cacheEntry.feedName, true);
        startCountdown();
        return;
      }

      output.innerHTML = "<div class='system-msg'>📡 Fetching data stream…</div>";
      itemCount.textContent = '';
      refreshBtn.disabled = true;

      try {
        const items = await fetchFeed(feedUrl);
        if (thisId !== requestId) return;
        if (!items.length) {
          output.innerHTML = "<div class='system-msg'>📭 No articles found in this feed.</div>";
          itemCount.textContent = '0 articles';
          return;
        }
        cache[feedUrl] = { timestamp: Date.now(), items: items, feedName: feedName };
        renderItems(items, feedName, false);
        startCountdown();
      } catch(err) {
        if (thisId !== requestId) return;
        console.error('Feed error:', err.message);
        output.innerHTML = "<div class='system-msg error'>❌ Feed unavailable.<br><small style='font-size:10px;opacity:.7;line-height:2'>" + escapeHtml(err.message) + "</small><br><small style='font-size:10px;opacity:.5'>Try another section or refresh in a moment.</small></div>";
        itemCount.textContent = '';
      } finally {
        if (thisId === requestId) refreshBtn.disabled = false;
      }
    }, 200);
  }

  // ══════════════════════════════════════
  //  RENDER FEED ITEMS
  // ══════════════════════════════════════
  function renderItems(items, feedName, fromCache) {
    const cacheBadge = fromCache
      ? '<span class="cached-badge" title="Served from local cache">Cached</span>' : '';

    const fragments = items.map(function(item, i) {
      let desc = stripHtml(item.description);
      if (desc.length > MAX_DESC_CHARS) desc = desc.substring(0, MAX_DESC_CHARS) + '…';

      const rawLink   = safeUrl(item.link || '');
      const safeTitle = escapeHtml(item.title || 'Untitled');
      const safeDesc  = escapeHtml(desc);
      const timeAgo   = timeSince(item.pubDate);
      // escapeHtml the URL for use inside a data attribute
      const attrUrl   = escapeHtml(rawLink);
      const attrDate  = escapeHtml(item.pubDate || '');
      const attrFeed  = escapeHtml(feedName);

      return '<div class="feed-item" style="animation-delay:' + (i * 40) + 'ms">' +
        '<span class="headline reader-trigger" data-url="' + attrUrl + '" data-title="' + safeTitle + '" data-feed="' + attrFeed + '" data-date="' + attrDate + '">' + safeTitle + '</span>' +
        (safeDesc ? '<p class="description">' + safeDesc + '</p>' : '') +
        '<div class="meta">' + timeAgo + ' &mdash; ' + attrFeed + (i === 0 ? cacheBadge : '') + '</div>' +
        '</div>';
    });

    output.innerHTML = fragments.join('');
    itemCount.textContent = items.length + ' articles';
  }

  // ══════════════════════════════════════
  //  READER MODE
  // ══════════════════════════════════════
  const readerPanel    = document.getElementById('reader-panel');
  const readerBackdrop = document.getElementById('reader-backdrop');
  const readerContent  = document.getElementById('reader-content');
  const readerScroll   = document.getElementById('reader-scroll');
  const readerUrlLabel = document.getElementById('reader-url-label');
  const readerExtLink  = document.getElementById('reader-ext-link');
  const readerProgress = document.getElementById('reader-progress');

  let readerFontSize = 17;

  function openReader(url, title, feedName, pubDate) {
    readerPanel.classList.add('open');
    readerBackdrop.classList.add('open');
    document.body.style.overflow = 'hidden';
    try { readerUrlLabel.textContent = new URL(url).hostname; } catch(e) { readerUrlLabel.textContent = url; }
    readerExtLink.href    = url;
    readerScroll.scrollTop = 0;
    readerProgress.style.width = '0%';
    readerContent.innerHTML = '<div class="reader-status">📰 Loading article…</div>';
    fetchArticle(url, title, feedName, pubDate);
  }

  function closeReader() {
    readerPanel.classList.remove('open');
    readerBackdrop.classList.remove('open');
    document.body.style.overflow = '';
  }

  document.getElementById('reader-back').addEventListener('click', closeReader);
  readerBackdrop.addEventListener('click', closeReader);
  document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeReader(); });

  document.getElementById('font-up').addEventListener('click', function() {
    readerFontSize = Math.min(24, readerFontSize + 1);
    document.documentElement.style.setProperty('--reader-font-size', readerFontSize + 'px');
  });
  document.getElementById('font-down').addEventListener('click', function() {
    readerFontSize = Math.max(13, readerFontSize - 1);
    document.documentElement.style.setProperty('--reader-font-size', readerFontSize + 'px');
  });

  readerScroll.addEventListener('scroll', function() {
    const pct = readerScroll.scrollTop / (readerScroll.scrollHeight - readerScroll.clientHeight) * 100;
    readerProgress.style.width = Math.min(100, pct || 0) + '%';
  });

  // Content selectors in priority order
  const CONTENT_SELECTORS = [
    '[itemprop="articleBody"]',
    '[class*="article-body"]',
    '[class*="article-content"]',
    '[class*="articleBody"]',
    '[class*="story-body"]',
    '[class*="story-content"]',
    '[class*="post-content"]',
    '[class*="entry-content"]',
    '[class*="main-content"]',
    '[class*="content-body"]',
    '[class*="article__body"]',
    'article',
    'main'
  ];

  const STRIP_SELECTORS = 'script,style,noscript,iframe,nav,header,footer,aside,form,button,svg,canvas,video,audio,[class*="ad"],[class*="advertisement"],[class*="social"],[class*="share"],[class*="related"],[class*="recommended"],[class*="newsletter"],[class*="subscribe"],[class*="comments"],[class*="sidebar"],[class*="widget"],[class*="popup"],[class*="cookie"],[class*="banner"],[class*="promo"]';

  async function fetchArticle(url, title, feedName, pubDate) {
    readerProgress.style.width = '15%';
    try {
      const proxyUrl = 'https://api.allorigins.win/get?url=' + encodeURIComponent(url);
      const text = await xhrFetch(proxyUrl, 18000);
      readerProgress.style.width = '50%';

      const data = JSON.parse(text);
      if (!data.contents) throw new Error('No content returned');

      const parser = new DOMParser();
      const doc    = parser.parseFromString(data.contents, 'text/html');

      // Fix relative URLs
      rebaseUrls(doc, url);

      // Strip junk
      try { doc.querySelectorAll(STRIP_SELECTORS).forEach(function(el){ el.remove(); }); } catch(e) {}

      // Find best content block
      let bodyEl = null;
      for (let i = 0; i < CONTENT_SELECTORS.length; i++) {
        try {
          const found = doc.querySelector(CONTENT_SELECTORS[i]);
          if (found && found.textContent.trim().length > 200) { bodyEl = found; break; }
        } catch(e) {}
      }

      // Fallback: collect all long <p> tags
      if (!bodyEl) {
        const allP = Array.from(doc.querySelectorAll('body p'))
                         .filter(function(p){ return p.textContent.trim().length > 40; });
        if (allP.length > 2) {
          bodyEl = doc.createElement('div');
          allP.forEach(function(p){ bodyEl.appendChild(p.cloneNode(true)); });
        }
      }

      if (!bodyEl || bodyEl.textContent.trim().length < 100) throw new Error('PAYWALL');

      readerProgress.style.width = '80%';
      const cleanHtml = sanitizeHtml(bodyEl.innerHTML);

      readerContent.innerHTML =
        '<h1 class="reader-article-title">' + escapeHtml(title) + '</h1>' +
        '<div class="reader-article-meta">' +
          (pubDate ? timeSince(pubDate) + ' &nbsp;·&nbsp; ' : '') + escapeHtml(feedName) +
        '</div>' +
        '<div class="reader-body">' + cleanHtml + '</div>';

      readerProgress.style.width = '100%';
      setTimeout(function(){ readerProgress.style.width = '0%'; }, 800);

    } catch(err) {
      readerProgress.style.width = '100%';
      setTimeout(function(){ readerProgress.style.width = '0%'; }, 600);

      let msg, hint;
      if (err.message === 'PAYWALL') {
        msg  = '🔒 Article behind paywall or login wall';
        hint = 'Open the original to read the full article.';
      } else if (err.message === 'TIMEOUT') {
        msg  = '⏱ Article took too long to load';
        hint = 'The site may be slow. Try the original link.';
      } else {
        msg  = '❌ Could not load article';
        hint = escapeHtml(err.message);
      }

      readerContent.innerHTML =
        '<div class="reader-status error">' + msg + '<br>' +
        '<small style="font-size:11px;opacity:.7;line-height:2.5">' + hint + '</small><br><br>' +
        '<a href="' + escapeHtml(url) + '" target="_blank" rel="noopener noreferrer" ' +
        'style="font-size:13px;color:var(--accent)">↗ Open original article</a></div>';
    }
  }

  function rebaseUrls(doc, baseUrl) {
    try {
      const base   = new URL(baseUrl);
      const origin = base.origin;
      doc.querySelectorAll('img[src]').forEach(function(el) {
        const src = el.getAttribute('src');
        if (src && !src.startsWith('http') && !src.startsWith('data:'))
          el.setAttribute('src', src.startsWith('/') ? origin + src : base.href.replace(/\/[^\/]*$/,'/') + src);
      });
      doc.querySelectorAll('a[href]').forEach(function(el) {
        const href = el.getAttribute('href');
        if (href && !href.startsWith('http') && !href.startsWith('#') && !href.startsWith('javascript'))
          el.setAttribute('href', href.startsWith('/') ? origin + href : base.href.replace(/\/[^\/]*$/,'/') + href);
      });
    } catch(e) {}
  }

  const ALLOWED_TAGS = new Set(['p','br','strong','b','em','i','u','h1','h2','h3','h4',
    'ul','ol','li','blockquote','figure','figcaption','img','a','span','div','section']);
  const ALLOWED_ATTRS = { img: ['src','alt','width','height'], a: ['href','target','rel'] };

  function sanitizeHtml(html) {
    const div = document.createElement('div');
    div.innerHTML = html;
    sanitizeNode(div);
    return div.innerHTML;
  }

  function sanitizeNode(node) {
    const children = Array.from(node.childNodes);
    for (let i = 0; i < children.length; i++) {
      const child = children[i];
      if (child.nodeType !== 1) continue; // skip text/comment nodes
      const tag = child.tagName.toLowerCase();
      if (!ALLOWED_TAGS.has(tag)) {
        while (child.firstChild) node.insertBefore(child.firstChild, child);
        node.removeChild(child);
        continue;
      }
      const allowed = ALLOWED_ATTRS[tag] || [];
      Array.from(child.attributes).forEach(function(attr) {
        if (!allowed.includes(attr.name)) child.removeAttribute(attr.name);
      });
      if (tag === 'a') { child.setAttribute('target','_blank'); child.setAttribute('rel','noopener noreferrer'); }
      sanitizeNode(child);
    }
  }

  // ══════════════════════════════════════
  //  INIT
  // ══════════════════════════════════════
  window.addEventListener('load', function() {
    document.getElementById('header-date').textContent = new Date().toLocaleDateString('en-IN', {
      weekday: 'long', day: 'numeric', month: 'long'
    });

    dropdown.addEventListener('change', function(){ loadFeed(false); });

    refreshBtn.addEventListener('click', function() {
      delete cache[dropdown.value];
      loadFeed(true);
    });

    // Click delegation — open reader on headline click
    output.addEventListener('click', function(e) {
      const trigger = e.target.closest('.reader-trigger');
      if (!trigger) return;
      const url = trigger.getAttribute('data-url');
      if (!url || url === '#') return;
      const title    = trigger.getAttribute('data-title')    || 'Article';
      const feedName = trigger.getAttribute('data-feed')     || '';
      const pubDate  = trigger.getAttribute('data-date')     || '';
      openReader(url, title, feedName, pubDate);
    });

    loadFeed();
  });
</script>


<!-- ══ READER BACKDROP ══ -->
<div id="reader-backdrop"></div>

<!-- ══ READER PANEL ══ -->
<div id="reader-panel" role="dialog" aria-modal="true" aria-label="Article reader">
  <div id="reader-progress"></div>

  <!-- Top bar -->
  <div class="reader-topbar">
    <button class="reader-back-btn" id="reader-back">← Back</button>
    <span class="reader-source-url" id="reader-url-label"></span>
    <div class="reader-font-ctrl">
      <button id="font-down" title="Smaller text" aria-label="Decrease font size">A−</button>
      <button id="font-up"   title="Larger text"  aria-label="Increase font size">A+</button>
    </div>
    <a class="reader-open-btn" id="reader-ext-link" href="#" target="_blank" rel="noopener noreferrer">↗ Original</a>
  </div>

  <!-- Scrollable article content -->
  <div class="reader-scroll" id="reader-scroll">
    <div class="reader-status" id="reader-content">
      Loading article…
    </div>
  </div>
</div>

</body>
</html>
