<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gemini Pulse</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root { 
    --ink: #1a1a18; 
    --paper: #f5f0e8; 
    --accent: #1a5c3a; 
    --rule: #c8c0b0; 
    --muted: #7a7468; 
  }
  
  * { box-sizing: border-box; margin: 0; padding: 0; }
  
  body { 
    background: var(--paper); 
    color: var(--ink); 
    font-family: 'IBM Plex Sans', sans-serif; 
    min-height: 100vh; 
    line-height: 1.6; 
  }
  
  /* Top Right Settings Wheel */
  .settings-wheel {
    position: absolute;
    top: 20px;
    right: 25px;
    font-size: 18px;
    cursor: pointer;
    color: var(--muted);
    transition: transform 0.4s ease, color 0.2s ease;
    z-index: 100;
  }

  .settings-wheel:hover {
    transform: rotate(90deg);
    color: var(--ink);
  }

  .masthead { 
    border-bottom: 3px double var(--ink); 
    padding: 30px 20px; 
    text-align: center; 
    background: var(--paper); 
    position: relative;
  }
  
  .masthead-title { 
    font-family: 'Playfair Display', serif; 
    font-size: clamp(32px, 5vw, 56px); 
    font-weight: 700; 
  }
  
  .tagline { 
    font-family: 'IBM Plex Mono', monospace; 
    font-size: 10px; 
    letter-spacing: 0.2em; 
    text-transform: uppercase; 
    color: var(--muted); 
    margin-top: 8px; 
  }
  
  .container { 
    max-width: 800px; 
    margin: 0 auto; 
    padding: 30px 20px 80px; 
  }
  
  .feed-item {
    margin-bottom: 20px;
    border-bottom: 1px dashed var(--rule);
    padding-bottom: 15px;
  }

  .feed-item:last-child {
    border-bottom: none;
  }

  .headline {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    color: var(--accent);
    text-decoration: none;
    font-weight: 700;
    display: inline; /* Forces it to sit on the same line as the source */
    line-height: 1.4;
  }

  .headline:hover {
    text-decoration: underline;
  }

  .source {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px; /* Smallest legible font */
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    display: inline-block; /* Sits next to the headline */
    margin-left: 12px;
    vertical-align: middle;
  }

  .system-msg {
    font-family: 'IBM Plex Mono', monospace; 
    font-size: 12px; 
    color: var(--muted); 
    text-align: center;
    margin-top: 40px;
  }
</style>
</head>
<body>

<div class="settings-wheel" onclick="changeFeed()" title="Change RSS Feed">⚙️</div>

<div class="masthead">
    <div class="tagline" id="header-date">Financial Intelligence Terminal</div>
    <div class="masthead-title">Gemini Pulse</div>
    <div class="tagline">Live Feed</div>
</div>

<div class="container">
  <div id="rss-output">
      <div class="system-msg">Initializing secure terminal...</div>
  </div>
</div>

<script>
    // Default Feed
    let currentFeedUrl = "https://www.thehindubusinessline.com/feeder/default.rss";

    window.onload = () => {
        document.getElementById('header-date').textContent = new Date().toLocaleDateString('en-IN', { 
            weekday: 'long', day: 'numeric', month: 'long' 
        });
        loadFeed(); 
    };

    function changeFeed() {
        // Simple native browser prompt to keep UI clean
        const newUrl = prompt("Enter new RSS Feed URL:", currentFeedUrl);
        if (newUrl && newUrl.trim() !== "") {
            currentFeedUrl = newUrl.trim();
            loadFeed();
        }
    }

    function loadFeed() {
        const outputContainer = document.getElementById("rss-output");
        outputContainer.innerHTML = "<div class='system-msg'>📡 Fetching data stream...</div>";

        const apiUrl = 'https://api.rss2json.com/v1/api.json?rss_url=' + encodeURIComponent(currentFeedUrl);

        fetch(apiUrl)
            .then(response => response.json())
            .then(data => {
                if (data.status !== 'ok') {
                    throw new Error("Failed to fetch the feed.");
                }

                const feedTitle = data.feed.title || "External Link";
                let htmlOutput = "";

                data.items.forEach(item => {
                    htmlOutput += `
                        <div class="feed-item">
                            <a href="${item.link}" class="headline" target="_blank" rel="noopener">${item.title}</a>
                            <span class="source">&mdash; ${feedTitle}</span>
                        </div>
                    `;
                });

                outputContainer.innerHTML = htmlOutput;
            })
            .catch(err => {
                console.error("Terminal Error:", err);
                outputContainer.innerHTML = "<div class='system-msg' style='color:#d93025'>❌ Connection lost or invalid feed.</div>";
            });
    }
</script>
</body>
</html>
