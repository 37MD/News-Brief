<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self';
                 script-src  'unsafe-inline' https://cdnjs.cloudflare.com https://cdn.jsdelivr.net;
                 style-src   'unsafe-inline' https://fonts.googleapis.com;
                 font-src    https://fonts.gstatic.com;
                 img-src     * data:;
                 connect-src *;">
  <title>PDF Assistant</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>

  <style>
    /* ════════════════════════════════════════════════════════════════════
       CSS §1 — DESIGN TOKENS (MAINTAINED FROM Pulse_v26D)
    ════════════════════════════════════════════════════════════════════ */
    :root {
      --ink:            #1a1a18;
      --paper:          #f5f0e8;
      --accent:         #1a5c3a;
      --rule:           #c8c0b0;
      --muted:          #5a554c;
      --meta-color:     #8c867a;
      --error:          #c0392b;
      --success:        #2e7d52;
      --reader-font-sz: 17px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background:  var(--paper);
      color:       var(--ink);
      font-family: 'IBM Plex Sans', sans-serif;
      min-height:  100vh;
      line-height: 1.6;
    }

    /* ════════════════════════════════════════════════════════════════════
       CSS §2 — CONTROLS & MASTHEAD
    ════════════════════════════════════════════════════════════════════ */
    .controls-bar {
      position:    absolute;
      top:         16px;
      right:       20px;
      z-index:     100;
      display:     flex;
      align-items: center;
      gap:         10px;
    }
    .btn-outline {
      font-family:    'IBM Plex Mono', monospace;
      font-size:      14px;
      background:     transparent;
      color:          var(--accent);
      border:         1px solid var(--accent);
      padding:        5px 12px;
      border-radius:  4px;
      cursor:         pointer;
      font-weight:    500;
      text-transform: uppercase;
      transition:     0.2s;
    }
    .btn-outline:hover { background: var(--accent); color: var(--paper); }
    #pdf-toast {
      position:      fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-60px);
      background:    #d4edda; color: #155724; border: 1px solid #c3e6cb;
      padding:       10px 22px; border-radius: 6px; font-family: 'IBM Plex Mono', monospace;
      font-size:     12px; z-index: 9999; transition: 0.35s ease; opacity: 0;
    }
    #pdf-toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

    .masthead {
      border-bottom: 3px double var(--ink);
      padding:       40px 20px;
      text-align:    center;
      background:    var(--paper);
    }
    .masthead-title { font-family: 'Playfair Display', serif; font-size: clamp(32px, 5vw, 56px); font-weight: 700; }
    .tagline { font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--meta-color); margin-top: 8px; }

    /* ════════════════════════════════════════════════════════════════════
       CSS §3 — FEED & CARDS
    ════════════════════════════════════════════════════════════════════ */
    .container { max-width: 800px; margin: 0 auto; padding: 20px 20px 80px; }
    .feed-item {
      margin-bottom: 35px; border-bottom: 1px solid var(--rule);
      padding-bottom: 25px; animation: fadeIn 0.3s ease forwards;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
    .headline { font-family: 'Playfair Display', serif; font-size: 22px; color: var(--ink); font-weight: 700; cursor: pointer; line-height: 1.3; margin-bottom: 10px; }
    .headline:hover { color: var(--accent); text-decoration: underline; }
    .description { font-size: 15px; color: var(--muted); margin-bottom: 12px; line-height: 1.6; }
    .meta { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--meta-color); text-transform: uppercase; }

    /* ════════════════════════════════════════════════════════════════════
       CSS §4 — READER & AI PANEL
    ════════════════════════════════════════════════════════════════════ */
    #reader-backdrop { display: none; position: fixed; inset: 0; background: rgba(26,26,24,0.45); z-index: 998; backdrop-filter: blur(2px); }
    #reader-backdrop.open { display: block; }
    #reader-panel {
      position: fixed; top: 0; right: 0; bottom: 0; width: 100%; max-width: 780px;
      background: var(--paper); z-index: 999; display: flex; flex-direction: column;
      transform: translateX(100%); transition: transform 0.35s cubic-bezier(.4,0,.2,1);
      box-shadow: -4px 0 40px rgba(0,0,0,0.18);
    }
    #reader-panel.open { transform: translateX(0); }
    .reader-topbar { display: flex; align-items: center; gap: 10px; padding: 14px 20px; border-bottom: 1px solid var(--rule); }
    .reader-scroll { overflow-y: auto; flex: 1; padding: 36px 40px 60px; }
    .reader-body { font-size: var(--reader-font-sz); line-height: 1.85; color: var(--ink); white-space: pre-wrap; }

    #ai-panel {
      position: absolute; top: 65px; right: 20px; width: 360px; max-width: calc(100vw - 40px);
      background: #ffffff; border: 1px solid var(--rule); border-radius: 12px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.15); display: flex; flex-direction: column;
      opacity: 0; pointer-events: none; transform: translateY(-15px);
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1); max-height: 65vh; z-index: 1005;
    }
    #ai-panel.open { opacity: 1; pointer-events: auto; transform: translateY(0); }
    .ai-header { padding: 12px 16px; background: var(--paper); border-bottom: 1px solid var(--rule); border-radius: 12px 12px 0 0; font-family: 'IBM Plex Mono', monospace; font-size: 11px; font-weight: bold; color: var(--accent); display: flex; justify-content: space-between; }
    .ai-chat-area { padding: 16px; overflow-y: auto; flex: 1; font-size: 14px; line-height: 1.6; }
    .ai-message { margin-bottom: 16px; padding: 12px 16px; border-radius: 8px; background: var(--paper); }
    .ai-message.user { background: rgba(26, 92, 58, 0.08); border-left: 3px solid var(--accent); align-self: flex-end; }
    .ai-input-area { display: flex; padding: 12px 16px; border-top: 1px solid var(--rule); background: #fff; border-radius: 0 0 12px 12px; }
    .ai-input-area input { flex: 1; border: 1px solid var(--rule); border-radius: 4px; padding: 10px; font-size: 14px; outline: none; }
    .ai-input-area button { background: var(--accent); color: var(--paper); border: none; border-radius: 4px; padding: 0 16px; margin-left: 8px; cursor: pointer; }

    .loader-overlay { position: fixed; inset: 0; background: rgba(245, 240, 232, 0.95); z-index: 10000; display: none; align-items: center; justify-content: center; flex-direction: column; font-family: 'IBM Plex Mono', monospace; }
  </style>
</head>
<body>

  <div id="pdf-toast">✅ Analysis Complete</div>

  <div class="loader-overlay" id="loader">
    <div style="font-size: 40px; margin-bottom: 20px;">⚙️</div>
    <div id="loader-text">Auditing Document...</div>
  </div>

  <div class="controls-bar">
    <button class="btn-outline" onclick="document.getElementById('file-input').click()">📖 Upload PDF/EPUB</button>
    <input type="file" id="file-input" accept=".pdf,.epub" style="display:none;">
    <button class="btn-outline" id="set-key-btn">🔑 Key</button>
  </div>

  <header class="masthead">
    <div class="tagline">Financial Intelligence Terminal</div>
    <h1 class="masthead-title">PDF Assistant</h1>
    <div class="tagline" id="header-date">Article & Chapter Auditor</div>
  </header>

  <div class="container" id="feed-output">
    <div style="text-align: center; color: var(--meta-color); margin-top: 100px; font-family: 'IBM Plex Mono', monospace;">NO DOCUMENT LOADED. UPLOAD A FILE TO BEGIN.</div>
  </div>

  <div id="reader-backdrop"></div>
  <div id="reader-panel">
    <div class="reader-topbar">
      <button class="btn-outline" onclick="closeReader()">← Back</button>
      <div style="flex:1"></div>
      <button class="btn-outline" id="ai-toggle">✨ Ask Gemini</button>
    </div>
    <div class="reader-scroll">
      <h1 class="reader-article-title" id="r-title" style="font-family: 'Playfair Display', serif; font-size: 32px; margin-bottom: 20px;"></h1>
      <div class="reader-body" id="r-body"></div>
    </div>

    <div id="ai-panel">
      <div class="ai-header">
        <span>GEMINI AUDITOR</span>
        <button onclick="closeAi()" style="background:transparent; border:none; cursor:pointer;">×</button>
      </div>
      <div class="ai-chat-area" id="ai-chat">
        <div class="ai-message">Ask anything about this specific article or the broader market.</div>
      </div>
      <div class="ai-input-area">
        <input type="text" id="ai-input" placeholder="Query Gemini...">
        <button id="ai-send">Ask</button>
      </div>
    </div>
  </div>

  <script>
    'use strict';
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    const STATE = {
        apiKey: localStorage.getItem('gemini_api_key') || '',
        items: [],
        activeIdx: -1,
        model: 'gemini-2.0-flash'
    };

    const DOM = {
        feed: document.getElementById('feed-output'),
        loader: document.getElementById('loader'),
        lText: document.getElementById('loader-text'),
        rTitle: document.getElementById('r-title'),
        rBody: document.getElementById('r-body'),
        aiChat: document.getElementById('ai-chat'),
        aiInput: document.getElementById('ai-input')
    };

    // --- KEY MANAGEMENT ---
    document.getElementById('set-key-btn').onclick = () => {
        const k = prompt("Enter Gemini API Key:", STATE.apiKey);
        if (k) { STATE.apiKey = k; localStorage.setItem('gemini_api_key', k); }
    };

    // --- UPLOAD & PROCESSING ---
    document.getElementById('file-input').onchange = async (e) => {
        const file = e.target.files[0];
        if (!file || !STATE.apiKey) return;

        DOM.loader.style.display = 'flex';
        STATE.items = []; // Delete old PDF data
        DOM.feed.innerHTML = '';

        try {
            let fullText = "";
            if (file.name.endsWith('.pdf')) fullText = await extractPdf(file);
            else fullText = await extractEpub(file);

            DOM.lText.textContent = "Splitting into Articles/Chapters...";
            const segments = await segmentDocument(fullText);

            for (let i = 0; i < segments.length; i++) {
                DOM.lText.textContent = `Summarizing ${i+1} of ${segments.length}...`;
                const summary = await callGemini(`Summarize the following text in exactly 500 characters or less. Focus on technical/financial facts:\n\n${segments[i].content.slice(0, 4000)}`);
                
                const item = { ...segments[i], summary, history: [] };
                STATE.items.push(item);
                renderCard(item, i);
            }
            showToast();
        } catch (err) { alert("Error: " + err.message); }
        DOM.loader.style.display = 'none';
    };

    async function extractPdf(file) {
        const doc = await pdfjsLib.getDocument({ data: await file.arrayBuffer() }).promise;
        let t = "";
        for (let i = 1; i <= doc.numPages; i++) {
            const page = await doc.getPage(i);
            const content = await page.getTextContent();
            t += content.items.map(it => it.str).join(" ") + "\n";
        }
        return t;
    }

    async function extractEpub(file) {
        const zip = await JSZip.loadAsync(file);
        let t = "";
        for (const f in zip.files) {
            if (f.match(/\.(html|xhtml)$/)) {
                const h = await zip.files[f].async("string");
                t += new DOMParser().parseFromString(h, "text/html").body.innerText + "\n\n";
            }
        }
        return t;
    }

    async function segmentDocument(text) {
        // Logic to detect Chapters or Editorials without "eating" them
        const prompt = `Break the following text into distinct sections (Articles, Editorials, or Chapters). 
        Return ONLY a JSON array of objects with "title" and "content". 
        Do not truncate the content. Text:\n\n${text.slice(0, 50000)}`;
        
        const raw = await callGemini(prompt);
        try {
            const jsonStr = raw.replace(/```json|```/g, '').trim();
            return JSON.parse(jsonStr);
        } catch (e) {
            // Fallback split if AI JSON fails
            return [{ title: "Document Analysis", content: text }];
        }
    }

    // --- GEMINI API (EXACT PULSE_V26D SETTINGS) ---
    async function callGemini(userPrompt, history = []) {
        const endpoint = `https://generativelanguage.googleapis.com/v1beta/models/${STATE.model}:generateContent?key=${STATE.apiKey}`;
        
        const systemMsg = "You are a professional Financial Auditor and Technical Market Analyst. Use concepts like 'Positive/Negative Consolidation'. No hedging; provide deep technical evidence.";
        
        const payload = {
            contents: [
                { role: "user", parts: [{ text: systemMsg }] },
                ...history,
                { role: "user", parts: [{ text: userPrompt }] }
            ]
        };

        const res = await fetch(endpoint, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });
        const data = await res.json();
        return data.candidates[0].content.parts[0].text;
    }

    // --- UI ENGINE ---
    function renderCard(item, idx) {
        const div = document.createElement('div');
        div.className = 'feed-item';
        div.innerHTML = `
            <div class="headline" onclick="openItem(${idx})">${item.title}</div>
            <p class="description">${item.summary}</p>
            <div class="meta">VERIFIED AUDIT • FULL TEXT READY</div>
        `;
        DOM.feed.appendChild(div);
    }

    window.openItem = (idx) => {
        STATE.activeIdx = idx;
        const it = STATE.items[idx];
        DOM.rTitle.textContent = it.title;
        DOM.rBody.textContent = it.content; // Full verbatim text
        document.getElementById('reader-panel').classList.add('open');
        document.getElementById('reader-backdrop').classList.add('open');
        DOM.aiChat.innerHTML = '<div class="ai-message">Auditor ready. How can I help analyze this section?</div>';
    };

    window.closeReader = () => {
        document.getElementById('reader-panel').classList.remove('open');
        document.getElementById('reader-backdrop').classList.remove('open');
        closeAi();
    };

    window.closeAi = () => document.getElementById('ai-panel').classList.remove('open');
    document.getElementById('ai-toggle').onclick = () => document.getElementById('ai-panel').classList.toggle('open');

    document.getElementById('ai-send').onclick = async () => {
        const q = DOM.aiInput.value.trim();
        if (!q) return;

        const it = STATE.items[STATE.activeIdx];
        addMsg('user', q);
        DOM.aiInput.value = "";

        const contextPrompt = `Context from article:\n${it.content.slice(0, 25000)}\n\nQuestion: ${q}`;
        try {
            const ans = await callGemini(contextPrompt, it.history);
            it.history.push({ role: "user", parts: [{ text: q }] });
            it.history.push({ role: "model", parts: [{ text: ans }] });
            addMsg('bot', ans);
        } catch (e) { addMsg('bot', "Error: " + e.message); }
    };

    function addMsg(role, text) {
        const div = document.createElement('div');
        div.className = `ai-message ${role === 'user' ? 'user' : ''}`;
        div.textContent = text;
        DOM.aiChat.appendChild(div);
        DOM.aiChat.scrollTop = DOM.aiChat.scrollHeight;
    }

    function showToast() {
        const t = document.getElementById('pdf-toast');
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 3000);
    }

    document.getElementById('header-date').textContent = new Date().toLocaleDateString('en-IN', { weekday: 'long', day: 'numeric', month: 'long' });
  </script>
</body>
</html>
