<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self';
                 script-src  'unsafe-inline' https://cdnjs.cloudflare.com https://cdn.jsdelivr.net;
                 style-src   'unsafe-inline' https://fonts.googleapis.com;
                 font-src    https://fonts.gstatic.com;
                 img-src     * data:;
                 connect-src *;">
  <title>PDF Assistant</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>

  <style>
    /* ════════════════════════════════════════════════════════════════════
       CSS — PRESERVED FROM Pulse_v26D
    ════════════════════════════════════════════════════════════════════ */
    :root {
      --ink:            #1a1a18;
      --paper:          #f5f0e8;
      --accent:         #1a5c3a;
      --rule:           #c8c0b0;
      --muted:          #5a554c;
      --meta-color:     #8c867a;
      --error:          #c0392b;
      --success:        #2e7d52;
      --reader-font-sz: 17px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background:  var(--paper);
      color:       var(--ink);
      font-family: 'IBM Plex Sans', sans-serif;
      min-height:  100vh;
      line-height: 1.6;
    }

    .controls-bar {
      position: absolute;
      top: 16px;
      right: 20px;
      z-index: 100;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .btn-outline {
      font-family:    'IBM Plex Mono', monospace;
      font-size:      14px;
      background:     transparent;
      color:          var(--accent);
      border:         1px solid var(--accent);
      padding:        5px 12px;
      border-radius:  4px;
      cursor:         pointer;
      font-weight:    500;
      transition:     background 0.2s, color 0.2s;
      white-space:    nowrap;
    }
    .btn-outline:hover    { background: var(--accent); color: var(--paper); }
    #clear-key-btn       { color: var(--muted); border-color: var(--rule); }

    #pdf-toast {
      position:      fixed;
      top:           20px;
      left:          50%;
      transform:     translateX(-50%) translateY(-60px);
      background:    #d4edda;
      color:         #155724;
      border:        1px solid #c3e6cb;
      padding:       10px 22px;
      border-radius: 6px;
      font-family:   'IBM Plex Mono', monospace;
      font-size:     12px;
      font-weight:   500;
      z-index:       9999;
      transition:    transform 0.35s ease, opacity 0.35s ease;
      opacity:       0;
    }
    #pdf-toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

    .masthead {
      border-bottom: 3px double var(--ink);
      padding:       30px 20px;
      text-align:    center;
      background:    var(--paper);
    }
    .masthead-title { font-family: 'Playfair Display', serif; font-size: clamp(32px, 5vw, 56px); font-weight: 700; }
    .tagline { font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--meta-color); margin-top: 8px; }

    .container { max-width: 800px; margin: 0 auto; padding: 20px 20px 80px; }
    .feed-item {
      margin-bottom: 35px; border-bottom: 1px solid var(--rule);
      padding-bottom: 25px; animation: fadeIn 0.3s ease forwards;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
    
    .headline {
      font-family: 'Playfair Display', serif; font-size: 22px; color: var(--ink);
      font-weight: 700; cursor: pointer; line-height: 1.3; margin-bottom: 10px;
    }
    .headline:hover { color: var(--accent); text-decoration: underline; }
    .description { font-size: 15px; color: var(--muted); margin-bottom: 12px; line-height: 1.6; }
    .meta { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--meta-color); text-transform: uppercase; }

    /* Reader Panel */
    #reader-backdrop { display: none; position: fixed; inset: 0; background: rgba(26,26,24,0.45); z-index: 998; backdrop-filter: blur(2px); }
    #reader-backdrop.open { display: block; }
    #reader-panel {
      position: fixed; top: 0; right: 0; bottom: 0; width: 100%; max-width: 780px;
      background: var(--paper); z-index: 999; display: flex; flex-direction: column;
      transform: translateX(100%); transition: transform 0.35s cubic-bezier(.4,0,.2,1);
      box-shadow: -4px 0 40px rgba(0,0,0,0.18);
    }
    #reader-panel.open { transform: translateX(0); }
    .reader-topbar { display: flex; align-items: center; gap: 10px; padding: 14px 20px; border-bottom: 1px solid var(--rule); flex-shrink: 0; }
    .reader-scroll { overflow-y: auto; flex: 1; padding: 36px 40px 60px; }
    .reader-body { font-size: var(--reader-font-sz); line-height: 1.85; color: var(--ink); white-space: pre-wrap; }

    #ai-panel {
      position: absolute; top: 65px; right: 20px; width: 360px; max-width: calc(100vw - 40px);
      background: #fff; border: 1px solid var(--rule); border-radius: 12px;
      display: flex; flex-direction: column; opacity: 0; pointer-events: none;
      transform: translateY(-15px); transition: 0.3s ease; max-height: 65vh; z-index: 1005;
      box-shadow: 0 8px 30px rgba(0,0,0,0.15);
    }
    #ai-panel.open { opacity: 1; pointer-events: auto; transform: translateY(0); }
    .ai-header { padding: 12px 16px; background: var(--paper); border-bottom: 1px solid var(--rule); font-family: 'IBM Plex Mono', monospace; font-size: 11px; font-weight: bold; color: var(--accent); display: flex; justify-content: space-between; border-radius: 12px 12px 0 0; }
    .ai-chat-area { flex: 1; overflow-y: auto; padding: 16px; font-size: 14px; line-height: 1.6; }
    .ai-message { margin-bottom: 12px; padding: 10px; border-radius: 6px; background: var(--paper); }
    .ai-message.user { background: rgba(26, 92, 58, 0.08); border-left: 3px solid var(--accent); }
    .ai-input-area { display: flex; padding: 12px; border-top: 1px solid var(--rule); background: #fff; border-radius: 0 0 12px 12px; }
    .ai-input-area input { flex: 1; border: 1px solid var(--rule); padding: 8px; border-radius: 4px; outline: none; }
    .ai-input-area button { background: var(--accent); color: #fff; border: none; padding: 0 15px; margin-left: 8px; border-radius: 4px; cursor: pointer; }

    .loader { position: fixed; inset: 0; background: rgba(245, 240, 232, 0.95); z-index: 10000; display: none; align-items: center; justify-content: center; flex-direction: column; font-family: 'IBM Plex Mono', monospace; }
    .system-msg { text-align: center; color: var(--meta-color); margin-top: 100px; font-family: 'IBM Plex Mono', monospace; }
  </style>
</head>
<body>

  <div id="pdf-toast">✅ Analysis Complete</div>

  <div class="loader" id="loader">
    <div style="font-size: 30px; margin-bottom: 15px;">⚙️</div>
    <div id="loader-text">Auditing Document...</div>
  </div>

  <div class="controls-bar">
    <button class="btn-outline" onclick="document.getElementById('file-input').click()">📖 Upload PDF/EPUB</button>
    <input type="file" id="file-input" accept=".pdf,.epub" style="display:none;">
    <button class="btn-outline" id="key-btn">🔑 Key</button>
  </div>

  <header class="masthead">
    <div class="tagline" id="header-date">Financial Intelligence Terminal</div>
    <h1 class="masthead-title">PDF Assistant</h1>
    <div class="tagline">Automated Document Audit</div>
  </header>

  <div class="container" id="feed-output">
    <div class="system-msg">NO DOCUMENTS LOADED. UPLOAD A FILE TO BEGIN.</div>
  </div>

  <div id="reader-backdrop"></div>
  <div id="reader-panel">
    <div class="reader-topbar">
      <button class="btn-outline" onclick="closeReader()">← Back</button>
      <div style="flex:1"></div>
      <button class="btn-outline" id="ai-toggle">✨ Ask AI</button>
    </div>
    <div class="reader-scroll">
      <h1 id="r-title" style="font-family: 'Playfair Display', serif; font-size: 32px; margin-bottom: 20px;"></h1>
      <div id="r-body" class="reader-body"></div>
    </div>

    <div id="ai-panel">
      <div class="ai-header"><span>GEMINI AUDITOR</span><button onclick="closeAi()" style="background:none; border:none; cursor:pointer;">×</button></div>
      <div class="ai-chat-area" id="ai-chat">
        <div class="ai-message">Ask technical or financial questions about this specific section.</div>
      </div>
      <div class="ai-input-area">
        <input type="text" id="ai-input" placeholder="Query Gemini...">
        <button id="ai-send">Ask</button>
      </div>
    </div>
  </div>

  <script>
    'use strict';
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    const CONFIG = { GEMINI_MODEL: 'gemini-2.0-flash' };
    const STATE = { apiKey: localStorage.getItem('gemini_api_key') || '', items: [], activeIdx: -1 };
    const DOM = {
      feed: document.getElementById('feed-output'),
      loader: document.getElementById('loader'),
      lText: document.getElementById('loader-text'),
      input: document.getElementById('file-input'),
      rTitle: document.getElementById('r-title'),
      rBody: document.getElementById('r-body'),
      aiChat: document.getElementById('ai-chat'),
      aiInput: document.getElementById('ai-input')
    };

    // --- API KEY ---
    document.getElementById('key-btn').onclick = () => {
      const k = prompt("Enter Gemini API Key:", STATE.apiKey);
      if (k) { STATE.apiKey = k; localStorage.setItem('gemini_api_key', k); }
    };

    // --- PROCESSING ---
    DOM.input.onchange = async (e) => {
      const file = e.target.files[0];
      if (!file || !STATE.apiKey) return;

      DOM.loader.style.display = 'flex';
      STATE.items = []; // Clears old data on new upload
      DOM.feed.innerHTML = '';

      const reader = new FileReader();
      reader.onload = async () => {
        const base64 = reader.result.split(',')[1];
        try {
            // Logic for segmentation (Preserved JSON prompt)
            const payload = {
              contents: [{
                parts: [
                  { inlineData: { mimeType: file.type, data: base64 } },
                  { text: 'Analyze this document. Identify every distinct article or chapter. Return ONLY a JSON array of objects with "title", "summary", and "full_text". No markdown.' }
                ]
              }]
            };

            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${CONFIG.GEMINI_MODEL}:generateContent?key=${STATE.apiKey}`, {
              method: 'POST',
              body: JSON.stringify(payload)
            });
            const data = await res.json();
            const clean = data.candidates[0].content.parts[0].text.replace(/```json|```/g, '').trim();
            const sections = JSON.parse(clean);

            STATE.items = sections;
            sections.forEach((s, i) => renderCard(s, i));
            showToast();
        } catch (err) { alert("Error: " + err.message); }
        DOM.loader.style.display = 'none';
      };
      reader.readAsDataURL(file);
    };

    function renderCard(item, idx) {
      const div = document.createElement('div');
      div.className = 'feed-item';
      div.innerHTML = `<div class="headline" onclick="openItem(${idx})">${item.title}</div><div class="description">${item.summary}</div><div class="meta">VERIFIED AUDIT</div>`;
      DOM.feed.appendChild(div);
    }

    window.openItem = (idx) => {
      STATE.activeIdx = idx;
      const it = STATE.items[idx];
      DOM.rTitle.textContent = it.title;
      DOM.rBody.textContent = it.full_text;
      document.getElementById('reader-panel').classList.add('open');
      document.getElementById('reader-backdrop').classList.add('open');
      DOM.aiChat.innerHTML = '<div class="ai-message">Auditor ready. How can I help analyze this section?</div>';
    };

    window.closeReader = () => {
      document.getElementById('reader-panel').classList.remove('open');
      document.getElementById('reader-backdrop').classList.remove('open');
      closeAi();
    };

    window.closeAi = () => document.getElementById('ai-panel').classList.remove('open');
    document.getElementById('ai-toggle').onclick = () => document.getElementById('ai-panel').classList.toggle('open');

    document.getElementById('ai-send').onclick = async () => {
      const q = DOM.aiInput.value.trim();
      if (!q) return;
      const it = STATE.items[STATE.activeIdx];
      
      const userDiv = document.createElement('div');
      userDiv.className = 'ai-message user';
      userDiv.textContent = q;
      DOM.aiChat.appendChild(userDiv);
      DOM.aiInput.value = "";

      const context = `Reference this text for analysis: ${it.full_text}\n\nQuestion: ${q}`;
      try {
          const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${CONFIG.GEMINI_MODEL}:generateContent?key=${STATE.apiKey}`, {
            method: 'POST',
            body: JSON.stringify({ contents: [{ parts: [{ text: context }] }] })
          });
          const data = await res.json();
          const ans = data.candidates[0].content.parts[0].text;
          
          const botDiv = document.createElement('div');
          botDiv.className = 'ai-message';
          botDiv.textContent = ans;
          DOM.aiChat.appendChild(botDiv);
          DOM.aiChat.scrollTop = DOM.aiChat.scrollHeight;
      } catch (e) { alert(e.message); }
    };

    function showToast() {
      const t = document.getElementById('pdf-toast');
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 3500);
    }
    
    document.getElementById('header-date').textContent = new Date().toLocaleDateString('en-IN', { weekday: 'long', day: 'numeric', month: 'long' });
  </script>
</body>
</html>
