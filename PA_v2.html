<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self';
                 script-src  'unsafe-inline' https://api.rss2json.com;
                 style-src   'unsafe-inline' https://fonts.googleapis.com;
                 font-src    https://fonts.gstatic.com;
                 img-src     * data:;
                 connect-src *;">
  <title>Pulse v26B</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">

  <style>

    /* ════════════════════════════════════════════════════════════════════
       CSS §1 — DESIGN TOKENS & GLOBAL BASE STYLES
    ════════════════════════════════════════════════════════════════════ */
    :root {
      --ink:            #1a1a18;   
      --paper:          #f5f0e8;   
      --accent:         #1a5c3a;   
      --rule:           #c8c0b0;   
      --muted:          #5a554c;   
      --meta-color:     #8c867a;   
      --error:          #c0392b;   
      --reader-font-sz: 17px;      
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background:  var(--paper);
      color:       var(--ink);
      font-family: 'IBM Plex Sans', sans-serif;
      min-height:  100vh;
      line-height: 1.6;
    }


    /* ════════════════════════════════════════════════════════════════════
       CSS §2 — CONTROLS BAR
    ════════════════════════════════════════════════════════════════════ */
    .controls-bar {
      position:    absolute;
      top:         16px;
      right:       20px;
      z-index:     100;
      display:     flex;
      align-items: center;
      gap:         10px;
    }

    select {
      font-family:      'IBM Plex Mono', monospace;
      font-size:        11px;
      background-color: transparent;
      color:            var(--ink);
      border:           1px solid var(--rule);
      padding:          6px 10px;
      border-radius:    4px;
      cursor:           pointer;
      outline:          none;
      text-transform:   uppercase;
      font-weight:      500;
      max-width:        200px;
    }
    select:hover { border-color: var(--accent); }

    .btn-outline {
      font-family:    'IBM Plex Mono', monospace;
      font-size:      11px;
      background:     transparent;
      color:          var(--accent);
      border:         1px solid var(--accent);
      padding:        6px 10px;
      border-radius:  4px;
      cursor:         pointer;
      text-transform: uppercase;
      font-weight:    500;
      transition:     background 0.2s, color 0.2s;
      white-space:    nowrap;
    }
    .btn-outline:hover    { background: var(--accent); color: var(--paper); }
    .btn-outline:disabled { opacity: 0.4; cursor: not-allowed; }

    #clear-key-btn       { color: var(--muted); border-color: var(--rule); }
    #clear-key-btn:hover { background: var(--ink); color: var(--paper); border-color: var(--ink); }

    #refresh-btn.spinning { animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }


    /* ════════════════════════════════════════════════════════════════════
       CSS §3 — MASTHEAD
    ════════════════════════════════════════════════════════════════════ */
    .masthead {
      border-bottom: 3px double var(--ink);
      padding:       30px 20px;
      text-align:    center;
      background:    var(--paper);
      position:      relative;
    }
    .masthead-title {
      font-family: 'Playfair Display', serif;
      font-size:   clamp(32px, 5vw, 56px);
      font-weight: 700;
    }
    .tagline {
      font-family:    'IBM Plex Mono', monospace;
      font-size:      10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color:          var(--meta-color);
      margin-top:     8px;
    }


    /* ════════════════════════════════════════════════════════════════════
       CSS §4 — FEED STATUS BAR
    ════════════════════════════════════════════════════════════════════ */
    .feed-status-bar {
      max-width:       800px;
      margin:          16px auto 0;
      padding:         0 20px;
      display:         flex;
      justify-content: space-between;
      align-items:     center;
      font-family:     'IBM Plex Mono', monospace;
      font-size:       10px;
      color:           var(--meta-color);
      text-transform:  uppercase;
      letter-spacing:  0.05em;
    }


    /* ════════════════════════════════════════════════════════════════════
       CSS §5 — FEED CONTAINER & ARTICLE CARDS
    ════════════════════════════════════════════════════════════════════ */
    .container {
      max-width: 800px;
      margin:    0 auto;
      padding:   20px 20px 80px;
    }

    .feed-item {
      margin-bottom:  35px;
      border-bottom:  1px solid var(--rule);
      padding-bottom: 25px;
      animation:      fadeIn 0.3s ease forwards;
      opacity:        0;
    }
    .feed-item:last-child { border-bottom: none; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .headline {
      font-family:     'Playfair Display', serif;
      font-size:       22px;
      color:           var(--ink);
      text-decoration: none;
      font-weight:     700;
      display:         block;
      line-height:     1.3;
      margin-bottom:   10px;
      word-break:      break-word;
      cursor:          pointer;
    }
    .headline:hover { color: var(--accent); text-decoration: underline; }

    .description {
      font-size:     15px;
      color:         var(--muted);
      margin-bottom: 12px;
      line-height:   1.6;
    }

    .meta {
      font-family:    'IBM Plex Mono', monospace;
      font-size:      10px;
      color:          var(--meta-color);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }


    /* ════════════════════════════════════════════════════════════════════
       CSS §6 — SYSTEM / STATUS MESSAGES
    ════════════════════════════════════════════════════════════════════ */
    .system-msg {
      font-family: 'IBM Plex Mono', monospace;
      font-size:   12px;
      color:       var(--meta-color);
      text-align:  center;
      margin-top:  60px;
      line-height: 2;
    }
    .system-msg.error { color: var(--error); }

    .cached-badge {
      display:        inline-block;
      font-family:    'IBM Plex Mono', monospace;
      font-size:      9px;
      background:     var(--rule);
      color:          var(--muted);
      padding:        1px 5px;
      border-radius:  2px;
      text-transform: uppercase;
      margin-left:    6px;
      vertical-align: middle;
    }


    /* ════════════════════════════════════════════════════════════════════
       CSS §7 — READER MODE PANEL
    ════════════════════════════════════════════════════════════════════ */
    #reader-backdrop {
      display:         none;
      position:        fixed;
      inset:           0;
      background:      rgba(26,26,24,0.45);
      z-index:         998;
      backdrop-filter: blur(2px);
    }
    #reader-backdrop.open { display: block; }

    #reader-panel {
      position:       fixed;
      top: 0; right: 0; bottom: 0;
      width:          100%;
      max-width:      780px;
      background:     var(--paper);
      z-index:        999;
      display:        flex;
      flex-direction: column;
      transform:      translateX(100%);
      transition:     transform 0.35s cubic-bezier(.4,0,.2,1);
      box-shadow:     -4px 0 40px rgba(0,0,0,0.18);
    }
    #reader-panel.open { transform: translateX(0); }

    #reader-progress {
      position:   absolute;
      top: 0; left: 0;
      height:     3px;
      width:      0%;
      background: var(--accent);
      transition: width 0.2s;
      z-index:    5;
    }

    .reader-topbar {
      display:       flex;
      align-items:   center;
      gap:           10px;
      padding:       14px 20px;
      border-bottom: 1px solid var(--rule);
      background:    var(--paper);
      flex-shrink:   0;
      position:      relative;
      z-index:       20;
    }

    .reader-back-btn {
      font-family:    'IBM Plex Mono', monospace;
      font-size:      11px;
      font-weight:    500;
      text-transform: uppercase;
      background:     transparent;
      color:          var(--accent);
      border:         1px solid var(--accent);
      padding:        5px 12px;
      border-radius:  4px;
      cursor:         pointer;
      white-space:    nowrap;
      transition:     background 0.2s, color 0.2s;
      flex-shrink:    0;
    }
    .reader-back-btn:hover { background: var(--accent); color: var(--paper); }

    .reader-source-url {
      font-family:   'IBM Plex Mono', monospace;
      font-size:     10px;
      color:         var(--meta-color);
      white-space:   nowrap;
      overflow:      hidden;
      text-overflow: ellipsis;
      flex:          1;
    }

    .reader-font-ctrl { display: flex; gap: 4px; flex-shrink: 0; }
    .reader-font-ctrl button {
      font-family:     'IBM Plex Mono', monospace;
      font-size:       13px;
      background:      transparent;
      border:          1px solid var(--rule);
      color:           var(--muted);
      width: 28px; height: 28px;
      border-radius:   4px;
      cursor:          pointer;
      display:         flex;
      align-items:     center;
      justify-content: center;
      transition:      border-color 0.2s;
    }
    .reader-font-ctrl button:hover { border-color: var(--ink); color: var(--ink); }

    .reader-open-btn {
      font-family:     'IBM Plex Mono', monospace;
      font-size:       10px;
      font-weight:     500;
      text-transform:  uppercase;
      background:      transparent;
      color:           var(--muted);
      border:          1px solid var(--rule);
      padding:         5px 10px;
      border-radius:   4px;
      cursor:          pointer;
      white-space:     nowrap;
      text-decoration: none;
      transition:      all 0.2s;
      flex-shrink:     0;
    }
    .reader-open-btn:hover { border-color: var(--ink); color: var(--ink); }

    .reader-ai-btn {
      color:        var(--accent);
      border-color: var(--accent);
      background:   rgba(26, 92, 58, 0.05);
      font-weight:  600;
    }
    .reader-ai-btn:hover { background: var(--accent); color: var(--paper); }

    .reader-scroll {
      overflow-y: auto;
      flex:       1;
      padding:    36px 40px 60px;
      position:   relative;
      z-index:    10;
    }

    .reader-article-title {
      font-family:   'Playfair Display', serif;
      font-size:     clamp(22px, 3.5vw, 32px);
      font-weight:   700;
      line-height:   1.25;
      color:         var(--ink);
      margin-bottom: 16px;
    }
    .reader-article-meta {
      font-family:    'IBM Plex Mono', monospace;
      font-size:      11px;
      color:          var(--meta-color);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom:  28px;
      padding-bottom: 20px;
      border-bottom:  2px solid var(--rule);
    }

    .reader-body {
      font-size:      var(--reader-font-sz);
      line-height:    1.85;
      color:          var(--ink);
      padding-bottom: 40px;
    }
    .reader-body p:empty,
    .reader-body div:empty,
    .reader-body section:empty,
    .reader-body li:empty,
    .reader-body blockquote:empty { display: none; }

    .reader-body p:has(> br:only-child) { display: none; }

    .reader-body p { margin-bottom: 1.4em; }
    .reader-body h1, .reader-body h2, .reader-body h3, .reader-body h4 {
      font-family: 'Playfair Display', serif;
      margin:      1.6em 0 0.6em;
      line-height: 1.25;
    }
    .reader-body h1 { font-size: 1.5em; }
    .reader-body h2 { font-size: 1.3em; }
    .reader-body h3 { font-size: 1.1em; }
    .reader-body h4 { font-size: 1.0em; }
    .reader-body img {
      max-width:     100%;
      height:        auto;
      border-radius: 4px;
      margin:        1.2em 0;
      display:       block;
    }
    .reader-body blockquote {
      border-left: 3px solid var(--accent);
      padding:     4px 0 4px 16px;
      margin:      1.4em 0;
      color:       var(--muted);
      font-style:  italic;
    }
    .reader-body a    { color: var(--accent); word-break: break-word; }
    .reader-body ul, .reader-body ol { padding-left: 1.6em; margin-bottom: 1.2em; }
    .reader-body li   { margin-bottom: 0.4em; }

    .reader-status {
      font-family: 'IBM Plex Mono', monospace;
      font-size:   12px;
      color:       var(--meta-color);
      text-align:  center;
      margin-top:  80px;
      line-height: 2.5;
    }
    .reader-status.error { color: var(--error); }


    /* ════════════════════════════════════════════════════════════════════
       CSS §8 — AI CHAT PANEL (Gemini Assistant)
    ════════════════════════════════════════════════════════════════════ */

    #ai-panel {
      position:       absolute;
      top:            65px;   
      right:          20px;
      width:          360px;
      max-width:      calc(100vw - 40px);
      background:     #ffffff;
      border:         1px solid var(--rule);
      border-radius:  12px;
      box-shadow:     0 8px 30px rgba(0,0,0,0.15);
      display:        flex;
      flex-direction: column;
      opacity:        0;
      pointer-events: none;
      transform:      translateY(-15px);
      transition:     all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      max-height:     65vh;
      z-index:        1005;
    }
    #ai-panel.open {
      opacity:        1;
      pointer-events: auto;
      transform:      translateY(0);
    }

    .ai-header {
      display:         flex;
      justify-content: space-between;
      align-items:     center;
      padding:         12px 16px;
      background:      var(--paper);
      border-bottom:   1px solid var(--rule);
      border-radius:   12px 12px 0 0;
      font-family:     'IBM Plex Mono', monospace;
      font-size:       11px;
      font-weight:     500;
      text-transform:  uppercase;
      color:           var(--accent);
    }
    .ai-close-btn {
      background:  transparent;
      border:      none;
      font-size:   20px;
      line-height: 1;
      cursor:      pointer;
      color:       var(--muted);
    }
    .ai-close-btn:hover { color: var(--ink); }

    .ai-chat-area {
      padding:     16px;
      overflow-y:  auto;
      flex:        1;
      font-size:   14px;
      line-height: 1.6;
    }

    .ai-message {
      margin-bottom: 16px;
      padding:       12px 16px;
      border-radius: 8px;
      background:    var(--paper);
      color:         var(--ink);
    }
    .ai-message.user   { background: rgba(26, 92, 58, 0.08); border-left: 3px solid var(--accent); }
    .ai-message.system { color: var(--muted); font-style: italic; font-size: 13px; background: transparent; padding: 0; }
    .ai-message strong { font-weight: 600; }
    .ai-message ul     { margin-left: 20px; margin-top: 8px; }
    .ai-message p      { margin-bottom: 8px; }
    .ai-message p:last-child { margin-bottom: 0; }

    .ai-quick-prompts {
      display:         flex;
      gap:             8px;
      padding:         0 16px 12px;
      overflow-x:      auto;
      white-space:     nowrap;
      scrollbar-width: none;
    }
    .ai-quick-prompts::-webkit-scrollbar { display: none; }
    .ai-quick-prompts button {
      background:    var(--paper);
      border:        1px solid var(--rule);
      padding:       6px 12px;
      border-radius: 20px;
      font-size:     12px;
      color:         var(--muted);
      cursor:        pointer;
      transition:    all 0.2s;
    }
    .ai-quick-prompts button:hover { background: var(--ink); color: var(--paper); border-color: var(--ink); }

    .ai-input-area {
      display:       flex;
      padding:       12px 16px;
      border-top:    1px solid var(--rule);
      background:    #fff;
      border-radius: 0 0 12px 12px;
    }
    .ai-input-area input {
      flex:          1;
      border:        1px solid var(--rule);
      border-radius: 4px;
      padding:       10px 14px;
      font-family:   'IBM Plex Sans', sans-serif;
      font-size:     14px;
      outline:       none;
    }
    .ai-input-area input:focus { border-color: var(--accent); }
    .ai-input-area button {
      background:    var(--accent);
      color:         var(--paper);
      border:        none;
      border-radius: 4px;
      padding:       0 16px;
      margin-left:   8px;
      cursor:        pointer;
      font-weight:   500;
    }
    .ai-input-area button:disabled { background: var(--rule); cursor: not-allowed; }


    /* ════════════════════════════════════════════════════════════════════
       CSS §9 — RESPONSIVE / MOBILE OVERRIDES
    ════════════════════════════════════════════════════════════════════ */
    @media (max-width: 520px) {
      .controls-bar {
        position:         static;
        padding:          12px 16px;
        justify-content:  flex-end;
        border-bottom:    1px solid var(--rule);
        flex-wrap:        wrap;
      }
      select              { max-width: 140px; font-size: 10px; }
      .masthead           { padding: 20px 16px; }
      .reader-scroll      { padding: 20px 18px 0px; }
      .reader-source-url  { display: none; }  
      #ai-panel           { top: 65px; right: 10px; max-width: calc(100vw - 20px); max-height: 70vh; }
    }

  </style>
</head>
